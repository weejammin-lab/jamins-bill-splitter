<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
}

@media (max-width: 600px) {
    input, button {
        width: 100%;
        margin-bottom: 6px;
    }
}

.section {
    margin-bottom: 25px;
}

input, button {
    padding: 10px;
    margin: 5px;
    font-size: 14px;
}

button {
    cursor: pointer;
}

/* Scrollable list */

#itemsList {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
}

/* Summary */

.summary-box {
    border: 1px solid #ccc;
    padding: 15px;
}

.result {
    font-weight: bold;
}

.note {
    font-size: 0.9em;
    color: gray;
}

</style>

</head>

<body>

<h1>Bill Splitter</h1>

<!-- PEOPLE -->

<div class="section">

<h2>Add People</h2>

<input id="personName" placeholder="Name">

<button onclick="addPerson()">
Add Person
</button>

<ul id="peopleList"></ul>

</div>

<!-- ITEMS -->

<div class="section">

<h2>Add Items</h2>

<input id="itemName" placeholder="Item">

<input id="itemPrice"
type="number"
step="0.01"
placeholder="Price">

<input id="itemPeople"
placeholder="People (comma separated)">

<button onclick="addItem()">
Add Item
</button>

<div class="note">
Repeat names for uneven shares.  
Example: Maria, Maria, Marianne
</div>

<ul id="itemsList"></ul>

</div>

<!-- TAX & TIP -->

<div class="section">

<h2>Tax & Tip</h2>

<label>Tax Amount:</label>
<input id="taxAmount" type="number" step="0.01">

<label>OR Tax %:</label>
<input id="taxPercent" type="number" step="0.01">

<br>

<label>Tip Amount:</label>
<input id="tipAmount" type="number" step="0.01">

<label>OR Tip %:</label>
<input id="tipPercent" type="number" step="0.01">

<button onclick="updateTotals()">
Recalculate
</button>

</div>

<!-- SUMMARY -->

<div class="section">

<h2>Receipt Summary</h2>

<div id="summary" class="summary-box"></div>

</div>

<!-- TOTALS -->

<div class="section">

<h2>Totals Per Person</h2>

<div id="totals"></div>

</div>

<script>

let people = [];
let items = [];

// Normalize names

function normalize(name) {
    return name.trim().toLowerCase();
}

// Save data

function saveData() {

localStorage.setItem(
"billSplitterData",
JSON.stringify({
people,
items,
taxAmount:
document.getElementById("taxAmount").value,
taxPercent:
document.getElementById("taxPercent").value,
tipAmount:
document.getElementById("tipAmount").value,
tipPercent:
document.getElementById("tipPercent").value
})
);

}

// Load data

function loadData() {

let data =
localStorage.getItem("billSplitterData");

if (!data) return;

data = JSON.parse(data);

people = data.people || [];
items = data.items || [];

document.getElementById("taxAmount").value =
data.taxAmount || "";

document.getElementById("taxPercent").value =
data.taxPercent || "";

document.getElementById("tipAmount").value =
data.tipAmount || "";

document.getElementById("tipPercent").value =
data.tipPercent || "";

updatePeople();
updateItems();
updateTotals();

}

// Add person

function addPerson() {

let name =
document.getElementById("personName")
.value
.trim();

if (!name) return;

let exists =
people.some(
p => normalize(p) === normalize(name)
);

if (exists) {

alert("Person already exists.");
return;

}

people.push(name);

document.getElementById("personName").value = "";

updatePeople();
updateTotals();
saveData();

}

// Show people

function updatePeople() {

let list =
document.getElementById("peopleList");

list.innerHTML = "";

people.forEach(person => {

let li =
document.createElement("li");

li.textContent = person;

list.appendChild(li);

});

}

// Add item

function addItem() {

let name =
document.getElementById("itemName").value;

let price =
parseFloat(
document.getElementById("itemPrice").value
);

let peopleInput =
document.getElementById("itemPeople").value;

if (!name || !price || !peopleInput)
return;

let splitPeople =
peopleInput
.split(",")
.map(p => p.trim())
.filter(p => p !== "");

// Match capitalization correctly

splitPeople = splitPeople.map(p => {

let match =
people.find(
person =>
normalize(person) === normalize(p)
);

if (!match) {

alert(p + " not in people list.");
throw new Error();

}

return match;

});

items.push({
name,
price,
splitPeople
});

document.getElementById("itemName").value = "";
document.getElementById("itemPrice").value = "";
document.getElementById("itemPeople").value = "";

updateItems();
updateTotals();
saveData();

}

// Update items

function updateItems() {

let list =
document.getElementById("itemsList");

list.innerHTML = "";

items.forEach((item, index) => {

let li =
document.createElement("li");

let span =
document.createElement("span");

span.textContent =
item.name +
" - $" +
item.price.toFixed(2) +
" (" +
item.splitPeople.join(", ") +
")";

// Edit

let editBtn =
document.createElement("button");

editBtn.textContent = "Edit";

editBtn.onclick = function() {

let newName =
prompt("Item name:", item.name);

if (newName !== null)
item.name = newName;

let newPrice =
prompt("Price:", item.price);

if (newPrice !== null)
item.price = parseFloat(newPrice);

let newPeople =
prompt(
"People:",
item.splitPeople.join(", ")
);

if (newPeople !== null) {

item.splitPeople =
newPeople
.split(",")
.map(p => {

let match =
people.find(
person =>
normalize(person) === normalize(p)
);

if (!match) {

alert(p + " not valid.");
throw new Error();

}

return match;

});

}

updateItems();
updateTotals();
saveData();

};

// Delete

let deleteBtn =
document.createElement("button");

deleteBtn.textContent = "Delete";

deleteBtn.onclick = function() {

items.splice(index, 1);

updateItems();
updateTotals();
saveData();

};

li.appendChild(span);
li.appendChild(editBtn);
li.appendChild(deleteBtn);

list.appendChild(li);

});

}

// Totals

function updateTotals() {

let subtotal = 0;

let totals = {};

people.forEach(p => {
totals[p] = 0;
});

items.forEach(item => {

subtotal += item.price;

let sharePrice =
item.price /
item.splitPeople.length;

item.splitPeople.forEach(p => {

totals[p] += sharePrice;

});

});

// TAX

let taxAmount =
parseFloat(
document.getElementById("taxAmount").value
);

let taxPercent =
parseFloat(
document.getElementById("taxPercent").value
);

if (!taxAmount && taxPercent) {

taxAmount =
subtotal *
(taxPercent / 100);

}

// TIP

let tipAmount =
parseFloat(
document.getElementById("tipAmount").value
);

let tipPercent =
parseFloat(
document.getElementById("tipPercent").value
);

if (!tipAmount && tipPercent) {

tipAmount =
subtotal *
(tipPercent / 100);

}

taxAmount = taxAmount || 0;
tipAmount = tipAmount || 0;

let grandTotal =
subtotal +
taxAmount +
tipAmount;

// Distribute

people.forEach(p => {

let base =
totals[p];

if (subtotal > 0) {

let ratio =
base / subtotal;

totals[p] +=
taxAmount * ratio +
tipAmount * ratio;

}

});

// Rounding

let peopleTotal = 0;

people.forEach(p => {
peopleTotal += totals[p];
});

let diff =
grandTotal - peopleTotal;

if (people.length > 0) {

totals[people[0]] += diff;

}

// Summary

let summary =
document.getElementById("summary");

summary.innerHTML = `

Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${taxAmount.toFixed(2)}<br>
Tip: $${tipAmount.toFixed(2)}<br>

<strong>Total: $${grandTotal.toFixed(2)}</strong>

<br><br>

✔ Verify your receipt:<br>
Does your receipt subtotal match?<br>
Does your receipt total match?

`;

// Show totals

let div =
document.getElementById("totals");

div.innerHTML = "";

people.forEach(person => {

let p =
document.createElement("div");

p.className = "result";

p.textContent =
person +
" owes $" +
totals[person].toFixed(2);

div.appendChild(p);

});

}

// Load saved data

loadData();

</script>

</body>
</html>
