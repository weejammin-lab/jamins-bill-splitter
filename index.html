<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:4px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.item-col{width:90px;}
.price-col{width:40px;}
.people-col{width:360px;}
.tap-col{width:360px;}

input{
width:100%;
box-sizing:border-box;
}

.price-cell{
position:relative;
}

.price-cell span{
position:absolute;
left:4px;
top:3px;
color:gray;
}

/* buttons */

.name-btn{
margin:2px;
padding:3px 7px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
border-radius:4px;
background:#e0e0e0;
}

.name-btn.selected{
background:#b8f5b8;
border-color:#7ad67a;
}

.everyone-row{
margin-bottom:4px;
}

/* summary */

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="summary-box" id="summary"></div>

<script>

/* PEOPLE */

let nameList=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let rows=[];
let venmoNames={};

/* 5 FIXED GREY EXAMPLES */

let placeholders=[
"jamin",
"jack",
"jamin, cliff, willie, howard",
"lin, lin, freddy",
"everyone"
];

/* INIT */

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:placeholders[i]
});
}

renderPeopleBar();
render();
calc();

}

/* PEOPLE */

function handleAddPerson(e){

if(e.key==="Enter"){

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();

}

}

function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{

bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>
`;

});

}

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
});

renderPeopleBar();
render();
calc();

}

/* ========================= */
/* AUTO ROW (SIMPLE + FIXED) */
/* ========================= */

function ensureRow(){

let last = rows[rows.length - 1];

let filled =
(last.item && last.item.trim()) ||
(last.price && last.price.trim()) ||
(last.people && last.people.trim()) ||
(last.selected && last.selected.length);

if(filled){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:""
});
}

}

/* INPUTS */

function update(i,key,val){

rows[i][key]=val;

ensureRow();
calc();

}

function handlePriceInput(i,el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[i].price=el.value;

ensureRow();
calc();

}

/* ========================= */
/* TAP (FIXED ISOLATION)    */
/* ========================= */

function toggleName(row,name){

let r=rows[row];

if(!r.selected) r.selected=[];

if(r.selected.includes(name)){
r.selected=r.selected.filter(p=>p!==name);
}else{
r.selected.push(name);
}

r.people=r.selected.join(", ");

render();
calc();

}

function toggleEveryone(row){

let r=rows[row];

if(r.selected && r.selected.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();

}

/* RENDER */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

tapHTML+=`
<div class="everyone-row">
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

/* names */

nameList.forEach(n=>{

let selected=r.selected?.includes(n);

tapHTML+=`
<button class="name-btn ${selected?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>
`;

});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input placeholder="${r.placeholder||''}"
value="${r.item}"
oninput="update(${i},'item',this.value)">
</td>

<td>
<input type="text" inputmode="decimal"
value="${r.price}"
oninput="handlePriceInput(${i},this)">
</td>

<td>
<input placeholder="${r.placeholder||''}"
value="${r.people}"
oninput="update(${i},'people',this.value)">
</td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

/* CALC */

function calc(){

let subtotal=0;

rows.forEach(r=>{

if(r.price){
let p=parseFloat(r.price);
if(!isNaN(p)) subtotal+=p;
}

});

summary.innerHTML=`Subtotal: $${subtotal.toFixed(2)}`;

}

/* CLEAR */

function clearAll(){

rows=[];
init();

}

/* START */

init();

</script>

</body>
</html>
