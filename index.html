<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 1000px;
    margin: auto;
}

/* Placeholder grey */

.placeholder {
    color: gray;
}

/* Table */

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

td, th {
    border: 1px solid #ddd;
    padding: 3px;
}

.item-col { width: 100px; }
.price-col { width: 60px; }
.people-col { width: 200px; }
.tap-col { width: 330px; }

/* Price */

.price-cell {
    position: relative;
}

.price-cell span {
    position: absolute;
    left: 5px;
    top: 3px;
    color: gray;
}

.price-cell input {
    padding-left: 12px;
}

/* Tap buttons */

.name-btn {
    margin: 2px;
    padding: 2px 6px;
    font-size: 11px;
    cursor: pointer;
}

.everyone-row {
    margin-bottom: 4px;
}

/* Summary */

.summary-box {
    border: 1px solid #ccc;
    padding: 8px;
    margin-top: 8px;
}

.result {
    font-weight: bold;
}

</style>

</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">
Clear All
</button>

<table>

<thead>
<tr>

<th class="item-col">
Item (optional)
</th>

<th class="price-col">
Price ($)
</th>

<th class="people-col">
People involved
</th>

<th class="tap-col">
Tap Names
</th>

</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

Tax

<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue"
type="number"
oninput="calc()">

Tip

<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue"
type="number"
oninput="calc()">

<div class="summary-box" id="summary"></div>

<div id="totals"></div>

<script>

/* PEOPLE LIST */

let nameList=[
"jamin",
"willie",
"howard",
"cliff",
"lin",
"jack",
"freddy"
];

/* PLACEHOLDER EXAMPLES */

let placeholders=[
"jamin",
"jack",
"jamin, cliff, willie, howard",
"lin, freddy, lin, cliff",
"everyone"
];

let rows=[];

/* INIT */

function init(){

rows=[];

for(let i=0;i<5;i++){

rows.push({
item:"",
price:"",
people:"",
placeholder:placeholders[i]
});

}

render();

}

/* ADD ROW */

function addRow(){

rows.push({
item:"",
price:"",
people:"",
placeholder:"everyone"
});

}

/* AUTO EXPAND */

function maybeExpand(){

if(rows.length>=5){

let r=rows[4];

if(r.item || r.price || r.people){

addRow();
addRow();

render();

}

}

}

/* RENDER */

function render(){

let body=
document.getElementById("tableBody");

body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

/* Everyone row */

tapHTML+=
`<div class="everyone-row">

<button
class="name-btn"
onclick="setEveryone(${i})">
everyone
</button>

</div>`;

/* Names */

nameList.forEach(n=>{

tapHTML+=
`<button
class="name-btn"
onclick="toggleName(${i},'${n}')">
${n}
</button>`;

});

/* People input */

let peopleValue=
r.people || "";

let placeholderText=
r.placeholder;

let tr=document.createElement("tr");

tr.innerHTML=`

<td>

<input
value="${r.item}"
oninput="update(${i},'item',this.value)">

</td>

<td class="price-cell">

<span>$</span>

<input
type="number"
step="0.01"
value="${r.price}"
oninput="update(${i},'price',this.value)">

</td>

<td>

<input
value="${peopleValue}"
placeholder="${placeholderText}"
oninput="update(${i},'people',this.value)">

</td>

<td>

${tapHTML}

</td>

`;

body.appendChild(tr);

});

}

/* TOGGLE */

function toggleName(row,name){

let r=rows[row];

if(r.people==="everyone"){

r.people=name;

}

else{

let list=
r.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

if(list.includes(name)){

list=list.filter(p=>p!==name);

}

else{

list.push(name);

}

if(list.length===0){

r.people="";

}

else{

r.people=list.join(", ");

}

}

render();
calc();

}

/* EVERYONE */

function setEveryone(row){

rows[row].people="everyone";

render();
calc();

}

/* UPDATE */

function update(i,key,val){

rows[i][key]=val;

maybeExpand();

calc();

}

/* CLEAR */

function clearAll(){

init();
calc();

}

/* CALCULATION */

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(r.price){

let price=parseFloat(r.price);

subtotal+=price;

let list=
r.people==="everyone"
? nameList
: r.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share=
price/list.length||0;

list.forEach(p=>{

if(!people[p])
people[p]={total:0};

people[p].total+=share;

});

}

});

/* TAX */

let tax=
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

/* TIP */

let tip=
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

/* DISTRIBUTE */

Object.keys(people).forEach(p=>{

let ratio=
people[p].total/subtotal||0;

people[p].total+=
tax*ratio+
tip*ratio;

});

/* SUMMARY */

summary.innerHTML=

`Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>`;

/* TOTALS */

let div=
document.getElementById("totals");

div.innerHTML="";

Object.keys(people).forEach(p=>{

div.innerHTML+=
`<div class="result">
${p} owes $${people[p].total.toFixed(2)}
</div>`;

});

}

/* START */

init();
calc();

</script>

</body>
</html>
