<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

.header-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}

.receipt-thumb{
width:36px;
height:36px;
object-fit:cover;
border:1px solid #ccc;
border-radius:4px;
cursor:pointer;
}

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
display:block;
}

.top-row{
display:flex;
gap:8px;
align-items:stretch;
margin-top:4px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}

.delete-person{
color:red;
cursor:pointer;
}

.notes-box{
flex:1;
font-size:12px;
font-family:Arial;
padding:4px;
border:1px solid #ccc;
resize:none;
height:80px;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.lock-btn{
cursor:pointer;
}

.locked-row td{
background:#f3f3f3;
opacity:0.7;
}

.receipt-thumb{
width:36px;
height:36px;
object-fit:cover;
border:1px solid #ccc;
border-radius:4px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header-row">
<h2>Bill Splitter</h2>
<button onclick="clearAll()">Clear All</button>
</div>

<div class="top-actions">

<input id="addPersonBox" placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<input type="file" id="receiptUpload" accept="image/*"
style="display:none" onchange="handleReceiptUpload(event)">

<button onclick="document.getElementById('receiptUpload').click()">
Upload Receipt
</button>

<div id="receiptPreviewContainer"></div>

</div>

<table>
<tbody id="tableBody"></tbody>
</table>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const storage = firebase.storage();
const billRef = db.collection("bills").doc("main");

let rows = [];
let nameList = [];
let venmoNames = {};
let receiptUrl = "";

let isLocalUpdate = false;

function showReceiptThumbnail(url){
const c = document.getElementById("receiptPreviewContainer");
c.innerHTML = "";
if(!url) return;

const img = document.createElement("img");
img.src = url;
img.className = "receipt-thumb";
img.onclick = () => window.open(url, "_blank");
c.appendChild(img);
}

/* ================= FIRESTORE LOAD ================= */

function loadBill(){
billRef.onSnapshot(doc=>{
if(isLocalUpdate) return;

const data = doc.data();
if(!data) return;

rows = data.rows || [];
nameList = data.nameList || [];
venmoNames = data.venmoNames || {};

/* ALWAYS restore from DB */
receiptUrl = data.receiptUrl || "";
showReceiptThumbnail(receiptUrl);

render();
});
}

/* ================= UPLOAD ================= */

async function handleReceiptUpload(event){
const file = event.target.files[0];
if(!file) return;

const ref = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
await ref.put(file);

const url = await ref.getDownloadURL();

/* single source of truth */
receiptUrl = url;

showReceiptThumbnail(url);

/* save everything once */
saveBill();

event.target.value = "";
}

/* ================= SAVE ================= */

function saveBill(){

isLocalUpdate = true;

billRef.set({
rows,
nameList,
venmoNames,

/* NEVER undefined */
receiptUrl: receiptUrl || "",

taxValue: document.getElementById("taxValue")?.value || "",
tipValue: document.getElementById("tipValue")?.value || "",
notes: document.getElementById("notesBox")?.value || ""
}).finally(()=>{
setTimeout(()=>isLocalUpdate=false,200);
});

}

/* ================= BASIC UI ================= */

function handleAddPerson(e){
if(e.key !== "Enter") return;

const box = document.getElementById("addPersonBox");
const name = box.value.trim();
if(!name) return;

nameList.push(name);
box.value = "";

saveBill();
render();
}

function clearAll(){
if(!confirm("Clear everything?")) return;

rows = [];
nameList = [];
receiptUrl = "";
showReceiptThumbnail("");

saveBill();
render();
}

function render(){
const body = document.getElementById("tableBody");
body.innerHTML = "";

rows.forEach((r,i)=>{
const tr = document.createElement("tr");

tr.innerHTML = `
<td>${i+1}</td>
<td><input value="${r.item||""}"></td>
<td><input value="${r.price||""}"></td>
<td>${r.people||""}</td>
`;

body.appendChild(tr);
});
}

loadBill();

</script>

</body>
</html>
