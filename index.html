<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:4px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
overflow:hidden;
}

td input{
width:100%;
box-sizing:border-box;
border:1px solid #ccc;
background:white;
font-size:12px;
}

/* TAP */

.name-btn{
margin:2px;
padding:2px 6px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

/* TAX / TIP */

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.tax-tip-select{
width:50px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>

<script>

let nameList=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let rows=[];

/* ✅ ALWAYS START SAFE */
function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:""
});
}

render();
calc();
}

function ensureRow(){

if(rows.length===0){
init();
return;
}

let last=rows[rows.length-1];

if(last.item || last.price || last.people){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:""
});
}
}

/* ENTER / TAB */

function move(e,row,col){

if(e.key!=="Enter" && e.key!=="Tab") return;

e.preventDefault();

ensureRow();

let next=document.querySelector(
`[data-row='${row+1}'][data-col='${col}']`
);

if(next){
next.focus();
next.select?.();
}
}

/* INPUT */

function handlePriceInput(row, el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;

ensureRow();
calc();
}

function update(i,key,val){
rows[i][key]=val;
ensureRow();
calc();
}

/* TAP */

function toggleName(row,name){

let r=rows[row];
if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.length ? r.selected.join(", ") : "";

render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();
}

/* RENDER */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`<div>
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input
data-row="${i}" data-col="0"
value="${r.item}"
oninput="update(${i},'item',this.value)"
onkeydown="move(event,${i},0)">
</td>

<td>
<input
data-row="${i}" data-col="1"
value="${r.price}"
oninput="handlePriceInput(${i},this)"
onkeydown="move(event,${i},1)">
</td>

<td>
<input
data-row="${i}" data-col="2"
value="${r.people}"
oninput="update(${i},'people',this.value)"
onkeydown="move(event,${i},2)">
</td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

/* CALC */

function calc(){

let subtotal=0;

rows.forEach(r=>{
if(r.price){
let p=parseFloat(r.price);
if(!isNaN(p)) subtotal+=p;
}
});

summary.innerHTML=`Subtotal: $${subtotal.toFixed(2)}`;
}

/* CLEAR */

function clearAll(){
init();
}

/* START */

init();
calc();

</script>

</body>
</html>
