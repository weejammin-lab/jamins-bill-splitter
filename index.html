<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 10px;
}

h1 {
    text-align: center;
}

.section {
    margin-bottom: 10px;
}

/* Compact table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

td, th {
    border: 1px solid #ddd;
    padding: 4px;
}

input {
    width: 100%;
    padding: 4px;
    font-size: 13px;
}

/* Sticky summary */
.summary-box {
    border: 1px solid #ccc;
    padding: 10px;
    background: white;
}

/* Totals */
.result {
    font-weight: bold;
    margin: 6px 0;
}

/* Venmo input */
.venmo-input {
    width: 120px;
    margin-left: 8px;
}

.venmo-btn {
    padding: 3px 6px;
    font-size: 11px;
    margin-left: 4px;
}

.small {
    font-size: 12px;
    color: gray;
}

</style>

</head>

<body>

<h1>Bill Splitter</h1>

<!-- ITEMS TABLE -->

<div class="section">

<table>

<thead>
<tr>
<th>Item (optional)</th>
<th>Price</th>
<th>People involved</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

</div>

<!-- TAX / TIP BELOW ITEMS -->

<div class="section">

<strong>Tax</strong>

<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue"
type="number"
placeholder="Tax"
oninput="calc()">

<strong>Tip</strong>

<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue"
type="number"
placeholder="Tip"
oninput="calc()">

</div>

<!-- SUMMARY -->

<div class="summary-box" id="summary"></div>

<!-- TOTALS + VENMO -->

<div class="section">

<div id="totals"></div>

</div>

<script>

let rows = [];
let venmoNames = {};

function init(){

for(let i=0;i<10;i++){
addRow();
}

render();

}

/* ADD ROW */

function addRow(data={}){

rows.push({
item:data.item||"",
price:data.price||"",
people:data.people||""
});

}

/* AUTO EXPAND */

function maybeExpand(){

if(rows.filter(r=>r.price).length > rows.length - 2){

for(let i=0;i<5;i++){
addRow();
}

render();

}

}

/* RENDER TABLE */

function render(){

let body = document.getElementById("tableBody");
body.innerHTML = "";

rows.forEach((r,i)=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td>
<input placeholder="optional"
value="${r.item}"
oninput="update(${i},'item',this.value)">
</td>

<td>
<input type="number"
value="${r.price}"
oninput="update(${i},'price',this.value)">
</td>

<td>
<input placeholder="maria, willie"
value="${r.people}"
oninput="update(${i},'people',this.value)">
</td>
`;

body.appendChild(tr);

});

}

/* UPDATE ROW */

function update(i,key,val){

rows[i][key] = val;

maybeExpand();

calc();

}

/* CALC */

function calc(){

let items =
rows.filter(r=>r.price && r.people);

let people = {};
let subtotal = 0;

/* SPLIT ITEMS */

items.forEach(i=>{

let price = parseFloat(i.price);

subtotal += price;

let list =
i.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share = price / list.length;

list.forEach(p=>{

people[p] =
people[p] || { total:0 };

people[p].total += share;

});

});

/* TAX */

let tax = 0;

if(taxMode.value === "percent"){

tax =
subtotal *
(taxValue.value||0)/100;

}

else{

tax =
parseFloat(taxValue.value||0);

}

/* TIP */

let tip = 0;

if(tipMode.value === "percent"){

tip =
subtotal *
(tipValue.value||0)/100;

}

else{

tip =
parseFloat(tipValue.value||0);

}

let total =
subtotal + tax + tip;

/* DISTRIBUTE TAX/TIP */

Object.keys(people).forEach(p=>{

let ratio =
people[p].total /
subtotal || 0;

people[p].total +=
tax*ratio +
tip*ratio;

});

/* SUMMARY */

document.getElementById("summary").innerHTML = `
Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>
`;

/* TOTALS + VENMO */

let div =
document.getElementById("totals");

div.innerHTML = "";

Object.keys(people).forEach(p=>{

let amt =
people[p].total.toFixed(2);

let venmoName =
venmoNames[p] || "";

let venmoLink =
venmoName
? `https://venmo.com/${venmoName}`
: "#";

div.innerHTML += `
<div class="result">

${p} owes $${amt}

<input
class="venmo-input"
placeholder="venmo name"
value="${venmoName}"
oninput="updateVenmo('${p}',this.value)">

<button
class="venmo-btn"
onclick="window.open('${venmoLink}','_blank')">
Venmo
</button>

</div>
`;

});

}

/* STORE VENMO NAMES */

function updateVenmo(person,name){

venmoNames[person]=name;

calc();

}

/* START */

init();
calc();

</script>

</body>
</html>
