<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:100%;
height:100%;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}

.venmo-input{
width:120px;
margin-left:6px;
font-size:11px;
padding:2px;
}

.venmo-input.default{
color:#999;
}
</style>

</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="addRow()">Add Row</button>

<br><br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");

/* ---------------- ORIGINAL DATA ---------------- */

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221"
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

/* 🔴 FIX: global storage for computed totals */
window.__peopleData = {};

/* ---------------- FIREBASE LOAD ---------------- */

function loadBill(){
billRef.onSnapshot(doc=>{
const data=doc.data();
if(!data) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

document.getElementById("taxValue").value=data.taxValue||"";
document.getElementById("tipValue").value=data.tipValue||"";
document.getElementById("taxMode").value=data.taxMode||"percent";
document.getElementById("tipMode").value=data.tipMode||"percent";

renderPeopleBar();
render();
calc();
});
}

/* ---------------- FIREBASE SAVE ---------------- */

function saveBill(){
billRef.set({
rows,
nameList,
venmoNames,
taxValue:document.getElementById("taxValue").value,
tipValue:document.getElementById("tipValue").value,
taxMode:document.getElementById("taxMode").value,
tipMode:document.getElementById("tipMode").value
});
}

/* ---------------- ORIGINAL FUNCTIONS ---------------- */

function init(){
rows=[];
for(let i=0;i<8;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}
renderPeopleBar();
render();
calc();
}

function clearAll(){
if(!confirm("Clear everything?")) return;

document.getElementById("taxValue").value="";
document.getElementById("tipValue").value="";
document.getElementById("taxMode").value="percent";
document.getElementById("tipMode").value="percent";

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
saveBill();
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
saveBill();
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
saveBill();
}

function update(i,key,val){
rows[i][key]=val;
calc();
saveBill();
}

function handlePriceInput(row, el){
el.value=el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
rows[row].price=el.value;
calc();
saveBill();
}

function toggleName(row,name){
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

if(r.selected.length===nameList.length){
r.people="EVERYONE";
}else{
r.people=r.selected.join(", ");
}

render();
calc();
saveBill();
}

function toggleEveryone(row){
let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render();
calc();
saveBill();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();
calc();
saveBill();
}

/* ENTER NAV */
function nav(e,row,col){

e.preventDefault();

let nextRow=row+1;

if(nextRow>=rows.length){
addRow();
setTimeout(()=>{
document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus();
},0);
return;
}

setTimeout(()=>{
let next=document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
if(next){
next.focus();
next.select?.();
}
},0);
}

/* ---------------- RENDER ---------------- */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>

<div class="tap-grid">
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

tapHTML+=`</div>`;

let tr=document.createElement("tr");

tr.innerHTML=`
<td><textarea data-r="${i}" data-c="0"
onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea></td>

<td><textarea data-r="${i}" data-c="1"
onkeydown="if(event.key==='Enter'){nav(event,${i},1)}"
oninput="handlePriceInput(${i},this)">${r.price}</textarea></td>

<td><textarea data-r="${i}" data-c="2"
onkeydown="if(event.key==='Enter'){nav(event,${i},2)}"
oninput="update(${i},'people',this.value)">${r.people}</textarea></td>

<td></td>
`;

body.appendChild(tr);
});
}

/* ---------------- CALC ---------------- */

function calc(){

let subtotal=0;
let people={};

let taxVal=parseFloat(document.getElementById("taxValue").value)||0;
let tipVal=parseFloat(document.getElementById("tipValue").value)||0;

let taxMode=document.getElementById("taxMode").value;
let tipMode=document.getElementById("tipMode").value;

rows.forEach(r=>{
if(r.price){
let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;

let list=r.people==="EVERYONE"
? nameList
: (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{
if(!people[p]) people[p]={subtotalShare:0};
people[p].subtotalShare+=share;
});
}
});

let taxAmount=taxMode==="percent"?subtotal*(taxVal/100):taxVal;
let tipAmount=tipMode==="percent"?subtotal*(tipVal/100):tipVal;

let total=subtotal+taxAmount+tipAmount;

Object.keys(people).forEach(p=>{
let share=people[p].subtotalShare||0;
let ratio=subtotal?share/subtotal:0;

people[p].total=share+(taxAmount*ratio)+(tipAmount*ratio);
});

/* 🔴 FIX: expose computed data safely */
window.__peopleData = people;

summary.innerHTML=`Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${taxAmount.toFixed(2)}<br>
Tip: $${tipAmount.toFixed(2)}<br>
Total: $${total.toFixed(2)}`;

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{

let venmo=venmoNames[p]||"";

div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}

<input class="venmo-input ${defaultVenmoMap[p]?'default':''}"
value="${venmo}"
oninput="venmoNames['${p}']=this.value;saveBill()">

<button class="venmo-btn"
onclick="
let amt = window.__peopleData['${p}']?.total;
if(!amt) return;
window.open('https://venmo.com/' + (venmoNames['${p}']||'') + '?txn=request&amount=' + amt.toFixed(2),'_blank')
">
Request
</button>

</div>`;
});
}

/* ---------------- START ---------------- */

init();
loadBill();

</script>

</body>
</html>
