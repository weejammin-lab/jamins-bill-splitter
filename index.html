<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}
  
.header-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
}
  
.receipt-thumb{
width:36px;
height:36px;
object-fit:cover;
border:1px solid #ccc;
border-radius:4px;
cursor:pointer;
}
  
.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
display:block;
}

.top-row{
display:flex;
gap:8px;
align-items:stretch;
margin-top:4px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:0;
}

.notes-box{
flex:1;
font-size:12px;
font-family:Arial;
padding:4px;
border:1px solid #ccc;
resize:none;
height:80px;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.lock-btn{
cursor:pointer;
}

.locked-row td{
background:#f3f3f3;
opacity:0.7;
}

.receipt-thumb{
width:36px;
height:36px;
object-fit:cover;
border:1px solid #ccc;
border-radius:4px;
cursor:pointer;
}
</style>

</head>

<body>

<div class="header-row">
<h2>Bill Splitter</h2>
<button onclick="clearAll()">Clear All</button>
</div>

<div class="top-actions">

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<input type="file"
id="receiptUpload"
accept="image/*"
style="display:none"
onchange="handleReceiptUpload(event)">

<button onclick="document.getElementById('receiptUpload').click()">
Upload Receipt
</button>

<div id="receiptPreviewContainer"></div>

</div>

<div class="top-row">
<div id="personBar"></div>
<textarea class="notes-box"
id="notesBox"
placeholder="type notes here"
oninput="saveNotes()"></textarea>
</div>

<table>
<tbody id="tableBody"></tbody>
</table>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");
const storage = firebase.storage();

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221",
freddy:"freddy-dai",
viv:"vivian-bang",
vivian:"vivian-bang",
maria:"mariapdiaz",
paarus:"paarus-ali",
anna:"anna-claire-choi",
michelle:"michelletran9",
victoria:"victoriabao",
vic:"victoriabao",
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

/* ✅ FIX: single source of truth */
let receiptUrl="";
let lastSavedReceiptUrl="";
let isLocalUpdate=false;

/* ================= RECEIPT UI ================= */

function showReceiptThumbnail(url){
if(!url) return;

const container=document.getElementById("receiptPreviewContainer");
container.innerHTML="";

const img=document.createElement("img");
img.src=url;
img.className="receipt-thumb";
img.onclick=()=>window.open(url,"_blank");

container.appendChild(img);
}

/* ================= LOAD ================= */

function loadBill(){
billRef.onSnapshot(doc=>{

if(isLocalUpdate) return;

const data=doc.data();
if(!data) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

receiptUrl=data.receiptUrl||"";
lastSavedReceiptUrl=receiptUrl;

showReceiptThumbnail(receiptUrl);

document.getElementById("notesBox").value=data.notes||"";

renderPeopleBar();
render();
calc();
});
}

/* ================= UPLOAD FIXED ================= */

async function handleReceiptUpload(event){

const file=event.target.files[0];
if(!file) return;

const storageRef=
storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);

await storageRef.put(file);

const url=await storageRef.getDownloadURL();

/* ✅ single source of truth */
receiptUrl=url;
lastSavedReceiptUrl=url;

showReceiptThumbnail(url);

/* ONLY save through main pipeline */
saveBill();

event.target.value="";
}

/* ================= SAVE FIXED ================= */

function saveBill(){

isLocalUpdate=true;

billRef.set({
rows,
nameList,
venmoNames,

/* ✅ NEVER allow undefined or wipeout */
receiptUrl: receiptUrl || lastSavedReceiptUrl || "",

notes: document.getElementById("notesBox").value
}).finally(()=>{
setTimeout(()=>isLocalUpdate=false,300);
});
}

/* ================= NOTES ================= */

function saveNotes(){
billRef.update({
notes: document.getElementById("notesBox").value
});
}

/* ================= UI FUNCTIONS (UNCHANGED) ================= */

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
let key=name.toLowerCase();
if(!name) return;

nameList.push(name);
venmoNames[key]=venmoNames[key]||"";
box.value="";

renderPeopleBar();
render();
calc();
saveBill();
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
saveBill();
}

/* ================= PLACEHOLDER ================= */

function render(){ }
function calc(){ }
function clearAll(){ }

/* ================= INIT ================= */

loadBill();

</script>

</body>
</html>
