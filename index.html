<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- ✅ FIX: prevents zoomed-out mobile scaling -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px; /* 👈 makes it feel like an app */
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width:30%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:38%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

td:nth-child(3) textarea{
min-height:70px;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
margin-top:4px;
word-break:break-word;
}

.name-btn{
margin:2px;
padding:2px 6px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:normal;
word-break:break-word;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.venmo-input{
width:120px;
margin-left:6px;
}

.result{
font-weight:bold;
margin:4px 0;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
freddy:"freddy-dai",
lin:"linlin221"
};

let defaultNames=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let nameList=[...defaultNames];

let rows=[];
let venmoNames={};

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

venmoNames={...defaultVenmoMap};

renderPeopleBar();
render();
calc();
}

function clearAll(){

if(!confirm("Clear everything?")) return;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
}

function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>
`;
});
}

function handleAddPerson(e){

if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
}

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected = (r.selected||[]).filter(p=>p!==removed);
r.people = (r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
}

function addRow(){

rows.push({
item:"",
price:"",
people:"",
selected:[]
});

render();
calc();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

function handlePriceInput(row, el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;
calc();
}

function toggleName(row,name){

let r=rows[row];
if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.length ? r.selected.join(", ") : "";

render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render();
calc();
}

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML = `
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">
EVERYONE
</button>

<div class="tap-grid">
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>
`;
});

tapHTML += `</div>`;

let tr=document.createElement("tr");

tr.innerHTML=`

<td><textarea oninput="update(${i},'item',this.value)">${r.item}</textarea></td>

<td><textarea oninput="handlePriceInput(${i},this)">${r.price}</textarea></td>

<td><textarea oninput="update(${i},'people',this.value)">${r.people}</textarea></td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(r.price){

let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;

let list =
r.people==="EVERYONE"
? nameList
: (r.people||"")
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{

if(!people[p]) people[p]={total:0};

people[p].total+=share;

});

}

});

let tax =
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

let tip =
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

Object.keys(people).forEach(p=>{

let ratio=people[p].total/subtotal||0;

people[p].total+=tax*ratio+tip*ratio;

});

summary.innerHTML=`
Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>
`;

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{

if(!venmoNames[p]){
venmoNames[p]=defaultVenmoMap[p] || "";
}

div.innerHTML+=`
<div class="result">

${p} owes $${people[p].total.toFixed(2)}

<input class="venmo-input"
value="${venmoNames[p]}"
oninput="venmoNames['${p}']=this.value">

<button onclick="openVenmo('${p}',${people[p].total.toFixed(2)})">
Venmo
</button>

</div>
`;
});

}

function openVenmo(p,amt){

let name=venmoNames[p];

if(!name){
alert("Enter Venmo username");
return;
}

window.open(
`https://venmo.com/${name}?txn=request&amount=${amt}`,
"_blank"
);

}

init();
calc();

</script>

</body>
</html>
