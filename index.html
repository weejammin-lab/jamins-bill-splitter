<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* column balance */
th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

/* TAP GRID */
.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

/* =========================
   💰 FINANCE PANEL (NEW)
   ========================= */

.finance-panel{
margin-top:10px;
border-top:1px solid #ccc;
padding-top:10px;
font-size:13px;
}

/* aligns visually with price column */
.finance-row{
display:grid;
grid-template-columns:20% 12% 20% 48%;
align-items:center;
margin:4px 0;
}

.finance-label{
text-align:right;
padding-right:8px;
font-weight:bold;
}

.finance-value{
text-align:left;
}

.finance-total{
font-weight:bold;
font-size:14px;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:3px;
font-size:12px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<!-- 🔥 FINANCE SECTION (replaces old summary/tax/tip layout) -->
<div class="finance-panel">

<!-- SUBTOTAL -->
<div class="finance-row">
<div class="finance-label">Subtotal</div>
<div class="finance-value" id="subtotalBox">$0.00</div>
</div>

<!-- TAX -->
<div class="finance-row">
<div class="finance-label">Tax</div>
<div class="finance-value">
<select id="taxMode" onchange="updatePlaceholders(); calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue"
class="tax-tip-input"
oninput="syncTax(); calc()">
</div>
</div>

<!-- TIP -->
<div class="finance-row">
<div class="finance-label">Tip</div>
<div class="finance-value">
<select id="tipMode" onchange="updatePlaceholders(); calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue"
class="tax-tip-input"
oninput="syncTip(); calc()">
</div>
</div>

<!-- TOTAL -->
<div class="finance-row finance-total">
<div class="finance-label">Total</div>
<div class="finance-value" id="totalBox">$0.00</div>
</div>

</div>

<div id="totals"></div>

<script>

let rows=[];
let nameList=["jamin","jack","cliff","willie","howard","lin","freddy"];
let venmoNames={};

function init(){
rows=[];
for(let i=0;i<5;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}
render();
calc();
updatePlaceholders();
}

function handleAddPerson(e){
if(e.key!=="Enter") return;
let v=e.target.value.trim();
if(!v) return;
nameList.push(v);
e.target.value="";
render();
calc();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();
calc();
}

function update(i,k,v){
rows[i][k]=v;
calc();
}

function handlePriceInput(i,el){
el.value=el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
rows[i].price=el.value;
calc();
}

function toggleEveryone(i){
let r=rows[i];
if(r.selected.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}
render(); calc();
}

function toggleName(i,n){
let r=rows[i];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(n);
if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(n);
r.people=r.selected.join(", ");
render(); calc();
}

/* =========================
   FINANCE LOGIC (FIXED)
   ========================= */

function getNum(v){ return parseFloat(v)||0; }

function getTax(){
let mode=taxMode.value;
let val=getNum(taxValue.value);
let subtotal=getSubtotal();

if(mode==="percent") return subtotal*val/100;
return val;
}

function getTip(){
let mode=tipMode.value;
let val=getNum(tipValue.value);
let subtotal=getSubtotal();

if(mode==="percent") return subtotal*val/100;
return val;
}

function getSubtotal(){
let sum=0;
rows.forEach(r=>{
let p=parseFloat(r.price);
if(!isNaN(p)) sum+=p;
});
return sum;
}

/* =========================
   PLACEHOLDERS
   ========================= */

function updatePlaceholders(){
if(taxMode.value==="percent"){
taxValue.placeholder="00.00%";
}else{
taxValue.placeholder="0.00";
}

if(tipMode.value==="percent"){
tipValue.placeholder="00.00%";
}else{
tipValue.placeholder="0.00";
}
}

/* =========================
   MAIN CALC
   ========================= */

function calc(){

let subtotal=getSubtotal();
let tax=getTax();
let tip=getTip();
let total=subtotal+tax+tip;

/* UI boxes */
subtotalBox.innerText=`$${subtotal.toFixed(2)}`;
totalBox.innerText=`$${total.toFixed(2)}`;

let div=document.getElementById("totals");
div.innerHTML="";

init();
calc();
updatePlaceholders();

</script>

</body>
</html>
