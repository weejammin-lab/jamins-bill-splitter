<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:4px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.item-col{width:90px;}
.price-col{width:50px;}
.people-col{width:360px;}
.tap-col{width:360px;}

input{
width:100%;
box-sizing:border-box;
}

.price-cell{
position:relative;
}

.price-cell span{
position:absolute;
left:4px;
top:3px;
color:gray;
}

/* TAP */

.name-btn{
margin:2px;
padding:3px 7px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
border-radius:4px;
background:#e0e0e0;
transition:0.15s;
}

.name-btn.selected{
background:#b8f5b8;
border-color:#7ad67a;
}

.everyone-row{
margin-bottom:4px;
}

/* TAX */

.taxbox{
width:80px;
}

/* SUMMARY */

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="summary-box" id="summary"></div>

<script>

/* PEOPLE */

let nameList=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let rows=[];

/* INIT */

function init(){

rows=[];

/* 5 starter rows */
for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:["jamin","jack","jamin, cliff, willie, howard","lin, lin, freddy","everyone"][i]
});
}

ensureTwoEmptyRows();
render();
calc();

}

/* ========================= */
/* AUTO ROW SYSTEM (CORE)    */
/* ========================= */

function isEmpty(r){
return !r.item &&
!r.price &&
(!r.people || r.people.trim()==="") &&
(!r.selected || r.selected.length===0);
}

function ensureTwoEmptyRows(){

/* ensure at least 2 empty rows always exist */

let emptyCount = rows.filter(isEmpty).length;

/* ADD rows if less than 2 empty */
while(emptyCount < 2){
rows.push({item:"",price:"",people:"",selected:[]});
emptyCount++;
}

/* REMOVE extra empties at bottom only */
for(let i=rows.length-1;i>=0;i--){
if(emptyCount > 2 && isEmpty(rows[i])){
rows.splice(i,1);
emptyCount--;
}
else break;
}

}

/* TRIGGER ROW CHECK (SAFE + CENTRALIZED) */

function triggerRowUpdate(){

ensureTwoEmptyRows();
render();

}

/* ========================= */
/* INPUT HANDLERS           */
/* ========================= */

function update(i,key,val){

rows[i][key]=val;

triggerRowUpdate();
calc();

}

function handlePriceInput(i,el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[i].price=el.value;

triggerRowUpdate();
calc();

}

/* ========================= */
/* TAP SYSTEM               */
/* ========================= */

function toggleName(row,name){

let r=rows[row];

if(!r.selected) r.selected=[];

if(r.selected.includes(name)){
r.selected=r.selected.filter(p=>p!==name);
}else{
r.selected.push(name);
}

r.people=r.selected.join(", ");

triggerRowUpdate();
calc();

}

function toggleEveryone(row){

let r=rows[row];

if(r.selected && r.selected.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

triggerRowUpdate();
calc();

}

/* ========================= */
/* RENDER                   */
/* ========================= */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

tapHTML+=`
<div class="everyone-row">
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

/* names */

nameList.forEach(n=>{

let selected=r.selected?.includes(n);

tapHTML+=`
<button class="name-btn ${selected?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>
`;

});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input placeholder="${r.placeholder}"
value="${r.item||''}"
oninput="update(${i},'item',this.value)">
</td>

<td class="price-cell">
<span>$</span>
<input type="text" inputmode="decimal"
value="${r.price||''}"
oninput="handlePriceInput(${i},this)">
</td>

<td>
<input placeholder="${r.placeholder}"
value="${r.people||''}"
oninput="update(${i},'people',this.value)">
</td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

/* ========================= */
/* CALC                     */
/* ========================= */

function calc(){

let subtotal=0;

rows.forEach(r=>{

if(r.price){

subtotal += parseFloat(r.price);

}

});

document.getElementById("summary").innerHTML=
"Subtotal: $" + subtotal.toFixed(2);

}

/* ========================= */
/* CLEAR                    */
/* ========================= */

function clearAll(){

rows=[];
init();

}

/* START */

init();

</script>

</body>
</html>
