<script>

/* ENTER NAVIGATION (FIXED PROPERLY) */

function ensureRowExists(index){

if(index === rows.length - 1){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:""
});

render();
}
}

/* MOVE DOWN (FIXED) */

function moveDown(e,row,col){

if(e.key !== "Enter") return;

e.preventDefault();

/* make sure next row exists BEFORE moving */
ensureRowExists(row);

setTimeout(()=>{

let next=document.querySelector(
`[data-row='${row+1}'][data-col='${col}']`
);

if(next){
next.focus();
next.select?.();
}

},0);

}

/* PRICE INPUT */

function handlePriceInput(row, el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;

calc();
}

/* COMMIT PRICE (keep for blur safety) */

function commitPrice(e,row,el){

if(e && e.key!=="Enter") return;

rows[row].price=el.value;

calc();
}

/* UPDATE */

function update(i,key,val){

rows[i][key]=val;
calc();

}

</script>
