<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 1100px;
    margin: auto;
}

/* People Bar */

.person-tag {

    display:inline-block;
    border:1px solid #ccc;
    padding:3px 6px;
    margin:2px;
    font-size:12px;

}

.delete-person {
    color:red;
    cursor:pointer;
    margin-left:4px;
}

/* Add Person Input */

.add-person-input {

    padding:4px;
    font-size:12px;
    width:140px;
    margin-top:4px;

}

/* Table */

table {
    width:100%;
    border-collapse:collapse;
    font-size:12px;
}

td, th {
    border:1px solid #ddd;
    padding:3px;
}

/* Column widths */

.item-col { width:90px; }

.price-col { width:25px; }  /* HALVED */

.people-col { width:340px; }

.tap-col { width:340px; }

/* Inputs full width */

input {
    width:100%;
    box-sizing:border-box;
}

/* Price */

.price-cell {
    position:relative;
}

.price-cell span {
    position:absolute;
    left:4px;
    top:3px;
    color:gray;
}

.price-cell input {
    padding-left:10px;
}

/* Tap buttons */

.name-btn {

    margin:2px;
    padding:2px 6px;
    font-size:11px;
    cursor:pointer;

}

.everyone-row {
    margin-bottom:4px;
}

/* Summary */

.summary-box {

    border:1px solid #ccc;
    padding:8px;
    margin-top:8px;

}

.result {

    font-weight:bold;
    margin:4px 0;

}

.venmo-input {

    width:120px;
    margin-left:6px;

}

</style>

</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">
Clear All
</button>

<br><br>

<!-- PEOPLE BAR -->

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>

<tr>

<th class="item-col">
Item (optional)
</th>

<th class="price-col">
Price ($)
</th>

<th class="people-col">
People involved
</th>

<th class="tap-col">
Tap Names
</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

Tax

<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue"
type="number"
oninput="calc()">

Tip

<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue"
type="number"
oninput="calc()">

<div class="summary-box" id="summary"></div>

<div id="totals"></div>

<script>

/* PEOPLE ORDER FIXED */

let nameList=[
"jamin",
"jack",
"cliff",
"willie",
"howard",
"lin",
"freddy"
];

/* PLACEHOLDERS */

let placeholders=[
"jamin",
"jack",
"jamin, cliff, willie, howard",
"lin, lin, freddy (type the extra name for uneven splits)",
"everyone"
];

let rows=[];
let venmoNames={};

/* INIT */

function init(){

rows=[];

for(let i=0;i<5;i++){

rows.push({
item:"",
price:"",
people:"",
placeholder:placeholders[i]
});

}

renderPeopleBar();
render();

}

/* ADD PERSON INLINE */

function handleAddPerson(e){

if(e.key==="Enter"){

let box=document.getElementById("addPersonBox");

let name=box.value.trim();

if(!name) return;

nameList.push(name);

box.value="";

renderPeopleBar();
render();
calc();

}

}

/* PEOPLE BAR */

function renderPeopleBar(){

let bar=document.getElementById("personBar");

bar.innerHTML="";

nameList.forEach((n,i)=>{

bar.innerHTML+=`

<span class="person-tag">

${n}

<span
class="delete-person"
onclick="deletePerson(${i})">
✖
</span>

</span>

`;

});

}

/* DELETE PERSON */

function deletePerson(i){

let removed=nameList[i];

nameList.splice(i,1);

rows.forEach(r=>{

if(r.people){

let list=r.people
.split(",")
.map(p=>p.trim())
.filter(p=>p!==removed);

r.people=list.join(", ");

}

});

renderPeopleBar();
render();
calc();

}

/* ADD ROW */

function addRow(){

rows.push({
item:"",
price:"",
people:"",
placeholder:"everyone"
});

}

/* EXPAND */

function maybeExpand(){

let last=rows[rows.length-1];

if(last.price || last.people){

addRow();
render();

}

}

/* ENTER NAVIGATION */

function moveNextRow(e,row,col){

if(e.key==="Enter"){

e.preventDefault();

let next=row+1;

let inputs=document.querySelectorAll(
`[data-col='${col}']`
);

if(inputs[next])
inputs[next].focus();

}

}

/* RENDER */

function render(){

let body=document.getElementById("tableBody");

body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

/* Everyone */

tapHTML+=
`<div class="everyone-row">

<button
class="name-btn"
onclick="toggleEveryone(${i})">
everyone
</button>

</div>`;

/* Names */

nameList.forEach(n=>{

tapHTML+=
`<button
class="name-btn"
onclick="toggleName(${i},'${n}')">
${n}
</button>`;

});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>

<input
data-col="0"
value="${r.item}"
onkeydown="moveNextRow(event,${i},0)"
oninput="update(${i},'item',this.value)">

</td>

<td class="price-cell">

<span>$</span>

<input
data-col="1"
type="number"
step="0.01"
value="${r.price}"
onkeydown="moveNextRow(event,${i},1)"
oninput="update(${i},'price',this.value)">

</td>

<td>

<input
data-col="2"
value="${r.people}"
placeholder="${r.placeholder}"
onkeydown="moveNextRow(event,${i},2)"
oninput="update(${i},'people',this.value)">

</td>

<td>

${tapHTML}

</td>

`;

body.appendChild(tr);

});

}

/* TOGGLE */

function toggleName(row,name){

let r=rows[row];

if(r.people==="everyone"){

r.people=name;

}

else{

let list=r.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

if(list.includes(name)){

list=list.filter(p=>p!==name);

}

else{

list.push(name);

}

r.people=list.join(", ");

}

render();
calc();

}

/* EVERYONE TOGGLE */

function toggleEveryone(row){

let r=rows[row];

if(r.people==="everyone"){

r.people="";

}

else{

r.people="everyone";

}

render();
calc();

}

/* UPDATE */

function update(i,key,val){

rows[i][key]=val;

maybeExpand();

calc();

}

/* CLEAR */

function clearAll(){

venmoNames={};

init();
calc();

}

/* CALCULATION */

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(r.price){

let price=parseFloat(r.price);

subtotal+=price;

let list=
r.people==="everyone"
? nameList
: r.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{

if(!people[p])
people[p]={total:0};

people[p].total+=share;

});

}

});

/* TAX */

let tax=
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

/* TIP */

let tip=
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

/* DISTRIBUTE */

Object.keys(people).forEach(p=>{

let ratio=
people[p].total/subtotal||0;

people[p].total+=
tax*ratio+
tip*ratio;

});

/* SUMMARY */

summary.innerHTML=

`Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>`;

/* VENMO */

let div=document.getElementById("totals");

div.innerHTML="";

Object.keys(people).forEach(p=>{

if(!venmoNames[p])
venmoNames[p]="";

let amt=people[p].total.toFixed(2);

div.innerHTML+=`

<div class="result">

${p} owes $${amt}

<input
class="venmo-input"
value="${venmoNames[p]}"
oninput="venmoNames['${p}']=this.value">

<button
onclick="openVenmo('${p}',${amt})">
Venmo
</button>

</div>

`;

});

}

/* VENMO LINK */

function openVenmo(p,amt){

let name=venmoNames[p];

if(!name){
alert("Enter Venmo name");
return;
}

window.open(
`https://venmo.com/${name}?txn=pay&amount=${amt}`,
"_blank"
);

}

/* START */

init();
calc();

</script>

</body>
</html>
