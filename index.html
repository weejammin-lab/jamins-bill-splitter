<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

/* ✅ CHANGE 1: taller people column */
td:nth-child(3) textarea{
min-height:70px;
}

/* TAP GRID */
.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
word-break:break-word;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
freddy:"freddy-dai",
lin:"linlin221"
};

let defaultNames=[
"jamin","jack","cliff","willie","howard","lin"
];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={};

function init(){

rows=[];

for(let i=0;i<8;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

venmoNames={...defaultVenmoMap};

renderPeopleBar();
render();
calc();
}

function clearAll(){
if(!confirm("Clear everything?")) return;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
}

function addRow(){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
render();
calc();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

function handlePriceInput(row, el){
el.value=el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
rows[row].price=el.value;
calc();
}

function toggleName(row,name){
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

if(r.selected.length === nameList.length){
r.people = "EVERYONE";
}else{
r.people = r.selected.length ? r.selected.join(", ") : "";
}

render();
calc();
}

function toggleEveryone(row){
let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render();
calc();
}

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>

<div class="tap-grid">
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

tapHTML+=`</div>`;

let tr=document.createElement("tr");

tr.innerHTML=`
<td>
<textarea onkeydown="if(event.key==='Enter'){event.preventDefault();nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea>
</td>

<td>
<textarea onkeydown="if(event.key==='Enter'){event.preventDefault();nav(event,${i},1)}"
oninput="handlePriceInput(${i},this)">${r.price}</textarea>
</td>

<td>
<textarea onkeydown="if(event.key==='Enter'){event.preventDefault();nav(event,${i},2)}"
oninput="update(${i},'people',this.value)">${r.people}</textarea>
</td>

<td>${tapHTML}</td>
`;

body.appendChild(tr);

});

}

function calc(){

let subtotal=0;
let people={};

let taxVal=parseFloat(document.getElementById("taxValue").value)||0;
let tipVal=parseFloat(document.getElementById("tipValue").value)||0;

let taxMode=document.getElementById("taxMode").value;
let tipMode=document.getElementById("tipMode").value;

rows.forEach(r=>{

if(r.price){
let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;

let list=r.people==="EVERYONE"
? nameList
: (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{
if(!people[p]) people[p]={subtotalShare:0};
people[p].subtotalShare+=share;
});
}

});

let taxAmount = taxMode==="percent" ? subtotal*(taxVal/100) : taxVal;
let tipAmount = tipMode==="percent" ? subtotal*(tipVal/100) : tipVal;

let total = subtotal + taxAmount + tipAmount;

Object.keys(people).forEach(p=>{
let share = people[p].subtotalShare || 0;
let ratio = subtotal ? share/subtotal : 0;

people[p].total = share + (taxAmount*ratio) + (tipAmount*ratio);
});

summary.innerHTML=`
Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${taxAmount.toFixed(2)}<br>
Tip: $${tipAmount.toFixed(2)}<br>
Total: $${total.toFixed(2)}
`;

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{
div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}
</div>`;
});

}

/* navigation helper still assumed existing in your earlier version */
function nav(e,row,col){
let next=row+1;
let el=document.querySelector(`[data-r="${next}"][data-c="${col}"]`);
if(el) el.focus();
}

init();

</script>

</body>
</html>
