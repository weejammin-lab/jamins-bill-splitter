<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

<title>Bill Splitter</title>

<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --accent: #7c6af7;
  --accent-light: #ede9ff;
  --accent2: #f06a6a;
  --accent2-light: #fff0f0;
  --green: #3ecf76;
  --green-light: #e8faf0;
  --border: #e2dfd8;
  --text: #2d2a26;
  --muted: #9c9690;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; touch-action: pan-x pan-y; }

body {
  font-family: 'DM Sans', Arial, sans-serif;
  max-width: 390px;
  margin: auto;
  padding: 10px 10px 40px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

html, body {
  overscroll-behavior-y: contain;
}

.receipt-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.receipt-overlay img {
  max-width: 90%;
  max-height: 90%;
  border-radius: var(--radius);
  object-fit: contain;
}

.header-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.load-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 4px;
}

.header-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: flex-start;
  padding-left: 6px;
}

.receipt-thumb {
  width: 42px;
  height: 42px;
  object-fit: cover;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: block;
  flex-shrink: 0;
}
.receipt-thumb-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 7px;
  flex: 1;
}

/* CHANGED: extra margin-left on ocr-btn so gap from X is ~20px more */
.receipt-thumb-wrap .ocr-btn {
  margin-left: 20px;
}

.ocr-btn {
  font-size: 11px;
  padding: 3px 7px;
  background: var(--accent-light);
  border: 1.5px solid var(--accent);
  border-radius: 20px;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.ocr-btn:hover { background: #d8d0ff; }
.ocr-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.remove-receipt {
  font-size: 19px;
  color: var(--accent2);
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
  padding: 2px 4px;
  font-weight: bold;
  flex-shrink: 0;
}

.action-row {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-bottom: 3px;
  flex-wrap: nowrap;
}
.right-actions {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

/* CHANGED: position:relative so the return btn can be positioned inside */
.name-input-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
  position: relative;
}
.people-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0; padding: 0; line-height: 1;
}

/* CHANGED: extra right padding for the return arrow */
.add-person-input {
  padding: 5px 30px 5px 8px;
  font-size: 14px;
  width: 145px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.add-person-input:focus { border-color: var(--accent); }
.add-person-input::placeholder { color: var(--muted); font-size: 12px; }

/* Return arrow button inside the input field */
.add-person-return-btn {
  position: absolute;
  right: 7px;
  bottom: 4px;
  width: 20px;
  height: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  cursor: pointer;
  padding: 0;
  color: var(--muted);
  transition: color 0.15s, transform 0.1s;
  border-radius: 50%;
}
.add-person-return-btn:hover { color: var(--accent); transform: scale(1.15); }
.add-person-return-btn svg { width: 14px; height: 14px; display: block; }

.upload-btn {
  font-size: 12px;
  padding: 5px 6px;
  white-space: normal;
  word-break: break-word;
  width: 68px;
  height: 42px;
  line-height: 1.2;
  text-align: center;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, background 0.15s;
}
.upload-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }

#mainContentSection th {
  font-size: 16px;
}

#billDropdown {
  font-size: 14px;
  padding: 5px 8px;
  width: 220px;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.save-bill-btn {
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 54px;
  text-align: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, background 0.15s;
  box-shadow: 0 2px 6px rgba(124,106,247,0.25);
}
.save-bill-btn:hover { background: #6a58e5; }
.save-bill-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

/* CHANGED: bigger New Bill button */
#newBillBtn {
  font-size: 15px;
  font-weight: 700;
  padding: 8px 15px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}
#newBillBtn:hover { background: #444; }

.archive-save-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  min-height: 26px;
}
.archived-label {
  color: var(--accent2);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent2-light);
  padding: 2px 8px;
  border-radius: 20px;
}
.archived-row {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 4px;
  min-height: 16px;
}

.top-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
  margin-top: 0px;
  margin-bottom: 8px;
}

/* CHANGED: fixed 2-row grid, each cell has fixed height so <=3 names doesn't shrink */
#personBar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-auto-rows: 38px;
  gap: 4px;
  flex: 1;
  max-width: 50%;
  margin-bottom: 2px;
  align-content: start;
}
.person-tag {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 3px 4px;
  font-size: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 8px;
  box-shadow: var(--shadow);
  height: 38px;
}
.delete-person {
  color: var(--accent2) !important;
  cursor: pointer;
  margin-left: 0;
  -webkit-text-fill-color: var(--accent2);
  font-size: 11px;
}

.notes-box {
  flex: 0 0 50%;
  max-width: 50%;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  resize: none;
  height: 86px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  outline: none;
  transition: border-color 0.15s;
}
.notes-box { text-align: left; }
.notes-box::placeholder { text-align: center; }
.notes-box:focus { border-color: var(--accent); }
.notes-box::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

/* ── Table ── */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
}

td, th {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 2px;
  vertical-align: top;
}
td:last-child, th:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }

thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--accent-light);
}
thead th {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--accent);
  padding: 5px 4px;
}

th:nth-child(1), td:nth-child(1) { width: 9%; }
th:nth-child(2), td:nth-child(2) { width: 23%; }
th:nth-child(3), td:nth-child(3) { width: 15%; }
th:nth-child(4), td:nth-child(4) { width: 53%; }

td.item-cell {
  padding: 0;
  position: relative;
}
td.item-cell textarea {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  min-height: unset;
}

td textarea {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  font-size: 14px;
  resize: none;
  overflow: hidden;
  border: none;
  padding: 3px 4px;
  font-family: 'DM Sans', sans-serif;
  display: block;
  min-height: 50px;
  background: transparent;
  color: var(--text);
  outline: none;
}
td:nth-child(3) textarea {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  min-height: 23px;
  height: 23px;
  padding: 1px;
}
td textarea::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

td.clickable-cell { cursor: text; }

/* ── Swipe-to-delete ── */
/* The people-td clips overflow so the delete btn is only visible when tr slides left */
.people-td {
  position: relative;
  overflow: hidden;
  padding: 0;
}

.people-content {
  padding: 2px;
}

/* Delete button: pinned to right edge of people-td, hidden off-right via translateX(100%) */
.swipe-delete-btn {
  position: absolute;
  top: 0;
  right: 0;
  width: 70px;
  height: 100%;
  background: var(--accent2);
  color: #fff;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transform: translateX(100%);
  transition: transform 0.2s ease;
}

/* tr slides left on swipe */
.swipe-tr {
  transform: translateX(0);
  transition: transform 0.2s ease;
  will-change: transform;
  background: var(--card);
  position: relative;
}
.swipe-tr.locked-row td { background: #fafaf9; opacity: 0.85; }
.swipe-tr.locked-row textarea { background: transparent; }
.swipe-tr.swiped-open { transform: translateX(-70px); }
.swipe-tr.swiped-open .swipe-delete-btn { transform: translateX(0); }

/* CHANGED: lock-cell with proper spacing for lock icon and eraser */
.lock-cell-td {
  text-align: center;
  vertical-align: top;
}
.lock-cell-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0px 2px 6px 2px;
  min-height: 90px;
}
.lock-row-num {
  font-size: 11px;
  color: var(--muted);
  margin-top: 4px;
  margin-bottom: 2px;
}
/* CHANGED: lock button slightly bigger */
.lock-btn {
  padding: 3px 5px;
  font-size: 14px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  transition: 0.15s;
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
  margin-top: 2px;
}
.lock-btn.locked { background: var(--accent2-light); border-color: var(--accent2); }
.lock-btn.unlocked { opacity: 0.6; }

/* Spacer: pushes eraser down so gap between lock and eraser is >= 20px */
.lock-erase-spacer {
  flex: 1;
  min-height: 20px;
}

.erase-btn {
  width: 28px;
  height: 20px;
  cursor: pointer;
  border: none;
  background: transparent;
  padding: 0;
  opacity: 0.75;
  transition: opacity 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.erase-btn:hover:not(:disabled) { opacity: 1; transform: scale(1.15); }
.erase-btn:disabled { opacity: 0.25; cursor: not-allowed; }
.erase-btn svg { width: 26px; height: 18px; display: block; }

.tap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 2px;
}
.name-btn {
  margin: 1px;
  padding: 4px 2px;
  font-size: 13px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.name-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.name-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}
.everyone-btn {
  width: calc(100% - 4px);
  margin: 0 2px 4px 2px;
  font-size: 14px;
  padding: 4px 1px;
  border-radius: 20px;
  background: #f7f6f3;
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.everyone-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}

/* CHANGED: Undo button same style as +1 Row, add5Rows, etc. */
#addRowBtn, #add5RowsBtn, #deleteEmptyRowsBtn, #undoBtn {
  font-size: 12px;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
  height: 28px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}
#addRowBtn:hover, #add5RowsBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#deleteEmptyRowsBtn:hover { border-color: var(--accent2); background: var(--accent2-light); }
#undoBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#undoBtn:disabled { opacity: 0.35; cursor: not-allowed; }

#deleteMsg {
  font-size: 12px;
  color: var(--accent2);
  padding: 4px 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.tax-tip-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.tax-tip-wrap label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: 26px;
}
.tax-tip-wrap select {
  font-size: 13px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.tax-tip-input {
  width: 70px;
  padding: 4px 8px;
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.tax-tip-input:focus { border-color: var(--accent); }

/* CHANGED: summary box is flexible width */
.summary-save-row {
  display: flex;
  align-items: flex-start;
  justify-content: flex-start;
  margin-top: 10px;
  gap: 8px;
}
.summary-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  width: auto;
  min-width: 160px;
  max-width: 100%;
  box-shadow: var(--shadow);
  display: inline-block;
}
.sum-table {
  font-family: 'DM Mono', monospace;
  width: 100%;
  font-size: 12px;
}
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 12px;
  align-items: center;
  white-space: nowrap;
  padding: 1px 0;
}
.label { text-align: left; white-space: nowrap; color: var(--muted); }
.value { text-align: right; white-space: nowrap; }
.total .label, .total .value {
  font-weight: bold;
  color: var(--text);
  font-size: 13px;
  padding-top: 3px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}

.result {
  font-weight: 600;
  margin: 5px 0;
  font-size: 14px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 4px;
}

.venmo-btn {
  margin-left: auto;
  font-size: 12px;
  background: #3d95ce;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
}
.venmo-btn:hover { background: #2f7eb8; }

.bill-actions-row {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 40px;
}
.archive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: #fff8e1;
  border: 1.5px solid #f0c040;
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.unarchive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--green-light);
  border: 1.5px solid var(--green);
  border-radius: 20px;
  color: #1a8a45;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.delete-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--accent2-light);
  border: 1.5px solid var(--accent2);
  border-radius: 20px;
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.row-btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
.archived-section { opacity: 0.75; }
.th-people { line-height: 1.3; }

#tableBody { position: relative; }
</style>

</head>
<body>

<div class="header-row">
  <button id="newBillBtn" onclick="clearAll()">+ New Bill</button>

  <div class="header-center">
    <input type="file"
      id="receiptUpload"
      accept="image/*"
      style="display:none"
      onchange="handleReceiptUpload(event)">
    <button class="upload-btn" id="uploadReceiptBtn" onclick="document.getElementById('receiptUpload').click()">
      Upload Receipt
    </button>
    <div id="receiptPreviewContainer"></div>
  </div>
</div>

<div class="load-row">
  <select id="billDropdown" onchange="loadSavedBill(this.value)">
    <option value="" disabled selected style="color:#aaa;">— load a saved bill —</option>
  </select>

  <div class="name-input-wrap">
    <span class="people-label">Add Person</span>
    <input class="add-person-input"
      id="addPersonBox"
      placeholder="type name + Enter"
      onkeydown="handleAddPerson(event)">
    <!-- Pretty return/enter arrow button -->
    <button class="add-person-return-btn" title="Add person" onclick="addPersonFromBtn()">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">

// ── Undo stack (up to 5 undos, can't undo past last save) ──

function captureUndoState(){

    rows: JSON.parse(JSON.stringify(rows)),

function pushUndo(){
  const state = captureUndoState();
  if(undoStack.length > 0 && undoStack[undoStack.length-1] === state) return;
  undoStack.push(state);
  if(undoStack.length > MAX_UNDO + 1){
    undoStack.shift();
    if(undoSaveFloor > 0) undoSaveFloor--;
  }
  updateUndoBtn();
}

function markSaveInUndo(){
  // Push current state then set floor so user can't undo past this
  const state = captureUndoState();
  if(undoStack.length === 0 || undoStack[undoStack.length-1] !== state) undoStack.push(state);
  undoSaveFloor = undoStack.length - 1;
  updateUndoBtn();
}

function updateUndoBtn(){
  const btn = document.getElementById("undoBtn");
  if(!btn) return;
  btn.disabled = undoStack.length <= 1 || (undoStack.length - 1) <= undoSaveFloor;
}

function applyUndoState(state){

function doUndo(){
  if(undoStack.length <= 1 || (undoStack.length - 1) <= undoSaveFloor) return;
  undoStack.pop();
  const prev = undoStack[undoStack.length - 1];
  applyUndoState(prev);
  updateUndoBtn();
}

// ── Tax/tip: max 5 digits total (e.g. 666.66 ok, 6666.66 not → 6666.6) ──
function enforceTaxTipDigits(el){
  let val = el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
  const dotIdx = val.indexOf(".");
  const digits = val.replace(/\./g,"");
  if(digits.length > 5){
    if(dotIdx === -1){
      val = val.slice(0, 5);
    } else {
      const intPart = val.slice(0, dotIdx);
      const decPart = val.slice(dotIdx + 1);
      const combined = intPart + decPart;
      const trimmed = combined.slice(0, 5);
      const newDotIdx = Math.min(dotIdx, trimmed.length);
      val = trimmed.slice(0, newDotIdx) + (newDotIdx < trimmed.length ? "." + trimmed.slice(newDotIdx) : "");
    }
  }
  el.value = val;
}

function parseReceiptText(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const rightPriceRegex = /\$?\s*(\d+\.\d{2})\s*$/;
  const skipKeywords = /\b(subtotal|sub[-\s]?total|total|tax|tip|gratuity|service\s*fee|surcharge|discount|change|cash|credit|debit|visa|mastercard|amex|discover|balance|amount\s*due|amount\s*paid|thank|receipt|order\s*#|table\s*#|server|guest|check\s*#|qty|quantity|void|comp)\b/i;

  const parsed = [];
  lines.forEach(line => {
    const priceMatch = line.match(rightPriceRegex);
    if(!priceMatch) return;
    const price = priceMatch[1];
    const priceFloat = parseFloat(price);
    if(priceFloat <= 0 || priceFloat > 300) return;
    if(skipKeywords.test(line)) return;
    let item = line.slice(0, line.length - priceMatch[0].length).trim();
    item = item.replace(/^[^a-zA-Z0-9]+/, '').trim();
    item = item.replace(/[\.\-\*\_\s]+$/, '').trim();
    if(!item || !/[a-zA-Z]/.test(item)) return;
    if(item.length < 2) return;
    parsed.push({ item, price });
  });

  if(parsed.length === 0){
    alert("No items found. Try a flat, well-lit photo with prices clearly on the right side.");
    return;
  }

  pushUndo();
  const lockedRows = rows.filter(r => r.locked);
  rows = [...lockedRows];
  parsed.forEach(p => {
    rows.push({ item: p.item, price: p.price, people: '', selected: [], locked: false });
  });
  while(rows.length < 5){
    rows.push({ item:'', price:'', people:'', selected:[], locked:false });
  }
  render(); calc(); saveBill(); markDirty();
}

async function runOCR(){
  if(isArchived) return;
  if(!receiptFileRef && !receiptUrl){ alert("No receipt uploaded."); return; }
  const btn = document.getElementById("ocrBtn");
  if(btn){ btn.textContent = "Scanning…"; btn.disabled = true; }
  try {
    const source = receiptFileRef || receiptUrl;
    const { data: { text } } = await Tesseract.recognize(source, 'eng');
    parseReceiptText(text);
  } catch(err){
    alert("Scan failed — please try again.");
    console.error(err);
  } finally {
    if(btn){ btn.textContent = "Use AI"; btn.disabled = false; }
  }
}

async function handleReceiptUpload(event){
  if(isArchived) return;
  const file = event.target.files[0];
  if(!file) return;
  if(receiptUrl){
    const confirmed = await confirmAction("Replace the current receipt with this new one?");
    if(!confirmed){ event.target.value = ""; return; }
  }
  if(file.size > 15 * 1024 * 1024){
    alert("Image too large. Please upload a photo under 15MB.");
    event.target.value = ""; return;
  }
  isUploadingReceipt = true; isLocalUpdate = true;
  try {
    const storageRef = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
    await storageRef.put(file);
    const url = await storageRef.getDownloadURL();
    receiptUrl = url; lastSavedReceiptUrl = url; receiptFileRef = file;
    showReceiptThumbnail(url);
    await billRef.set({
      rows, nameList, venmoNames, receiptUrl: url,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value,
      currentLoadedBillId, currentLoadedBillTitle, isArchived
    });
    markDirty();
  } finally {
    event.target.value = "";
    setTimeout(()=>{ isUploadingReceipt = false; isLocalUpdate = false; }, 500);
  }
}

  isLocalUpdate = true;
  if(!receiptUrl || receiptUrl.length < 5) receiptUrl = lastSavedReceiptUrl || "";
  billRef.set({

    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId, currentLoadedBillTitle, isArchived
  }).then(()=>{
    if(receiptUrl && receiptUrl.length > 5) lastSavedReceiptUrl = receiptUrl;
  }).finally(()=>{ setTimeout(()=>isLocalUpdate=false, 300); });
}

function getCurrentBillData(){
  return {
    rows, nameList, venmoNames,
    receiptUrl: receiptUrl || "",
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value
  };
}

function showSavedFeedback(){
  ["saveBillBtn","saveBillBtnBottom"].forEach(id => {
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.dataset.feedback = "1";
    btn.textContent = "saved!"; btn.style.color = "#fff";
    btn.style.fontSize = "12px"; btn.style.background = "#3ecf76"; btn.disabled = true;
    setTimeout(()=>{
      btn.dataset.feedback = "0";
      btn.style.color = btn.style.fontSize = btn.style.background = "";
      updateSaveButtonState();
    }, 750);
  });
}

async function saveNewBill(){
  if(isArchived) return;
  if(currentLoadedBillId){
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData() });
    isDirty = false;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    markSaveInUndo();
    showSavedFeedback();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
  } else {
    let title = prompt("Enter a title for this bill (max 15 characters):");
    if(!title || !title.trim()) return;
    title = title.trim().slice(0,15);
    const billData = { title, savedAt: newBillFirstInputDate || Date.now(), ...getCurrentBillData() };
    const docRef = await db.collection("savedBills").add(billData);
    currentLoadedBillId = docRef.id; currentLoadedBillTitle = title;
    isDirty = false; newBillFirstInputDate = null;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    markSaveInUndo();
    saveBill();
    alert(`"${title}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = docRef.id;
    updateSaveButtonState(); updateArchivedUI();
  }
}

async function toggleArchive(){
  if(!currentLoadedBillId){ alert("Save this bill first before archiving."); return; }
  if(isArchived){
    const pw = prompt("Enter password to unarchive:");
    if(!pw) return;
    if(pw.trim().toLowerCase() !== "unarchive"){ alert("Incorrect password."); return; }
    rows.forEach(r => r.locked = false);
    await db.collection("savedBills").doc(currentLoadedBillId).update({ archived: false, rows });
    isArchived = false; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been unarchived.`);
  } else {
    const confirmed = confirm(`Archive "${currentLoadedBillTitle}"?\n\nArchived Bills can't be edited but can still be viewed.`);
    if(!confirmed) return;
    rows.forEach(r => r.locked = true);
    rows = rows.filter(r => r.price || r.item || (r.selected && r.selected.length));
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData(), rows, archived: true });
    isArchived = true; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been archived.`);
  }
}

async function deleteBill(){
  if(isArchived){ alert("Archived bills cannot be deleted."); return; }
  if(!currentLoadedBillId){ alert("This bill hasn't been saved yet — nothing to delete."); return; }
  const confirmed = confirm(`Delete "${currentLoadedBillTitle}"? This cannot be undone.`);
  if(!confirmed) return;
  await db.collection("savedBills").doc(currentLoadedBillId).delete();
  doNewBill();
}

async function loadSavedBillsList(){
  const snapshot = await db.collection("savedBills").orderBy("savedAt","desc").limit(10).get();
  const dropdown = document.getElementById("billDropdown");
  const currentVal = currentLoadedBillId || "";
  dropdown.innerHTML = "";
  if(!currentLoadedBillId){
    const ph = document.createElement("option");
    ph.value = ""; ph.textContent = "— load a saved bill —";
    ph.disabled = true; ph.selected = true; ph.style.color = "#aaa";
    dropdown.appendChild(ph);
  }
  snapshot.forEach(doc => {
    const d = doc.data();
    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = `${d.title} (${formatDate(d.savedAt)})${d.archived ? "🔒" : ""}`;
    dropdown.appendChild(opt);
  });
  if(currentVal) dropdown.value = currentVal;
}

async function loadSavedBill(id){
  if(!id) return;
  const proceed = await checkUnsavedBill();
  if(!proceed){ document.getElementById("billDropdown").value = currentLoadedBillId || ""; return; }
  const doc = await db.collection("savedBills").doc(id).get();
  const data = doc.data();
  if(!data) return;
  currentLoadedBillId = id; currentLoadedBillTitle = data.title;
  isArchived = data.archived || false; isDirty = false; newBillFirstInputDate = null;
  rows = data.rows || []; nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || ""; lastSavedReceiptUrl = receiptUrl; receiptFileRef = null;
  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";
  if(receiptUrl) showReceiptThumbnail(receiptUrl);
  else document.getElementById("receiptPreviewContainer").innerHTML = "";
  loadedSnapshot = JSON.stringify({
    rows, nameList, receiptUrl,
    taxValue: data.taxValue || "", tipValue: data.tipValue || "",
    taxMode: data.taxMode || "amount", tipMode: data.tipMode || "amount",
    notes: data.notes || ""
  });
  undoStack = [captureUndoState()];
  undoSaveFloor = 0;
  updateUndoBtn();
  saveBill();
  await loadSavedBillsList();
  document.getElementById("billDropdown").value = id;
  updateSaveButtonState(); updateArchivedUI();
  renderPeopleBar(); render(); calc();
}

function saveNotes(){

}

function toggleLock(row){

  pushUndo();
  rows[row].locked = !rows[row].locked;
  render(); saveBill(); markDirty();
}

function eraseRow(i){
  if(isArchived || rows[i].locked) return;
  pushUndo();
  rows[i] = { item:"", price:"", people:"", selected:[], locked:false };
  render(); calc(); saveBill(); markDirty();
}

function update(i, key, val){
  if(isArchived || rows[i].locked) return;
  rows[i][key] = val;
  calc(); markDirty();

function handlePriceInput(row, el){
  if(isArchived || rows[row].locked){ el.value = rows[row].price; return; }
  el.value = el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
  rows[row].price = el.value;
  calc(); markDirty();
}

function toggleName(row, name){
  if(isArchived || rows[row].locked) return;
  pushUndo();
  const r = rows[row];
  if(!r.selected) r.selected = [];
  const idx = r.selected.indexOf(name);
  if(idx > -1) r.selected.splice(idx,1); else r.selected.push(name);
  r.people = r.selected.length === nameList.length ? "EVERYONE" : r.selected.join(", ");
  render(); calc(); saveBill(); markDirty();
}

function toggleEveryone(row){
  if(isArchived || rows[row].locked) return;
  pushUndo();
  const r = rows[row];
  if(r.selected?.length === nameList.length){ r.selected = []; r.people = ""; }
  else { r.selected = [...nameList]; r.people = "EVERYONE"; }
  render(); calc(); saveBill(); markDirty();
}

}

function add5Rows(){

function deleteEmptyRows(){
  if(isArchived) return;
  pushUndo();
  const before = rows.length;
  rows = rows.filter(r => r.locked || r.item || r.price || (r.selected && r.selected.length > 0));
  if(rows.length === 0) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  const removed = before - rows.length;

  const deleteBtn = document.getElementById("deleteEmptyRowsBtn");
  const msg = document.getElementById("deleteMsg");
  if(deleteBtn) deleteBtn.style.display = "none";
  if(msg){
    msg.style.display = "inline";

  }
  setTimeout(()=>{
    if(deleteBtn) deleteBtn.style.display = "";
    if(msg) msg.style.display = "none";
  }, 2000);

  render(); calc(); saveBill(); markDirty();
}

function deleteRow(i){
  if(isArchived) return;
  if(rows[i] && rows[i].locked) return;
  pushUndo();
  rows.splice(i,1);

  render(); calc(); saveBill(); markDirty();

function nav(e, row, col){
  e.preventDefault();

  if(nextRow >= rows.length){
    addRow();

  setTimeout(()=>{

    if(next){ next.focus(); next.select?.(); }
  }, 0);
}

// ── Swipe-to-delete — true email-app style ──
// tr slides left by 70px. The delete btn is pinned to right:0 inside people-td (overflow:hidden),
// starts translateX(100%) and animates to translateX(0) proportionally during drag.

function openSwipe(tr, rowIndex){
  tr.style.transform = `translateX(-70px)`;
  const btn = tr.querySelector('.swipe-delete-btn');
  if(btn) btn.style.transform = 'translateX(0)';
  tr.classList.add('swiped-open');
  swipeCurrent = rowIndex;
}

function closeSwipeEl(tr){
  tr.style.transition = 'transform 0.2s ease';
  tr.style.transform = 'translateX(0)';
  const btn = tr.querySelector('.swipe-delete-btn');
  if(btn){ btn.style.transition = 'transform 0.2s ease'; btn.style.transform = 'translateX(100%)'; }
  tr.classList.remove('swiped-open');
}

function closeAllSwipes(exceptIndex){
  document.querySelectorAll('.swipe-tr.swiped-open').forEach(tr => {
    const idx = parseInt(tr.dataset.swipeIdx);
    if(idx !== exceptIndex) closeSwipeEl(tr);
  });
  if(swipeCurrent !== null && swipeCurrent !== exceptIndex) swipeCurrent = null;
}

function attachSwipe(tr, rowIndex){
  let startX = 0, startY = 0;
  let isSwiping = false;
  let isDetermining = true;
  let startOffsetX = 0;
  const MAX_SWIPE = 70;

  tr.addEventListener('touchstart', e => {
    if(isArchived || rows[rowIndex]?.locked) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false; isDetermining = true;
    const matrix = new WebKitCSSMatrix(window.getComputedStyle(tr).transform);
    startOffsetX = matrix.m41;
    tr.style.transition = 'none';
    const btn = tr.querySelector('.swipe-delete-btn');
    if(btn) btn.style.transition = 'none';
  }, {passive: true});

  tr.addEventListener('touchmove', e => {
    if(isArchived || rows[rowIndex]?.locked) return;
    const cx = e.touches[0].clientX;
    const cy = e.touches[0].clientY;
    const adx = Math.abs(cx - startX);
    const ady = Math.abs(cy - startY);

    if(isDetermining){
      if(ady > adx) return;
      if(adx > 5){ isSwiping = true; isDetermining = false; closeAllSwipes(rowIndex); }
      else return;
    }
    if(!isSwiping) return;

    const rawDelta = cx - startX;
    let newX = startOffsetX + rawDelta;
    newX = Math.max(-MAX_SWIPE, Math.min(0, newX));
    tr.style.transform = `translateX(${newX}px)`;

    // Reveal delete button proportionally
    const reveal = Math.abs(newX) / MAX_SWIPE; // 0..1
    const btnX = (1 - reveal) * 100; // 100%..0%
    const btn = tr.querySelector('.swipe-delete-btn');
    if(btn) btn.style.transform = `translateX(${btnX}%)`;
  }, {passive: true});

  tr.addEventListener('touchend', () => {
    if(!isSwiping || isArchived || rows[rowIndex]?.locked) return;
    tr.style.transition = 'transform 0.2s ease';
    const btn = tr.querySelector('.swipe-delete-btn');
    if(btn) btn.style.transition = 'transform 0.2s ease';

    const matrix = new WebKitCSSMatrix(window.getComputedStyle(tr).transform);
    const finalX = matrix.m41;

    if(finalX < -35){
      openSwipe(tr, rowIndex);
    } else {
      closeSwipeEl(tr);
      if(swipeCurrent === rowIndex) swipeCurrent = null;
    }
  });
}

// Tap outside open swipe to close it
document.addEventListener('touchstart', e => {
  if(swipeCurrent === null) return;
  document.querySelectorAll('.swipe-tr.swiped-open').forEach(tr => {
    if(!tr.contains(e.target)){
      closeSwipeEl(tr);
      swipeCurrent = null;
    }
  });
}, {passive: true});

          placeholder="optional"
          ${isLocked?"disabled":""}
          onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
          oninput="update(${i},'item',this.value)">${r.item}</textarea>
      </td>
      <td class="clickable-cell" ${priceTdOnclick}>
        <textarea data-r="${i}" data-c="1"
          inputmode="decimal"
          pattern="[0-9]*"
          ${isLocked?"disabled":""}
          onkeydown="if(event.key==='Enter'){saveBill();nav(event,${i},1)}"
          onblur="saveBill()"
          oninput="handlePriceInput(${i},this)">${r.price}</textarea>
      </td>
      <td class="people-td">
        ${deleteBtnHTML}
        <div class="people-content">${tapHTML}</div>
      </td>`;

    body.appendChild(tr);
    if(!isLocked) attachSwipe(tr, i);
  });

  isRendering = false;
}

function calc(){
  let subtotal = 0;
  const people = {};
  const taxVal = parseFloat(document.getElementById("taxValue").value) || 0;
  const tipVal = parseFloat(document.getElementById("tipValue").value) || 0;
  const taxMode = document.getElementById("taxMode").value;
  const tipMode = document.getElementById("tipMode").value;

  rows.forEach(r => {
    if(!r.price) return;
    const price = parseFloat(r.price);
    if(isNaN(price)) return;
    subtotal += price;
    const list = r.people === "EVERYONE" ? nameList
      : (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);
    const share = price / (list.length || 1);
    list.forEach(p => {
      if(!people[p]) people[p] = {subtotalShare:0};
      people[p].subtotalShare += share;
    });
  });

  const taxAmount = taxMode === "percent" ? subtotal*(taxVal/100) : taxVal;
  const tipAmount = tipMode === "percent" ? subtotal*(tipVal/100) : tipVal;
  const total = subtotal + taxAmount + tipAmount;

  Object.keys(people).forEach(p => {
    const share = people[p].subtotalShare || 0;
    const ratio = subtotal ? share/subtotal : 0;
    people[p].total = share + (taxAmount*ratio) + (tipAmount*ratio);
  });

  const taxPct = subtotal ? (taxAmount/subtotal*100) : 0;
  const tipPct = subtotal ? (tipAmount/subtotal*100) : 0;

  document.getElementById("summary").innerHTML = `
    <div class="sum-table">
      <div class="row"><div class="label">Subtotal</div><div class="value">${subtotal.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tax (${taxPct.toFixed(2)}%)</div><div class="value">${taxAmount.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tip (${tipPct.toFixed(2)}%)</div><div class="value">${tipAmount.toFixed(2)}</div></div>
      <div class="row total"><div class="label">Total</div><div class="value">${total.toFixed(2)}</div></div>
    </div>`;

  const div = document.getElementById("totals");
  div.innerHTML = "";
  Object.keys(people).forEach(p => {
    const venmoId = venmoNames[p.toLowerCase()] || "";
    div.innerHTML += `
      <div class="result">
        <span>${p} owes $${people[p].total.toFixed(2)}</span>
        ${venmoId ? `<button class="venmo-btn" onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">Request</button>` : ""}
      </div>`;
  });
}

billLoaded = false;
loadBill();
loadSavedBillsList();

</script>
