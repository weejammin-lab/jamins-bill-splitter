<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
}

/* Mobile */
@media (max-width: 600px) {
    input, button {
        width: 100%;
        margin-bottom: 8px;
    }
}

.section {
    margin-bottom: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

/* Scroll list */
#itemsList {
    max-height: 300px;
    overflow-y: auto;
    border: 1px solid #ccc;
    padding: 10px;
}

/* Summary */
.summary-box {
    border: 1px solid #ccc;
    padding: 15px;
}

.result {
    font-weight: bold;
}

.note {
    font-size: 0.9em;
    color: gray;
}

</style>

</head>

<body>

<h1>Bill Splitter</h1>

<!-- FAST INPUT -->

<div class="section">

<h2>Fast Input</h2>

<input id="fastInput"
placeholder="23.50 maria, willie">

<button onclick="addFastItem()">
Add
</button>

</div>

<!-- OPTIONAL STRUCTURED INPUT -->

<div class="section">

<h2>Optional Item Input</h2>

<input id="itemName" placeholder="Item name">

<input id="itemPrice" placeholder="Price" type="number" step="0.01">

<input id="itemPeople" placeholder="People (comma separated)">

<button onclick="addStructuredItem()">
Add Structured Item
</button>

<div class="note">
Optional: use if you want clearer entry
</div>

</div>

<!-- ADJUSTMENTS -->

<div class="section">

<h2>Adjustments</h2>

<label>Tax %:</label>
<input id="taxPercent" type="number" step="0.01">

<label>Tip %:</label>
<input id="tipPercent" type="number" step="0.01">

<label>Cashback %:</label>
<input id="cashbackPercent" type="number" step="0.01">

<br>

<button onclick="updateTotals()">Recalculate</button>
<button onclick="clearAll()">Clear All</button>

</div>

<!-- SUMMARY -->

<div class="section">

<h2>Summary</h2>

<div id="summary" class="summary-box"></div>

</div>

<!-- TOTALS -->

<div class="section">

<h2>Totals</h2>

<div id="totals"></div>

</div>

<script>

let items = [];

// normalize
function norm(n){
return n.trim().toLowerCase();
}

/* ---------------- FAST INPUT ---------------- */

function addFastItem(){

let input =
document.getElementById("fastInput").value;

if (!input.trim()) return;

let parts = input.split(" ");

let price = parseFloat(parts[0]);

if (isNaN(price)) {
alert("Invalid price");
return;
}

let people = parts
.slice(1)
.join(" ")
.split(",")
.map(p => p.trim())
.filter(p => p);

items.push({
price,
people
});

document.getElementById("fastInput").value = "";

updateItems();
updateTotals();

}

/* -------- OPTIONAL STRUCTURED INPUT -------- */

function addStructuredItem(){

let name =
document.getElementById("itemName").value;

let price =
parseFloat(document.getElementById("itemPrice").value);

let people =
document.getElementById("itemPeople").value;

if (!price || !people) return;

items.push({
price,
people:
people.split(",")
.map(p => p.trim())
.filter(p => p)
});

document.getElementById("itemName").value = "";
document.getElementById("itemPrice").value = "";
document.getElementById("itemPeople").value = "";

updateItems();
updateTotals();

}

/* ---------------- ITEMS LIST ---------------- */

function updateItems(){

let list =
document.getElementById("itemsList");

list.innerHTML = "";

items.forEach((item,i)=>{

let li = document.createElement("li");

li.textContent =
item.price.toFixed(2) +
" → " +
item.people.join(", ");

let del =
document.createElement("button");

del.textContent = "Delete";

del.onclick = () => {
items.splice(i,1);
updateItems();
updateTotals();
};

li.appendChild(del);

list.appendChild(li);

});

}

/* ---------------- CLEAR ---------------- */

function clearAll(){

if (!confirm("Clear all data?")) return;

items = [];

updateItems();
updateTotals();

}

/* ---------------- PEOPLE MAP ---------------- */

function getPeople(){

let map = {};

items.forEach(item=>{

item.people.forEach(p=>{

let key = norm(p);

if (!map[key]) map[key] = p;

});

});

return map;

}

/* ---------------- CALCULATION ---------------- */

function updateTotals(){

let peopleMap = getPeople();
let keys = Object.keys(peopleMap);

let base = {};
keys.forEach(k=>base[k]=0);

let subtotal = 0;

items.forEach(item=>{

subtotal += item.price;

let share =
item.price / item.people.length;

item.people.forEach(p=>{
base[norm(p)] += share;
});

});

// tax/tip/cashback
let tax = subtotal * ((parseFloat(taxPercent.value)||0)/100);
let tip = subtotal * ((parseFloat(tipPercent.value)||0)/100);
let cashback = (parseFloat(cashbackPercent.value)||0)/100;

let total = subtotal + tax + tip;

let final = {};

keys.forEach(k=>{

let val = base[k];

let ratio = subtotal ? val/subtotal : 0;

val += tax*ratio + tip*ratio;

val = val - val*cashback;

final[k] = val;

});

// rounding fix
let sum = Object.values(final).reduce((a,b)=>a+b,0);

let diff = total - sum;

if(keys.length){
final[keys[0]] += diff;
}

// summary
document.getElementById("summary").innerHTML = `
Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${tax.toFixed(2)}<br>
Tip: $${tip.toFixed(2)}<br>
Cashback: ${(cashback*100).toFixed(2)}%<br><br>

<strong>Total: $${total.toFixed(2)}</strong><br><br>

Persons involved: ${keys.length}
`;

// totals
let div = document.getElementById("totals");

div.innerHTML = "";

keys.forEach(k=>{

let el = document.createElement("div");

el.className = "result";

el.textContent =
peopleMap[k] +
" owes $" +
(final[k]||0).toFixed(2);

div.appendChild(el);

});

}

</script>

</body>
</html>
