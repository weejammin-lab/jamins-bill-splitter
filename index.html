<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

.add-row-btn{
margin-top:8px;
padding:6px 10px;
font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input id="addPersonBox"
class="add-person-input"
placeholder="type name + Enter"
onkeydown="addPerson(event)">

<br><br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>People</th>
<th>Tap</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<button class="add-row-btn" onclick="addRow()">+ Add Item</button>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

let nameList=["jamin","jack","cliff","willie","howard","lin","freddy"];
let rows=[];

function init(){
rows=[];
for(let i=0;i<8;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}
render();
calc();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();
calc();
}

function clearAll(){
rows=[];
init();
}

function addPerson(e){
if(e.key!=="Enter") return;
let v=e.target.value.trim();
if(!v) return;
nameList.push(v);
e.target.value="";
render();
calc();
}

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tap=`<button onclick="toggleAll(${i})">EVERYONE</button><div class="tap-grid">`;

nameList.forEach(n=>{
tap+=`<button class="name-btn ${r.selected.includes(n)?'selected':''}"
onclick="toggle(${i},'${n}')">${n}</button>`;
});

tap+=`</div>`;

body.innerHTML+=`
<tr>
<td><textarea data-r="${i}" data-c="0"
onkeydown="nav(event,${i},0)"
oninput="r(${i},'item',this.value)">${r.item}</textarea></td>

<td><textarea data-r="${i}" data-c="1"
onkeydown="nav(event,${i},1)"
oninput="r(${i},'price',this.value)">${r.price}</textarea></td>

<td><textarea data-r="${i}" data-c="2"
onkeydown="nav(event,${i},2)"
oninput="r(${i},'people',this.value)">${r.people}</textarea></td>

<td>${tap}</td>
</tr>`;
});
}

function nav(e,row,col){

if(e.key==="Enter"){
e.preventDefault();
focus(row+1,col);
}

if(e.key==="Tab"){
e.preventDefault();
focus(row,col+ (e.shiftKey?-1:1));
}
}

function focus(r,c){
setTimeout(()=>{
document.querySelector(`[data-r="${r}"][data-c="${c}"]`)?.focus();
},0);
}

function r(i,k,v){
rows[i][k]=v;
calc();
}

function toggle(i,n){
let r=rows[i];
r.selected.includes(n)
?r.selected=r.selected.filter(x=>x!==n)
:r.selected.push(n);
render();
calc();
}

function toggleAll(i){
let r=rows[i];
r.selected = r.selected.length===nameList.length ? [] : [...nameList];
render();
calc();
}

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(!r.price) return;

let price=parseFloat(r.price)||0;
subtotal+=price;

let list=r.people==="EVERYONE"?nameList:r.selected;

if(list.length===0) return;

let share=price/list.length;

list.forEach(p=>{
if(!people[p]) people[p]={v:0};
people[p].v+=share;
});

});

let tax=parseFloat(document.getElementById("taxValue").value)||0;
let tip=parseFloat(document.getElementById("tipValue").value)||0;

let taxM=document.getElementById("taxMode").value;
let tipM=document.getElementById("tipMode").value;

let taxA=taxM==="percent"?subtotal*tax/100:tax;
let tipA=tipM==="percent"?subtotal*tip/100:tip;

let total=subtotal+taxA+tipA;

Object.keys(people).forEach(p=>{
let r=people[p].v/subtotal;
people[p].v+=taxA*r+tipA*r;
});

summary.innerHTML=
`Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${taxA.toFixed(2)}<br>
Tip: $${tipA.toFixed(2)}<br>
Total: $${total.toFixed(2)}`;

let d=document.getElementById("totals");
d.innerHTML="";

Object.keys(people).forEach(p=>{
d.innerHTML+=`<div class="result">${p}: $${people[p].v.toFixed(2)}</div>`;
});

}

init();

</script>

</body>
</html>
