<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

<title>Bill Splitter</title>

<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --accent: #7c6af7;
  --accent-light: #ede9ff;
  --accent2: #f06a6a;
  --accent2-light: #fff0f0;
  --green: #3ecf76;
  --green-light: #e8faf0;
  --border: #e2dfd8;
  --text: #2d2a26;
  --muted: #9c9690;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: 'DM Sans', Arial, sans-serif;
  max-width: 390px;
  margin: auto;
  padding: 10px 10px 40px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

html, body {
  overscroll-behavior-y: contain;
}

.receipt-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.receipt-overlay img {
  max-width: 90%;
  max-height: 90%;
  border-radius: var(--radius);
  object-fit: contain;
}

.header-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.load-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 4px;
}

.header-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  flex: 1;
  justify-content: flex-start;
  padding-left: 6px;
}

.receipt-thumb {
  width: 34px;
  height: 34px;
  object-fit: cover;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: block;
}
.receipt-thumb-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
}
.remove-receipt {
  font-size: 15px;
  color: var(--accent2);
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
  padding: 0;
  font-weight: bold;
}

.ocr-btn {
  font-size: 11px;
  padding: 3px 7px;
  background: var(--accent-light);
  border: 1.5px solid var(--accent);
  border-radius: 20px;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.ocr-btn:hover { background: #d8d0ff; }
.ocr-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.action-row {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-bottom: 3px;
  flex-wrap: nowrap;
}
.right-actions {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

.name-input-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.people-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0; padding: 0; line-height: 1;
}

.add-person-input {
  padding: 5px 8px;
  font-size: 14px;
  width: 136px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.add-person-input:focus { border-color: var(--accent); }
.add-person-input::placeholder { color: var(--muted); font-size: 12px; }

.upload-btn {
  font-size: 12px;
  padding: 5px 6px;
  white-space: normal;
  word-break: break-word;
  width: 68px;
  line-height: 1.2;
  text-align: center;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, background 0.15s;
}
.upload-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }

#mainContentSection th {
  font-size: 16px;
}

#billDropdown {
  font-size: 14px;
  padding: 5px 8px;
  width: 230px;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.save-bill-btn {
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 54px;
  text-align: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, background 0.15s;
  box-shadow: 0 2px 6px rgba(124,106,247,0.25);
}
.save-bill-btn:hover { background: #6a58e5; }
.save-bill-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

#newBillBtn {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}
#newBillBtn:hover { background: #444; }

.archived-label {
  color: var(--accent2);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent2-light);
  padding: 2px 8px;
  border-radius: 20px;
}
.archived-row {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 4px;
  min-height: 16px;
}

.top-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
  margin-top: 0px;
  margin-bottom: 8px;
}

#personBar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  flex: 1;
  max-width: 50%;
  margin-bottom: 2px;
}
.person-tag {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 3px 4px;
  font-size: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.delete-person {
  color: var(--accent2) !important;
  cursor: pointer;
  margin-left: 0;
  -webkit-text-fill-color: var(--accent2);
  font-size: 11px;
}

.notes-box {
  flex: 0 0 50%;
  max-width: 50%;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  resize: none;
  height: 75px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  outline: none;
  transition: border-color 0.15s;
}

  .notes-box {
  text-align: left;
}

.notes-box::placeholder {
  text-align: center;
}
.notes-box:focus { border-color: var(--accent); }
.notes-box::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

/* ── Table ── */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
}

td, th {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 2px;
  vertical-align: top;
}
td:last-child, th:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }

thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--accent-light);
}
thead th {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--accent);
  padding: 5px 4px;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 20%; }
th:nth-child(3), td:nth-child(3) { width: 15%; }
th:nth-child(4), td:nth-child(4) { width: 57%; }

.lock-cell { text-align: center; font-size: 12px; }

td textarea {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  font-size: 14px;
  resize: none;
  overflow: hidden;
  border: none;
  padding: 3px 4px;
  font-family: 'DM Sans', sans-serif;
  display: block;
  min-height: 50px;
  background: transparent;
  color: var(--text);
  outline: none;
}
td:nth-child(3) textarea {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size:16px;
  min-height: 23px;
  height: 23px;
  padding: 1px;
}
td textarea::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

td.clickable-cell {
  cursor: text;
}

/* ── Swipe-to-delete row wrapper ── */
.swipe-row-wrapper {
  position: relative;
  overflow: hidden;
  /* match tr bottom border */
  border-bottom: 1px solid var(--border);
}
/* last wrapper: remove double border */
.swipe-row-wrapper:last-child {
  border-bottom: none;
}
/* The red delete button revealed on swipe */
.swipe-delete-btn {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  width: 70px;
  background: var(--accent2);
  color: #fff;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1;
  /* always visible in DOM but behind the sliding tr */
}
/* The actual <tr> that slides */
.swipe-tr {
  position: relative;
  z-index: 2;
  transform: translateX(0);
  transition: transform 0.2s ease;
  background: var(--card);
  /* tr needs display:flex override won't work — use a wrapper div inside */
  display: table-row;
  will-change: transform;
}
.swipe-tr.swiped {
  transform: translateX(-70px);
}
.swipe-tr.locked-row td { background: #fafaf9; opacity: 0.85; }
.swipe-tr.locked-row textarea { background: transparent; }

.tap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 2px;
}
.name-btn {
  margin: 1px;
  padding: 4px 2px;
  font-size: 13px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.name-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.name-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}
.everyone-btn {
   width: calc(100% - 4px);
  margin: 0 2px 4px 2px;
  font-size: 14px;
  padding: 4px 1px;
  border-radius: 20px;
  background: #f7f6f3;
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.everyone-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}

.lock-btn {
  margin-top: 3px;
  padding: 2px 4px;
  font-size: 11px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  transition: 0.15s;
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
}
.lock-btn.locked { background: var(--accent2-light); border-color: var(--accent2); }
.lock-btn.unlocked { opacity: 0.6; }

#addRowBtn, #add5RowsBtn, #deleteEmptyRowsBtn {
  font-size: 12px;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
}
#addRowBtn:hover, #add5RowsBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#deleteEmptyRowsBtn:hover { border-color: var(--accent2); background: var(--accent2-light); }

.tax-tip-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.tax-tip-wrap label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: 26px;
}
.tax-tip-wrap select {
  font-size: 13px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.tax-tip-input {
  width: 70px;
  padding: 4px 8px;
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.tax-tip-input:focus { border-color: var(--accent); }

.summary-save-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
}
.summary-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  width: 30%;
  max-width: 260px;
  min-width: 148px;
  box-shadow: var(--shadow);
}
.sum-table {
  font-family: 'DM Mono', monospace;
  width: 100%;
  font-size: 12px;
}
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 6px;
  align-items: center;
  white-space: nowrap;
  padding: 1px 0;
}
.label { text-align: left; white-space: nowrap; color: var(--muted); }
.value { text-align: right; white-space: nowrap; }
.total .label, .total .value {
  font-weight: bold;
  color: var(--text);
  font-size: 13px;
  padding-top: 3px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}

.result {
  font-weight: 600;
  margin: 5px 0;
  font-size: 14px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 4px;
}

.venmo-btn {
  margin-left: auto;
  font-size: 12px;
  background: #3d95ce;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
}
.venmo-btn:hover { background: #2f7eb8; }

.bill-actions-row {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 12px;
}
.archive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: #fff8e1;
  border: 1.5px solid #f0c040;
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.unarchive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--green-light);
  border: 1.5px solid var(--green);
  border-radius: 20px;
  color: #1a8a45;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.delete-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--accent2-light);
  border: 1.5px solid var(--accent2);
  border-radius: 20px;
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.row-btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
.archived-section { opacity: 0.75; }
.th-people { line-height: 1.3; }

/* tbody needs relative positioning so swipe wrappers work */
#tableBody { position: relative; }
</style>

</head>
<body>

<!-- ROW 1: New Bill | Upload Receipt + thumbnail | Save -->
<div class="header-row">
  <button id="newBillBtn" onclick="clearAll()">+ New Bill</button>

  <div class="header-center">
    <input type="file"
      id="receiptUpload"
      accept="image/*"
      style="display:none"
      onchange="handleReceiptUpload(event)">
    <button class="upload-btn" id="uploadReceiptBtn" onclick="document.getElementById('receiptUpload').click()">
      Upload Receipt
    </button>
    <div id="receiptPreviewContainer"></div>
  </div>

  <button class="save-bill-btn" id="saveBillBtn" onclick="saveNewBill()">Save</button>
</div>

<!-- ROW 2: Load dropdown -->
<div class="load-row">
  <select id="billDropdown" onchange="loadSavedBill(this.value)">
    <option value="" disabled selected style="color:#aaa;">— load a saved bill —</option>
  </select>

  <div class="name-input-wrap">
    <span class="people-label">Add Person</span>
    <input class="add-person-input"
      id="addPersonBox"
      placeholder="type name + Enter"
      onkeydown="handleAddPerson(event)">
  </div>
</div>

<!-- Archived label row -->
<div class="archived-row">
  <span id="archivedLabel" class="archived-label" style="display:none;">⛔ ARCHIVED — edits cannot be made</span>
</div>

<div class="top-row">
  <textarea class="notes-box"
    id="notesBox"
    placeholder="type notes here&#10;-upload receipt to use AI&#10;(it kinda sucks tho)"
    oninput="saveNotes(); markDirty()"></textarea>

  <div id="personBar"></div>
</div>

<div id="mainContentSection">
<table>
<thead>
<tr>
<th> </th>
<th>Item</th>
<th>Price<br><span style="font-weight:normal;font-size:12px;text-transform:none;letter-spacing:0;color:var(--accent);">($)</span></th>
<th class="th-people">People Involved<br><span style="font-weight:normal;font-size:12px;text-transform:none;letter-spacing:0;color:var(--accent);">(Tap Names)</span></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin:7px 0; display:flex; gap:5px; align-items:center;">
  <button id="addRowBtn" onclick="addRow()">+ 1 Row</button>
  <button id="add5RowsBtn" onclick="add5Rows()">+ 5 Rows</button>
  <button id="deleteEmptyRowsBtn" onclick="deleteEmptyRows()">Delete Empty</button>
  <span id="deleteMsg" style="color:var(--accent2); font-size:11px;"></span>
  <button
    class="save-bill-btn"
    id="saveBillBtnBottom"
    onclick="saveNewBill()"
    style="margin-left:auto;">
    Save
  </button>
</div>

<div class="tax-tip-wrap" id="taxWrap">
  <label>Tax</label>
  <select id="taxMode" onchange="calc(); markDirty()">
    <option value="amount" selected>$</option>
    <option value="percent">%</option>
  </select>
  <input id="taxValue" class="tax-tip-input"
    inputmode="decimal"
    onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('tipValue').focus();}"
    oninput="calc(); markDirty()">
</div>

<div class="tax-tip-wrap" id="tipWrap">
  <label>Tip</label>
  <select id="tipMode" onchange="calc(); markDirty()">
    <option value="amount" selected>$</option>
    <option value="percent">%</option>
  </select>
  <input id="tipValue" class="tax-tip-input"
    inputmode="decimal"
    oninput="calc(); markDirty()">
</div>
</div>

<!-- Summary -->
<div class="summary-save-row">
  <div class="summary-box" id="summary"></div>
</div>

<div id="totals" style="margin-top:8px;"></div>

<div class="bill-actions-row" id="billActionsRow" style="display:none;">
  <button id="archiveToggleBtn" class="archive-btn" onclick="toggleArchive()">Archive Bill</button>
  <button class="delete-btn" onclick="deleteBill()">Delete Bill</button>
</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
  authDomain: "jamins-bill-splitter.firebaseapp.com",
  projectId: "jamins-bill-splitter",
  storageBucket: "jamins-bill-splitter.firebasestorage.app",
  messagingSenderId: "139094691642",
  appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");
const storage = firebase.storage();

const defaultVenmoMap = {

function formatDate(ts){
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;
}

function snapshotState(){
  return JSON.stringify({
    rows, nameList, receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId
  });
}

function defaultSnapshot(){
  return JSON.stringify({
    rows: Array(5).fill(null).map(()=>({item:"",price:"",people:"",selected:[],locked:false})),
    nameList: [...defaultNames],
    receiptUrl: "",
    taxValue: "", tipValue: "",
    taxMode: "amount", tipMode: "amount",
    notes: "", currentLoadedBillId: null
  });
}

function markDirty(){
  if(currentLoadedBillId){
    const a = JSON.parse(snapshotState()); delete a.currentLoadedBillId;
    const b = JSON.parse(loadedSnapshot || "{}"); delete b.currentLoadedBillId;
    isDirty = JSON.stringify(a) !== JSON.stringify(b);
  } else {
    isDirty = snapshotState() !== defaultSnapshot();
    if(isDirty && !newBillFirstInputDate) newBillFirstInputDate = Date.now();
  }
  updateSaveButtonState();
}

function updateSaveButtonState(){
  ["saveBillBtn","saveBillBtnBottom"].forEach(id => {
    const b = document.getElementById(id);
    if(!b || b.dataset.feedback === "1") return;
    b.textContent = "Save";
    b.style.color = b.style.fontSize = b.style.background = "";
    b.disabled = currentLoadedBillId ? (!isDirty || isArchived) : !isDirty;
  });
}

function updateArchivedUI(){
  document.getElementById("archivedLabel").style.display = isArchived ? "inline" : "none";

  const archiveBtn = document.getElementById("archiveToggleBtn");
  if(archiveBtn){
    archiveBtn.textContent = isArchived ? "Unarchive Bill" : "Archive Bill";
    archiveBtn.className = isArchived ? "unarchive-btn" : "archive-btn";
  }

  const actionsRow = document.getElementById("billActionsRow");
  if(actionsRow) actionsRow.style.display = currentLoadedBillId ? "flex" : "none";

  const mainSection = document.getElementById("mainContentSection");
  const notesBox = document.getElementById("notesBox");
  const personBar = document.getElementById("personBar");
  const summaryBox = document.getElementById("summary");
  const totalsBox = document.getElementById("totals");
  const uploadBtn = document.getElementById("uploadReceiptBtn");
  const addRowBtn = document.getElementById("addRowBtn");
  const add5RowsBtn = document.getElementById("add5RowsBtn");
  const deleteEmptyRowsBtn = document.getElementById("deleteEmptyRowsBtn");
  const taxValue = document.getElementById("taxValue");
  const tipValue = document.getElementById("tipValue");
  const taxMode = document.getElementById("taxMode");
  const tipMode = document.getElementById("tipMode");

  if(isArchived){
    [mainSection, notesBox, personBar, summaryBox, totalsBox].forEach(el => el.classList.add("archived-section"));
    notesBox.setAttribute("disabled","");
    taxValue.setAttribute("disabled",""); tipValue.setAttribute("disabled","");
    taxMode.setAttribute("disabled",""); tipMode.setAttribute("disabled","");
    [uploadBtn, addRowBtn, add5RowsBtn, deleteEmptyRowsBtn].forEach(btn => {
      if(btn){ btn.disabled = true; btn.classList.add("row-btn-disabled"); }
    });
  } else {
    [mainSection, notesBox, personBar, summaryBox, totalsBox].forEach(el => el.classList.remove("archived-section"));
    notesBox.removeAttribute("disabled");
    taxValue.removeAttribute("disabled"); tipValue.removeAttribute("disabled");
    taxMode.removeAttribute("disabled"); tipMode.removeAttribute("disabled");
    [uploadBtn, addRowBtn, add5RowsBtn, deleteEmptyRowsBtn].forEach(btn => {
      if(btn){ btn.disabled = false; btn.classList.remove("row-btn-disabled"); }
    });
  }

  updateSaveButtonState();
}

function hasContent(){
  return rows.some(r => r.price || r.item)
    || !!document.getElementById("taxValue").value
    || !!document.getElementById("tipValue").value
    || !!document.getElementById("notesBox").value
    || !!receiptUrl
    || JSON.stringify(nameList) !== JSON.stringify(defaultNames);
}

    const box = document.createElement("div");
    box.style.cssText = "background:#fff;padding:20px;border-radius:14px;max-width:300px;width:90%;font-family:'DM Sans',sans-serif;font-size:15px;box-shadow:0 8px 32px rgba(0,0,0,0.18);";
    box.innerHTML = `<p style="margin:0 0 16px;">${message}</p>`;
    const s = "display:block;width:100%;padding:10px;margin-bottom:8px;font-size:15px;border-radius:20px;cursor:pointer;border:1.5px solid #e2dfd8;font-family:'DM Sans',sans-serif;font-weight:500;";

    saveBtn.style.cssText = s + "background:#7c6af7;color:white;border-color:#7c6af7;font-weight:600;";
    saveBtn.onclick = () => { document.body.removeChild(overlay); resolve("save"); };
    const noBtn = document.createElement("button");
    noBtn.textContent = "Don't Save";
    noBtn.style.cssText = s + "background:#fff;";
    noBtn.onclick = () => { document.body.removeChild(overlay); resolve("nosave"); };
    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";

async function checkUnsavedBill(){
  if(currentLoadedBillId && isDirty){
    const choice = await confirmUnsaved("There are unsaved changes to this bill.");
    if(choice === "save"){ await saveNewBill(); return true; }
    if(choice === "nosave") return true;
    return false;
  }
  if(!currentLoadedBillId && hasContent()){
    const choice = await confirmUnsaved("There are unsaved changes. Save this bill before continuing?");
    if(choice === "save"){
      let title = prompt("Enter a title for this bill (max 15 characters):");
      if(!title || !title.trim()) return false;
      title = title.trim().slice(0,15);
      const docRef = await db.collection("savedBills").add({ title, savedAt: newBillFirstInputDate || Date.now(), ...getCurrentBillData() });
      currentLoadedBillId = docRef.id; currentLoadedBillTitle = title;
      await loadSavedBillsList(); return true;
    }
    if(choice === "nosave") return true;
    return false;
  }
  return true;
}

  const ocrBtn = document.createElement("button");

  ocrBtn.textContent = "Use AI"; ocrBtn.title = "Scan receipt and auto-fill items & prices";
  ocrBtn.onclick = runOCR;

  wrap.appendChild(img); wrap.appendChild(removeBtn); wrap.appendChild(ocrBtn);
  container.appendChild(wrap);
}

// ── OCR ──
function parseReceiptText(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);

  // Must have a price on the RIGHT side of the line (last token)
  // Pattern: line ends with an optional $ and a decimal number
  const rightPriceRegex = /\$?\s*(\d+\.\d{2})\s*$/;

  // Skip lines that are totals/fees/non-items
  const skipKeywords = /\b(subtotal|sub[-\s]?total|total|tax|tip|gratuity|service\s*fee|surcharge|discount|change|cash|credit|debit|visa|mastercard|amex|discover|balance|amount\s*due|amount\s*paid|thank|receipt|order\s*#|table\s*#|server|guest|check\s*#|qty|quantity|void|comp)\b/i;

  const parsed = [];

  lines.forEach(line => {
    // Price must be on the RIGHT side of the line
    const priceMatch = line.match(rightPriceRegex);
    if(!priceMatch) return;

    const price = priceMatch[1];
    const priceFloat = parseFloat(price);

    // skip zeros or suspiciously large (totals)
    if(priceFloat <= 0 || priceFloat > 300) return;

    // skip total/tax/tip lines
    if(skipKeywords.test(line)) return;

    // get item name: everything before the price match, stripped of leading garbage
    let item = line.slice(0, line.length - priceMatch[0].length).trim();

    // remove leading non-letter characters (random OCR noise like "| ", ". ", etc.)
    item = item.replace(/^[^a-zA-Z0-9]+/, '').trim();

    // clean trailing dots/dashes/spaces
    item = item.replace(/[\.\-\*\_\s]+$/, '').trim();

    // must have at least one letter
    if(!item || !/[a-zA-Z]/.test(item)) return;

    // skip very short noise fragments
    if(item.length < 2) return;

    parsed.push({ item, price });
  });

  if(parsed.length === 0){
    alert("No items found. Try a flat, well-lit photo with prices clearly on the right side.");
    return;
  }

  // REPLACE all rows with OCR results (clear existing, keep locked rows)
  // First collect any locked rows so we don't lose them
  const lockedRows = rows.filter(r => r.locked);

  // Build new row list: locked rows first, then OCR results, padded to at least 5
  rows = [...lockedRows];
  parsed.forEach(p => {
    rows.push({ item: p.item, price: p.price, people: '', selected: [], locked: false });
  });
  // Pad to minimum 5 rows
  while(rows.length < 5){
    rows.push({ item:'', price:'', people:'', selected:[], locked:false });
  }

  render();
  calc();
  saveBill();
  markDirty();
}

async function runOCR(){
  if(isArchived) return;
  if(!receiptFileRef && !receiptUrl){ alert("No receipt uploaded."); return; }

  const btn = document.getElementById("ocrBtn");
  if(btn){ btn.textContent = "Scanning…"; btn.disabled = true; }

  try {
    const source = receiptFileRef || receiptUrl;
    const { data: { text } } = await Tesseract.recognize(source, 'eng');
    parseReceiptText(text);
  } catch(err){
    alert("Scan failed — please try again.");
    console.error(err);
  } finally {
    if(btn){ btn.textContent = "Use AI"; btn.disabled = false; }
  }
}

function applyLiveData(data){
  rows = data.rows || [];
  nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || "";
  lastSavedReceiptUrl = receiptUrl;
  currentLoadedBillId = data.currentLoadedBillId || null;
  currentLoadedBillTitle = data.currentLoadedBillTitle || null;
  isArchived = data.isArchived || false;

  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";

  if(receiptUrl) showReceiptThumbnail(receiptUrl);
  else document.getElementById("receiptPreviewContainer").innerHTML = "";

  if(currentLoadedBillId){
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: data.taxValue || "", tipValue: data.tipValue || "",
      taxMode: data.taxMode || "amount", tipMode: data.tipMode || "amount",
      notes: data.notes || ""
    });
  }
}

function loadBill(){
  billRef.onSnapshot(doc => {
    if(isUploadingReceipt || isLocalUpdate) return;
    const data = doc.data();
    if(!data) return;
    applyLiveData(data);
    billLoaded = true; isDirty = false;
    if(!rows || rows.length === 0){
      rows = [];
      for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
    }
    renderPeopleBar(); render(); calc();
    updateSaveButtonState(); updateArchivedUI();
    loadSavedBillsList().then(()=>{
      if(currentLoadedBillId) document.getElementById("billDropdown").value = currentLoadedBillId;
    });
  });
}

async function handleReceiptUpload(event){
  if(isArchived) return;
  const file = event.target.files[0];
  if(!file) return;
  if(receiptUrl){
    const confirmed = await confirmAction("Replace the current receipt with this new one?");
    if(!confirmed){ event.target.value = ""; return; }
  }
  if(file.size > 15 * 1024 * 1024){
    alert("Image too large. Please upload a photo under 15MB.");
    event.target.value = ""; return;
  }
  isUploadingReceipt = true; isLocalUpdate = true;
  try {
    const storageRef = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
    await storageRef.put(file);
    const url = await storageRef.getDownloadURL();
    receiptUrl = url; lastSavedReceiptUrl = url; receiptFileRef = file;
    showReceiptThumbnail(url);
    await billRef.set({
      rows, nameList, venmoNames, receiptUrl: url,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value,
      currentLoadedBillId, currentLoadedBillTitle, isArchived
    });
    markDirty();
  } finally {
    event.target.value = "";
    setTimeout(()=>{ isUploadingReceipt = false; isLocalUpdate = false; }, 500);
  }
}

function saveBill(){
  if(!billLoaded) return;
  isLocalUpdate = true;
  if(!receiptUrl || receiptUrl.length < 5) receiptUrl = lastSavedReceiptUrl || "";
  billRef.set({
    rows, nameList, venmoNames, receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId, currentLoadedBillTitle, isArchived
  }).then(()=>{
    if(receiptUrl && receiptUrl.length > 5) lastSavedReceiptUrl = receiptUrl;
  }).finally(()=>{ setTimeout(()=>isLocalUpdate=false, 300); });
}

function getCurrentBillData(){
  return {
    rows, nameList, venmoNames,
    receiptUrl: receiptUrl || "",
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value
  };
}

function showSavedFeedback(){
  ["saveBillBtn","saveBillBtnBottom"].forEach(id => {
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.dataset.feedback = "1";
    btn.textContent = "saved!"; btn.style.color = "#fff";
    btn.style.fontSize = "12px"; btn.style.background = "#3ecf76"; btn.disabled = true;
    setTimeout(()=>{
      btn.dataset.feedback = "0";
      btn.style.color = btn.style.fontSize = btn.style.background = "";
      updateSaveButtonState();
    }, 750);
  });
}

async function saveNewBill(){
  if(isArchived) return;
  if(currentLoadedBillId){
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData() });
    isDirty = false;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    showSavedFeedback();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
  } else {
    let title = prompt("Enter a title for this bill (max 15 characters):");
    if(!title || !title.trim()) return;
    title = title.trim().slice(0,15);
    const billData = { title, savedAt: newBillFirstInputDate || Date.now(), ...getCurrentBillData() };
    const docRef = await db.collection("savedBills").add(billData);
    currentLoadedBillId = docRef.id; currentLoadedBillTitle = title;
    isDirty = false; newBillFirstInputDate = null;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    saveBill();
    alert(`"${title}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = docRef.id;
    updateSaveButtonState(); updateArchivedUI();
  }
}

async function toggleArchive(){
  if(!currentLoadedBillId){ alert("Save this bill first before archiving."); return; }
  if(isArchived){
    const pw = prompt("Enter password to unarchive:");
    if(!pw) return;
    if(pw.trim().toLowerCase() !== "unarchive"){ alert("Incorrect password."); return; }
    rows.forEach(r => r.locked = false);
    await db.collection("savedBills").doc(currentLoadedBillId).update({ archived: false, rows });
    isArchived = false; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been unarchived.`);
  } else {
    const confirmed = confirm(`Archive "${currentLoadedBillTitle}"?\n\nArchived Bills can't be edited but can still be viewed.`);
    if(!confirmed) return;
    rows.forEach(r => r.locked = true);
    rows = rows.filter(r => r.price || r.item || (r.selected && r.selected.length));
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData(), rows, archived: true });
    isArchived = true; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been archived.`);
  }
}

async function deleteBill(){
  if(isArchived){ alert("Archived bills cannot be deleted."); return; }
  if(!currentLoadedBillId){ alert("This bill hasn't been saved yet — nothing to delete."); return; }
  const confirmed = confirm(`Delete "${currentLoadedBillTitle}"? This cannot be undone.`);
  if(!confirmed) return;
  await db.collection("savedBills").doc(currentLoadedBillId).delete();
  doNewBill();
}

async function loadSavedBillsList(){
  const snapshot = await db.collection("savedBills").orderBy("savedAt","desc").limit(10).get();
  const dropdown = document.getElementById("billDropdown");
  const currentVal = currentLoadedBillId || "";
  dropdown.innerHTML = "";
  if(!currentLoadedBillId){
    const ph = document.createElement("option");
    ph.value = ""; ph.textContent = "— load a saved bill —";
    ph.disabled = true; ph.selected = true; ph.style.color = "#aaa";
    dropdown.appendChild(ph);
  }
  snapshot.forEach(doc => {
    const d = doc.data();
    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = `${d.title} (${formatDate(d.savedAt)})${d.archived ? "🔒" : ""}`;
    dropdown.appendChild(opt);
  });
  if(currentVal) dropdown.value = currentVal;
}

async function loadSavedBill(id){
  if(!id) return;
  const proceed = await checkUnsavedBill();
  if(!proceed){ document.getElementById("billDropdown").value = currentLoadedBillId || ""; return; }
  const doc = await db.collection("savedBills").doc(id).get();
  const data = doc.data();
  if(!data) return;
  currentLoadedBillId = id; currentLoadedBillTitle = data.title;
  isArchived = data.archived || false; isDirty = false; newBillFirstInputDate = null;
  rows = data.rows || []; nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || ""; lastSavedReceiptUrl = receiptUrl; receiptFileRef = null;
  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";
  if(receiptUrl) showReceiptThumbnail(receiptUrl);
  else document.getElementById("receiptPreviewContainer").innerHTML = "";
  loadedSnapshot = JSON.stringify({
    rows, nameList, receiptUrl,
    taxValue: data.taxValue || "", tipValue: data.tipValue || "",
    taxMode: data.taxMode || "amount", tipMode: data.tipMode || "amount",
    notes: data.notes || ""
  });
  saveBill();
  await loadSavedBillsList();
  document.getElementById("billDropdown").value = id;
  updateSaveButtonState(); updateArchivedUI();
  renderPeopleBar(); render(); calc();
}

function saveNotes(){
  if(isArchived) return;
  isLocalUpdate = true;
  billRef.update({ notes: document.getElementById("notesBox").value })
    .finally(()=>{ setTimeout(()=>isLocalUpdate=false, 300); });
}

function init(){
  rows = [];
  for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  renderPeopleBar(); render(); calc();
}

function doNewBill(){
  document.getElementById("taxValue").value = "";
  document.getElementById("tipValue").value = "";
  document.getElementById("taxMode").value = "amount";
  document.getElementById("tipMode").value = "amount";
  document.getElementById("notesBox").value = "";
  receiptUrl = ""; lastSavedReceiptUrl = ""; receiptFileRef = null;
  document.getElementById("receiptPreviewContainer").innerHTML = "";
  currentLoadedBillId = null; currentLoadedBillTitle = null;
  isArchived = false; isDirty = false; loadedSnapshot = null; newBillFirstInputDate = null;
  rows = []; nameList = [...defaultNames]; venmoNames = {...defaultVenmoMap};
  swipeCurrent = null;
  saveBill(); loadSavedBillsList(); updateSaveButtonState(); updateArchivedUI(); init();
}

async function clearAll(){
  const proceed = await checkUnsavedBill();
  if(!proceed) return;
  doNewBill();
}

function renderPeopleBar(){
  const bar = document.getElementById("personBar");
  bar.innerHTML = "";
  nameList.forEach((n,i) => {
    bar.innerHTML += `<span class="person-tag">${n}<span class="delete-person" onclick="deletePerson(${i})">✖</span></span>`;
  });
}

function handleAddPerson(e){
  if(isArchived || e.key !== "Enter") return;
  const box = document.getElementById("addPersonBox");
  const name = box.value.trim();
  if(!name) return;
  nameList.push(name);
  venmoNames[name.toLowerCase()] = venmoNames[name.toLowerCase()] || "";
  box.value = "";
  renderPeopleBar(); render(); calc(); saveBill(); markDirty();
}

function deletePerson(i){
  if(isArchived) return;
  const removed = nameList.splice(i,1)[0];
  rows.forEach(r => {
    r.selected = (r.selected||[]).filter(p => p !== removed);
    r.people = r.selected.join(", ");
  });
  renderPeopleBar(); render(); calc(); saveBill(); markDirty();
}

function toggleLock(row){
  if(isArchived) return;
  rows[row].locked = !rows[row].locked;
  render(); saveBill(); markDirty();
}

function update(i, key, val){
  if(isArchived || rows[i].locked) return;
  rows[i][key] = val;
  calc(); markDirty();
}

function handlePriceInput(row, el){
  if(isArchived || rows[row].locked){ el.value = rows[row].price; return; }
  el.value = el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
  rows[row].price = el.value;
  calc(); markDirty();
}

function toggleName(row, name){
  if(isArchived || rows[row].locked) return;
  const r = rows[row];
  if(!r.selected) r.selected = [];
  const idx = r.selected.indexOf(name);
  if(idx > -1) r.selected.splice(idx,1); else r.selected.push(name);
  r.people = r.selected.length === nameList.length ? "EVERYONE" : r.selected.join(", ");
  render(); calc(); saveBill(); markDirty();
}

function toggleEveryone(row){
  if(isArchived || rows[row].locked) return;
  const r = rows[row];
  if(r.selected?.length === nameList.length){ r.selected = []; r.people = ""; }
  else { r.selected = [...nameList]; r.people = "EVERYONE"; }
  render(); calc(); saveBill(); markDirty();
}

function addRow(){
  if(isArchived) return;
  rows.push({item:"",price:"",people:"",selected:[],locked:false});
  render(); calc(); saveBill();
}

function add5Rows(){
  if(isArchived) return;
  for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  render(); calc(); saveBill();
}

// Delete ALL empty rows (no item AND no price), anywhere in the list
function deleteEmptyRows(){
  if(isArchived) return;
  const before = rows.length;
  rows = rows.filter(r => r.locked || r.item || r.price);
  // ensure at least 1 row remains
  if(rows.length === 0) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  const removed = before - rows.length;
  const msg = document.getElementById("deleteMsg");
  if(msg) msg.textContent = removed > 0 ? `Removed ${removed} empty row${removed>1?"s":""}` : "No empty rows";
  setTimeout(()=>{ if(msg) msg.textContent = ""; }, 2000);
  render(); calc(); saveBill(); markDirty();
}

// Delete a specific row by index
function deleteRow(i){
  if(isArchived) return;
  if(rows[i] && rows[i].locked) return;
  rows.splice(i,1);
  if(rows.length === 0) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  swipeCurrent = null;
  render(); calc(); saveBill(); markDirty();
}

function nav(e, row, col){
  e.preventDefault();
  const nextRow = row + 1;
  if(nextRow >= rows.length){
    addRow();
    setTimeout(()=>{ document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus(); }, 0);
    return;
  }
  setTimeout(()=>{
    const next = document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
    if(next){ next.focus(); next.select?.(); }
  }, 0);
}

// ── Swipe-to-delete logic ──
function closeAllSwipes(exceptIndex){
  document.querySelectorAll('.swipe-tr.swiped').forEach(tr => {
    const idx = parseInt(tr.dataset.swipeIdx);
    if(idx !== exceptIndex) tr.classList.remove('swiped');
  });
  if(swipeCurrent !== null && swipeCurrent !== exceptIndex) swipeCurrent = null;
}

function attachSwipe(tr, rowIndex){
  let startX = 0, startY = 0, dx = 0;
  let isSwiping = false;
  let isLocked = rows[rowIndex]?.locked || isArchived;

  tr.addEventListener('touchstart', e => {
    if(isLocked) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    dx = 0; isSwiping = false;
  }, {passive: true});

  tr.addEventListener('touchmove', e => {
    if(isLocked) return;
    const cx = e.touches[0].clientX;
    const cy = e.touches[0].clientY;
    const adx = Math.abs(cx - startX);
    const ady = Math.abs(cy - startY);
    if(!isSwiping && ady > adx) return; // scrolling vertically, ignore
    isSwiping = true;
    dx = cx - startX;
  }, {passive: true});

  tr.addEventListener('touchend', () => {
    if(!isSwiping || isLocked) return;
    if(dx < -40){
      // swiped left enough → open
      closeAllSwipes(rowIndex);
      tr.classList.add('swiped');
      swipeCurrent = rowIndex;
    } else if(dx > 20){
      // swiped right → close
      tr.classList.remove('swiped');
      if(swipeCurrent === rowIndex) swipeCurrent = null;
    }
  });
}

// Close swipe if user taps elsewhere
document.addEventListener('touchstart', e => {
  if(swipeCurrent === null) return;
  const swipedTr = document.querySelector('.swipe-tr.swiped');
  if(swipedTr && !swipedTr.parentElement.contains(e.target)){
    swipedTr.classList.remove('swiped');
    swipeCurrent = null;
  }
}, {passive: true});

function render(){
  isRendering = true;
  const body = document.getElementById("tableBody");
  body.innerHTML = "";

  rows.forEach((r, i) => {
    let tapHTML = `
      <button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
        onclick="toggleEveryone(${i})">EVERYONE</button>
      <div class="tap-grid">`;
    nameList.forEach(n => {
      tapHTML += `<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
        onclick="toggleName(${i},'${n}')">${n}</button>`;
    });
    tapHTML += `</div>`;

    const isLocked = r.locked || isArchived;
    const lockIcon = isLocked ? "🔒" : "🔓";
    const lockClass = isLocked ? "locked" : "unlocked";

    // Wrapper div (acts as the swipe container per row)
    const wrapper = document.createElement("div");
    wrapper.className = "swipe-row-wrapper";

    // Delete button (revealed on swipe)
    const delBtn = document.createElement("button");
    delBtn.className = "swipe-delete-btn";
    delBtn.textContent = "Delete";
    delBtn.onclick = () => deleteRow(i);
    if(isLocked) delBtn.style.display = "none";
    wrapper.appendChild(delBtn);

    // The actual table row
    const tr = document.createElement("tr");
    tr.className = "swipe-tr" + (isLocked ? " locked-row" : "");
    tr.dataset.swipeIdx = i;

    const itemTdOnclick = !isLocked
      ? `onclick="if(event.target===this){this.querySelector('textarea').focus();}"` : "";
    const priceTdOnclick = !isLocked
      ? `onclick="if(event.target===this){this.querySelector('textarea').focus();}"` : "";

    tr.innerHTML = `
      <td class="lock-cell">
        <div style="font-size:11px;color:var(--muted);">${i+1}</div>
        <button class="lock-btn ${lockClass}" onclick="toggleLock(${i})">${lockIcon}</button>
      </td>
      <td class="clickable-cell" ${itemTdOnclick}>
        <textarea data-r="${i}" data-c="0"
          placeholder="optional"
          ${isLocked?"disabled":""}
          onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
          oninput="update(${i},'item',this.value)">${r.item}</textarea>
      </td>
      <td class="clickable-cell" ${priceTdOnclick}>
        <textarea data-r="${i}" data-c="1"
          inputmode="decimal"
          pattern="[0-9]*"
          ${isLocked?"disabled":""}
          onkeydown="if(event.key==='Enter'){saveBill();nav(event,${i},1)}"
          onblur="saveBill()"
          oninput="handlePriceInput(${i},this)">${r.price}</textarea>
      </td>
      <td>${tapHTML}</td>`;

    wrapper.appendChild(tr);

    // Attach swipe listeners
    if(!isLocked) attachSwipe(tr, i);

    // We can't put a div inside tbody directly, so we use a "display:contents" trick:
    // Insert wrapper as a custom element workaround — instead, append tr directly and
    // use a separate overlay approach. Actually the cleanest solution for table rows
    // is to make the tbody itself handle the swipe at the tr level with a clip container.
    // We'll use a single-cell spanning approach: append the wrapper as a block inside a tr.
    const wrapperTr = document.createElement("tr");
    wrapperTr.style.cssText = "padding:0;margin:0;border:none;";
    const wrapperTd = document.createElement("td");
    wrapperTd.colSpan = 4;
    wrapperTd.style.cssText = "padding:0;border:none;border-bottom:1px solid var(--border);";
    wrapperTd.appendChild(wrapper);

    // Move the tr's content INTO the wrapper so the swipe container wraps it
    // Re-architecture: put the real tr inside the wrapper td
    wrapper.removeChild(tr); // remove from wrapper
    wrapper.appendChild(tr); // re-add after delBtn (correct order already)

    wrapperTr.appendChild(wrapperTd);
    body.appendChild(wrapperTr);

    // Re-attach swipe to tr (already done above)
  });

  // Fix last row border
  const lastWrapperTd = body.querySelector("tr:last-child td");
  if(lastWrapperTd) lastWrapperTd.style.borderBottom = "none";

  isRendering = false;
}

function calc(){
  let subtotal = 0;
  const people = {};
  const taxVal = parseFloat(document.getElementById("taxValue").value) || 0;
  const tipVal = parseFloat(document.getElementById("tipValue").value) || 0;
  const taxMode = document.getElementById("taxMode").value;
  const tipMode = document.getElementById("tipMode").value;

  rows.forEach(r => {
    if(!r.price) return;
    const price = parseFloat(r.price);
    if(isNaN(price)) return;
    subtotal += price;
    const list = r.people === "EVERYONE" ? nameList
      : (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);
    const share = price / (list.length || 1);
    list.forEach(p => {
      if(!people[p]) people[p] = {subtotalShare:0};
      people[p].subtotalShare += share;
    });
  });

  const taxAmount = taxMode === "percent" ? subtotal*(taxVal/100) : taxVal;
  const tipAmount = tipMode === "percent" ? subtotal*(tipVal/100) : tipVal;
  const total = subtotal + taxAmount + tipAmount;

  Object.keys(people).forEach(p => {
    const share = people[p].subtotalShare || 0;
    const ratio = subtotal ? share/subtotal : 0;
    people[p].total = share + (taxAmount*ratio) + (tipAmount*ratio);
  });

  const taxPct = subtotal ? (taxAmount/subtotal*100) : 0;
  const tipPct = subtotal ? (tipAmount/subtotal*100) : 0;

  document.getElementById("summary").innerHTML = `
    <div class="sum-table">
      <div class="row"><div class="label">Subtotal</div><div class="value">${subtotal.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tax (${taxPct.toFixed(2)}%)</div><div class="value">${taxAmount.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tip (${tipPct.toFixed(2)}%)</div><div class="value">${tipAmount.toFixed(2)}</div></div>
      <div class="row total"><div class="label">Total</div><div class="value">${total.toFixed(2)}</div></div>
    </div>`;

  const div = document.getElementById("totals");
  div.innerHTML = "";
  Object.keys(people).forEach(p => {
    const venmoId = venmoNames[p.toLowerCase()] || "";
    div.innerHTML += `
      <div class="result">
        <span>${p} owes $${people[p].total.toFixed(2)}</span>
        ${venmoId ? `<button class="venmo-btn" onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">Request</button>` : ""}
      </div>`;
  });
}

billLoaded = false;
loadBill();
loadSavedBillsList();

</script>
