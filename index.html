<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter Pro</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 10px;
}

h1 { text-align: center; }

.section { margin-bottom: 10px; }

/* compact table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

td, th {
    border: 1px solid #ddd;
    padding: 4px;
}

input {
    width: 100%;
    padding: 4px;
    font-size: 13px;
}

.summary-box {
    border: 1px solid #ccc;
    padding: 10px;
    position: sticky;
    top: 0;
    background: white;
}

/* venmo */
.venmo-btn {
    margin-left: 6px;
    font-size: 11px;
    padding: 3px 6px;
}

.result {
    font-weight: bold;
    margin: 4px 0;
}

.small {
    font-size: 12px;
    color: gray;
}

</style>

</head>

<body>

<h1>Bill Splitter</h1>

<!-- VENMO USER INPUT -->
<div class="section">
<input id="venmoUser" placeholder="Venmo username (optional)">
</div>

<!-- TAX / TIP CONTROLS -->
<div class="section">

<strong>Tax</strong>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue" type="number" oninput="calc()" placeholder="Tax value">

<strong>Tip</strong>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue" type="number" oninput="calc()" placeholder="Tip value">

</div>

<!-- TABLE -->
<div class="section">

<table>
<thead>
<tr>
<th>Item (optional)</th>
<th>Price</th>
<th>People</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<!-- SUMMARY -->
<div class="summary-box" id="summary"></div>

<!-- TOTALS -->
<div class="section">
<div id="totals"></div>
</div>

<script>

let rows = [];

function init(){
    for(let i=0;i<10;i++) addRow();
    render();
}

function addRow(data={}){
    rows.push({
        item:data.item||"",
        price:data.price||"",
        people:data.people||""
    });
}

function maybeExpand(){
    if(rows.filter(r=>r.price).length > rows.length - 2){
        for(let i=0;i<5;i++) addRow();
        render();
    }
}

function render(){

let body = document.getElementById("tableBody");
body.innerHTML = "";

rows.forEach((r,i)=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td><input placeholder="optional" value="${r.item}" oninput="update(${i},'item',this.value)"></td>
<td><input type="number" value="${r.price}" oninput="update(${i},'price',this.value)"></td>
<td><input value="${r.people}" oninput="update(${i},'people',this.value)"></td>
`;

body.appendChild(tr);

});

}

function update(i,key,val){
    rows[i][key]=val;
    maybeExpand();
    calc();
}

function calc(){

let items = rows.filter(r=>r.price && r.people);

let people = {};
let subtotal = 0;

items.forEach(i=>{
let price = parseFloat(i.price);
subtotal += price;

let list = i.people.split(",").map(p=>p.trim()).filter(Boolean);

let share = price / list.length;

list.forEach(p=>{
    people[p] = people[p] || {total:0};
    people[p].total += share;
});

});

/* TAX */
let tax = 0;
if(taxMode.value === "percent"){
tax = subtotal * (taxValue.value||0)/100;
} else {
tax = parseFloat(taxValue.value||0);
}

/* TIP */
let tip = 0;
if(tipMode.value === "percent"){
tip = subtotal * (tipValue.value||0)/100;
} else {
tip = parseFloat(tipValue.value||0);
}

let total = subtotal + tax + tip;

/* distribute */
Object.keys(people).forEach(p=>{
let ratio = people[p].total/subtotal || 0;
people[p].total += tax*ratio + tip*ratio;
});

/* SUMMARY */
document.getElementById("summary").innerHTML = `
Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${tax.toFixed(2)} (${taxMode.value})<br>
Tip: $${tip.toFixed(2)} (${tipMode.value})<br>
<strong>Total: $${total.toFixed(2)}</strong>
`;

/* VENMO */
let venmoUser = venmoUserEl().trim();

let div = document.getElementById("totals");
div.innerHTML = "";

Object.keys(people).forEach(p=>{

let amt = people[p].total.toFixed(2);

let venmoLink = venmoUser
? `https://venmo.com/${venmoUser}`
: `https://venmo.com/?txn=pay&recipients=${encodeURIComponent(p)}&amount=${amt}`;

div.innerHTML += `
<div class="result">
${p} owes $${amt}
<button class="venmo-btn" onclick="window.open('${venmoLink}','_blank')">Venmo</button>
</div>
`;

});

}

function venmoUserEl(){
return document.getElementById("venmoUser").value || "";
}

init();
calc();

</script>

</body>
</html>
