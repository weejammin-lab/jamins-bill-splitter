<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

/* TAP GRID */
.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
word-break:break-word;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;

white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.venmo-input{
width:120px;
margin-left:6px;
}

.result{
font-weight:bold;
margin:4px 0;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
freddy:"freddy-dai",
lin:"linlin221"
};

let defaultNames=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={};

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

venmoNames={...defaultVenmoMap};

renderPeopleBar();
render();
calc();
}

function clearAll(){

if(!confirm("Clear everything?")) return;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
}

function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){

if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
}

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();
calc();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

function handlePriceInput(row, el){
el.value=el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
rows[row].price=el.value;
calc();
}

function toggleName(row,name){
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.length ? r.selected.join(", ") : "";
render();
calc();
}

function toggleEveryone(row){
let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render();
calc();
}

/* =========================
   🔥 FIXED SAFE CALC (ONLY CHANGE)
   ========================= */

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

let price=parseFloat(r.price);

/* skip invalid rows safely */
if(isNaN(price)) return;

subtotal += price;

let list=[];

if(r.people==="EVERYONE"){
list=[...nameList];
}else if(r.people){
list=r.people.split(",").map(p=>p.trim()).filter(Boolean);
}

let share = list.length ? price/list.length : 0;

list.forEach(p=>{
if(!people[p]) people[p]={total:0};
people[p].total += share;
});

});

/* TAX */
let taxVal=parseFloat(taxValue.value)||0;
let tax = taxMode.value==="percent"
? subtotal*(taxVal/100)
: taxVal;

/* TIP */
let tipVal=parseFloat(tipValue.value)||0;
let tip = tipMode.value==="percent"
? subtotal*(tipVal/100)
: tipVal;

/* SUMMARY */
summary.innerHTML=
`Subtotal: $${subtotal.toFixed(2)} | Tax: $${tax.toFixed(2)} | Tip: $${tip.toFixed(2)}`;

/* DISTRIBUTE TAX + TIP SAFELY */
Object.keys(people).forEach(p=>{
let ratio = subtotal ? (people[p].total/subtotal) : 0;
people[p].total += tax*ratio + tip*ratio;
});

/* OUTPUT */
let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{
div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}
</div>`;
});

}

init();
calc();

</script>

</body>
</html>
