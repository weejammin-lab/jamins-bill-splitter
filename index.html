<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:4px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.item-col{width:90px;}
.price-col{width:40px;}
.people-col{width:360px;}
.tap-col{width:360px;}

input{
width:100%;
box-sizing:border-box;
}

/* price */

.price-cell{
position:relative;
}

.price-cell span{
position:absolute;
left:4px;
top:3px;
color:gray;
}

.price-cell input{
padding-left:10px;
}

/* tap buttons */

.name-btn{
margin:2px;
padding:3px 7px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
border-radius:4px;
background:#e0e0e0;
transition:0.15s;
}

.name-btn.selected{
background:#b8f5b8;
border-color:#7ad67a;
}

.everyone-row{
margin-bottom:4px;
}

/* tax/tip */

.taxbox{
width:80px;
}

/* summary */

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-input{
width:120px;
margin-left:6px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th class="item-col">Item</th>
<th class="price-col">Price ($)</th>
<th class="people-col">People involved</th>
<th class="tap-col">Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

Tax
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="taxbox" oninput="calc()">

Tip
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="taxbox" oninput="calc()">

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

/* PEOPLE */

let nameList=[
"jamin",
"jack",
"cliff",
"willie",
"howard",
"lin",
"freddy"
];

let rows=[];
let venmoNames={};

/* INIT */

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

renderPeopleBar();
render();

}

/* ADD PERSON */

function handleAddPerson(e){

if(e.key==="Enter"){

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();

}

}

/* PEOPLE BAR */

function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{

bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>
`;

});

}

/* DELETE PERSON */

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{

r.selected = (r.selected||[]).filter(p=>p!==removed);

if(r.people){
r.people = r.people.split(",").map(p=>p.trim()).filter(p=>p!==removed).join(", ");
}

});

renderPeopleBar();
render();
calc();

}

/* PRICE INPUT */

function handlePriceInput(row,el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;

ensureEmptyRow();

calc();

}

/* UPDATE */

function update(i,key,val){

rows[i][key]=val;

ensureEmptyRow();

calc();

}

/* ========================= */
/* CORE ROW LOGIC FIX       */
/* ========================= */

function ensureEmptyRow(){

/* ALWAYS guarantee 1 empty row at bottom */

let last = rows[rows.length - 1];

let lastEmpty =
!last.item &&
!last.price &&
(!last.people || last.people.trim()==="") &&
(!last.selected || last.selected.length===0);

if(!lastEmpty){

rows.push({
item:"",
price:"",
people:"",
selected:[]
});

}

/* prevent multiple empty rows stacking */

for(let i=rows.length-2;i>=0;i--){

let a=rows[i];
let b=rows[i+1];

let aEmpty =
!a.item &&
!a.price &&
(!a.people || a.people.trim()==="") &&
(!a.selected || a.selected.length===0);

let bEmpty =
!b.item &&
!b.price &&
(!b.people || b.people.trim()==="") &&
(!b.selected || b.selected.length===0);

if(aEmpty && bEmpty && rows.length>5){
rows.splice(i+1,1);
}

}

}

/* TOGGLE NAME */

function toggleName(row,name){

let r=rows[row];

if(!r.selected) r.selected=[];

if(r.selected.includes(name)){
r.selected=r.selected.filter(p=>p!==name);
}else{
r.selected.push(name);
}

r.people = r.selected.join(", ");

render();
ensureEmptyRow();
calc();

}

/* EVERYONE */

function toggleEveryone(row){

let r=rows[row];

if(r.selected && r.selected.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
ensureEmptyRow();
calc();

}

/* RENDER */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

/* everyone */

tapHTML+=`
<div class="everyone-row">

<button
class="name-btn ${r.selected?.length===nameList.length ? 'selected':''}"
onclick="toggleEveryone(${i})">
everyone
</button>

</div>`;

/* names */

nameList.forEach(n=>{

let selected=r.selected?.includes(n);

tapHTML+=`
<button
class="name-btn ${selected?'selected':''}"
onclick="toggleName(${i},'${n}')">
${n}
</button>
`;

});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input value="${r.item}" oninput="update(${i},'item',this.value)">
</td>

<td class="price-cell">
<span>$</span>
<input type="text" inputmode="decimal"
value="${r.price}"
oninput="handlePriceInput(${i},this)">
</td>

<td>
<input value="${r.people}" oninput="update(${i},'people',this.value)">
</td>

<td>
${tapHTML}
</td>

`;

body.appendChild(tr);

});

}

/* CLEAR */

function clearAll(){

rows=[];
venmoNames={};

init();
calc();

}

/* CALC */

function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(r.price){

let price=parseFloat(r.price);
subtotal+=price;

let list =
r.selected?.length
? r.selected
: (r.people==="everyone"
? nameList
: (r.people||"")
.split(",")
.map(p=>p.trim())
.filter(Boolean));

let share=price/list.length||0;

list.forEach(p=>{

if(!people[p]) people[p]={total:0};
people[p].total+=share;

});

}

});

/* TAX */

let tax =
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

/* TIP */

let tip =
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

/* distribute */

Object.keys(people).forEach(p=>{

let ratio=people[p].total/subtotal||0;

people[p].total+=tax*ratio+tip*ratio;

});

/* summary */

summary.innerHTML=`
Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>`;

/* totals */

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{

if(!venmoNames[p]) venmoNames[p]="";

div.innerHTML+=`
<div class="result">

${p} owes $${people[p].total.toFixed(2)}

<input class="venmo-input"
placeholder="venmo user"
value="${venmoNames[p]}"
oninput="venmoNames['${p}']=this.value">

</div>
`;

});

}

/* START */

init();
calc();

</script>

</body>
</html>
