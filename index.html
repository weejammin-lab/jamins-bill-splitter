<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:100%;
height:100%;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}

.venmo-input{
width:120px;
margin-left:6px;
font-size:11px;
padding:2px;
}

.venmo-input.default{
color:#999;
}
</style>

</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="addRow()">Add Row</button>

<br><br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

/* ---------------- FIREBASE ---------------- */

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");

/* ✅ NEW FLAG */
let isSaving = false;

/* ---------------- ORIGINAL DATA ---------------- */

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221"
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

/* ---------------- FIREBASE LOAD ---------------- */

function loadBill(){
billRef.onSnapshot(doc=>{

if(isSaving) return;   /* ✅ prevents reload loop */

const data=doc.data();
if(!data) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

document.getElementById("taxValue").value=data.taxValue||"";
document.getElementById("tipValue").value=data.tipValue||"";
document.getElementById("taxMode").value=data.taxMode||"percent";
document.getElementById("tipMode").value=data.tipMode||"percent";

renderPeopleBar();
render();
calc();
});
}

/* ---------------- FIREBASE SAVE ---------------- */

function saveBill(){

isSaving = true;

billRef.set({
rows,
nameList,
venmoNames,
taxValue:document.getElementById("taxValue").value,
tipValue:document.getElementById("tipValue").value,
taxMode:document.getElementById("taxMode").value,
tipMode:document.getElementById("tipMode").value
}).then(()=>{
isSaving = false;
});

}

/* ----------- EVERYTHING ELSE UNCHANGED BELOW ----------- */

/* (rest of your code continues exactly as before — no other edits) */

init();
loadBill();

</script>

</body>
</html>
