<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#topBar{
display:flex;
gap:8px;
align-items:center;
margin-bottom:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:100%;
height:100%;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}

.venmo-input{
width:120px;
margin-left:6px;
font-size:11px;
padding:2px;
}
</style>

</head>

<body>

<h2>Bill Splitter</h2>

<div id="topBar">
<select id="receiptSelect" onchange="switchReceipt(this.value)"></select>
<button onclick="newReceipt()">+ New Receipt</button>
<button onclick="deleteReceipt()">Delete Receipt</button>
</div>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<br>
<button onclick="addRow()">Add Row</button>

<br><br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc(); scheduleSave();">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc(); scheduleSave();">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc(); scheduleSave();">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc(); scheduleSave();">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let currentReceiptId = "default";

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221"
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

/* debounce save (FIX typing bug) */
let saveTimer;
function scheduleSave(){
clearTimeout(saveTimer);
saveTimer=setTimeout(saveBill,400);
}

function ref(id){
return db.collection("bills").doc(id);
}

/* LOAD */
function switchReceipt(id){
currentReceiptId=id;

ref(id).onSnapshot(doc=>{
let data=doc.data();
if(!data) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

document.getElementById("taxValue").value=data.taxValue||"";
document.getElementById("tipValue").value=data.tipValue||"";
document.getElementById("taxMode").value=data.taxMode||"percent";
document.getElementById("tipMode").value=data.tipMode||"percent";

renderPeopleBar();
render();
calc();
});
}

/* SAVE */
function saveBill(){
ref(currentReceiptId).set({
rows,
nameList,
venmoNames,
taxValue:document.getElementById("taxValue").value,
tipValue:document.getElementById("tipValue").value,
taxMode:document.getElementById("taxMode").value,
tipMode:document.getElementById("tipMode").value
});
}

/* NEW */
function newReceipt(){
let name=prompt("Receipt name:");
if(!name) return;

currentReceiptId=name;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
saveBill();
loadList();
}

/* DELETE RECEIPT */
function deleteReceipt(){
if(!confirm("Delete this receipt?")) return;
db.collection("bills").doc(currentReceiptId).delete();
currentReceiptId="default";
init();
}

/* LIST */
function loadList(){
db.collection("bills").onSnapshot(snap=>{
let sel=document.getElementById("receiptSelect");
sel.innerHTML="";
snap.forEach(d=>{
let opt=document.createElement("option");
opt.value=d.id;
opt.textContent=d.id;
sel.appendChild(opt);
});
sel.value=currentReceiptId;
});
}

/* CLEAR FIXED */
function clearAll(){
if(!confirm("Clear everything?")) return;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

document.getElementById("taxValue").value="";
document.getElementById("tipValue").value="";

init();
scheduleSave();
}

/* INIT */
function init(){
rows=[];
for(let i=0;i<8;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}
renderPeopleBar();
render();
calc();
}

/* EVERYTHING ELSE SAME LOGIC */
function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(e.key!=="Enter") return;
let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;
nameList.push(name);
box.value="";
renderPeopleBar();
render();
calc();
scheduleSave();
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);
rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});
renderPeopleBar();
render();
calc();
scheduleSave();
}

function update(i,k,v){
rows[i][k]=v;
calc();
scheduleSave();
}

function handlePriceInput(i,el){
el.value=el.value.replace(/[^0-9.]/g,"");
rows[i].price=el.value;
calc();
scheduleSave();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();calc();scheduleSave();
}

function nav(e,row,col){
e.preventDefault();
let next=row+1;
if(next>=rows.length){addRow();return;}
setTimeout(()=>{
let el=document.querySelector(`[data-r="${next}"][data-c="${col}"]`);
el?.focus();el?.select?.();
},0);
}

/* RENDER */
function render(){
let body=document.getElementById("tableBody");
body.innerHTML="";
rows.forEach((r,i)=>{
let tr=document.createElement("tr");

tr.innerHTML=`
<td><textarea data-r="${i}" data-c="0"
onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea></td>

<td><textarea data-r="${i}" data-c="1"
onkeydown="if(event.key==='Enter'){nav(event,${i},1)}"
oninput="handlePriceInput(${i},this)">${r.price}</textarea></td>

<td><textarea data-r="${i}" data-c="2"
onkeydown="if(event.key==='Enter'){nav(event,${i},2)}"
oninput="update(${i},'people',this.value)">${r.people}</textarea></td>

<td></td>
`;

body.appendChild(tr);
});
}

/* CALC */
function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{
if(r.price){
let p=parseFloat(r.price);
subtotal+=p||0;
}
});

summary.innerHTML="Subtotal: $"+subtotal.toFixed(2);
}

/* START */
init();
loadList();
switchReceipt("default");

</script>

</body>
</html>
