<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
display:block;
}

.top-row{
display:flex;
gap:8px;
align-items:stretch;
margin-top:4px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:0;
}

.notes-box{
flex:1;
font-size:12px;
font-family:Arial;
padding:4px;
border:1px solid #ccc;
resize:none;
height:80px;
box-sizing:border-box;
}

.notes-box::placeholder{
color:#aaa;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

th:nth-child(1), td:nth-child(1){ width:17%; }
th:nth-child(2), td:nth-child(2){ width:13%; }

/* swapped widths */
th:nth-child(3), td:nth-child(3){ width:47%; }
th:nth-child(4), td:nth-child(4){ width:23%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:64px;
height:auto;
}

td:nth-child(2) textarea{
text-align:center;
font-variant-numeric: tabular-nums;
}

td textarea::placeholder{
color:#aaa;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
width:30%;
max-width:260px;
min-width:140px;
}

.sum-table{
font-family:monospace;
width:100%;
}

.row{
display:grid;
grid-template-columns:1fr auto;
column-gap:8px;
align-items:center;
white-space:nowrap;
}

.label{
text-align:left;
white-space:nowrap;
}

.value{
text-align:right;
white-space:nowrap;
}

.total .label,
.total .value{
font-weight:bold;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}
</style>

</head>

<body>

<h2>Bill Splitter</h2>

<div class="top-actions">
  <input class="add-person-input"
  id="addPersonBox"
  placeholder="type name + Enter"
  onkeydown="handleAddPerson(event)">

  <button class="clear-btn" onclick="clearAll()">Clear All</button>
</div>

<div class="top-row">

<div id="personBar"></div>

<textarea class="notes-box"
id="notesBox"
placeholder="type notes here"
oninput="saveNotes()"></textarea>

</div>

<br>

<table>
<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People Involved (Tap Names)</th>
<th>Type Names</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin:6px 0;">
<button onclick="addRow()">Add Row</button>
</div>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc()">
<option value="amount" selected>$</option>
<option value="percent">%</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc()">
<option value="amount" selected>$</option>
<option value="percent">%</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221"
  
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];

let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

let isLocalUpdate=false;

function loadBill(){
billRef.onSnapshot(doc=>{

if(isLocalUpdate) return;

const data=doc.data();
if(!data) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

document.getElementById("taxValue").value=data.taxValue||"";
document.getElementById("tipValue").value=data.tipValue||"";
document.getElementById("taxMode").value=data.taxMode||"amount";
document.getElementById("tipMode").value=data.tipMode||"amount";

document.getElementById("notesBox").value=data.notes||"";

renderPeopleBar();
render();
calc();
});
}

function saveBill(){

isLocalUpdate=true;

billRef.set({
rows,
nameList,
venmoNames,
taxValue:document.getElementById("taxValue").value,
tipValue:document.getElementById("tipValue").value,
taxMode:document.getElementById("taxMode").value,
tipMode:document.getElementById("tipMode").value,
notes:document.getElementById("notesBox").value
}).finally(()=>{
setTimeout(()=>isLocalUpdate=false,300);
});

}

function saveNotes(){
billRef.update({
notes: document.getElementById("notesBox").value
});
}

function init(){
rows=[];
for(let i=0;i<8;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}
renderPeopleBar();
render();
calc();
}

function clearAll(){
if(!confirm("Clear everything?")) return;

document.getElementById("taxValue").value="";
document.getElementById("tipValue").value="";
document.getElementById("taxMode").value="amount";
document.getElementById("tipMode").value="amount";
document.getElementById("notesBox").value="";

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

init();
saveBill();
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
saveBill();
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
saveBill();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

function handlePriceInput(row, el){

el.value = el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price = el.value;

calc();

}

function toggleName(row,name){
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

if(r.selected.length===nameList.length){
r.people="EVERYONE";
}else{
r.people=r.selected.join(", ");
}

render();
calc();
saveBill();
}

function toggleEveryone(row){
let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render();
calc();
saveBill();
}

function addRow(){
rows.push({item:"",price:"",people:"",selected:[]});
render();
calc();
saveBill();
}

function nav(e,row,col){
e.preventDefault();

let nextRow=row+1;

if(nextRow>=rows.length){
addRow();
setTimeout(()=>{
document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus();
},0);
return;
}

setTimeout(()=>{
let next=document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
if(next){
next.focus();
next.select?.();
}
},0);
}

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>

<div class="tap-grid">
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

tapHTML+=`</div>`;

let tr=document.createElement("tr");

tr.innerHTML=`
<td><textarea data-r="${i}" data-c="0"
placeholder="optional"
onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea></td>

<td><textarea data-r="${i}" data-c="1"
inputmode="decimal"
pattern="[0-9]*"
onkeydown="if(event.key==='Enter'){saveBill();nav(event,${i},1)}"
onblur="saveBill()"
oninput="handlePriceInput(${i},this)">${r.price}</textarea></td>

<td>${tapHTML}</td>

<td><textarea data-r="${i}" data-c="3"
onkeydown="if(event.key==='Enter'){nav(event,${i},3)}"
oninput="update(${i},'people',this.value)">${r.people}</textarea></td>
`;

body.appendChild(tr);
});
}

function calc(){

let subtotal=0;
let people={};

let taxVal=parseFloat(document.getElementById("taxValue").value)||0;
let tipVal=parseFloat(document.getElementById("tipValue").value)||0;

let taxMode=document.getElementById("taxMode").value;
let tipMode=document.getElementById("tipMode").value;

rows.forEach(r=>{
if(r.price){
let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;

let list=r.people==="EVERYONE"
? nameList
: (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{
if(!people[p]) people[p]={subtotalShare:0};
people[p].subtotalShare+=share;
});
}
});

let taxAmount=taxMode==="percent"?subtotal*(taxVal/100):taxVal;
let tipAmount=tipMode==="percent"?subtotal*(tipVal/100):tipVal;

let total=subtotal+taxAmount+tipAmount;

Object.keys(people).forEach(p=>{
let share=people[p].subtotalShare||0;
let ratio=subtotal?share/subtotal:0;

people[p].total=share+(taxAmount*ratio)+(tipAmount*ratio);
});

let taxPct = subtotal ? (taxAmount / subtotal * 100) : 0;
let tipPct = subtotal ? (tipAmount / subtotal * 100) : 0;

summary.innerHTML=`
<div class="sum-table">

<div class="row">
<div class="label">Subtotal</div>
<div class="value">${subtotal.toFixed(2)}</div>
</div>

<div class="row">
<div class="label">Tax (${taxPct.toFixed(2)}%)</div>
<div class="value">${taxAmount.toFixed(2)}</div>
</div>

<div class="row">
<div class="label">Tip (${tipPct.toFixed(2)}%)</div>
<div class="value">${tipAmount.toFixed(2)}</div>
</div>

<div class="row total">
<div class="label">Total</div>
<div class="value">${total.toFixed(2)}</div>
</div>

</div>
`;

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{

let venmoId = venmoNames[p] || "";

div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}

${venmoId ? `
<button class="venmo-btn"
onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">
Request
</button>` : ``}

</div>`;
});
}

init();
loadBill();

</script>
<br><br><br><br>
</body>
</html>
