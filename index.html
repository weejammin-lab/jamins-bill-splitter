<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 1000px;
    margin: auto;
    padding: 10px;
}

/* People bar */

.person-bar {
    margin-bottom: 8px;
}

.person-tag {

    display: inline-block;
    padding: 3px 6px;
    border: 1px solid #ccc;
    margin: 2px;
    font-size: 12px;

}

.delete-person {
    margin-left: 4px;
    cursor: pointer;
    color: red;
}

.add-person {
    padding: 3px 6px;
    font-size: 12px;
}

/* Table */

table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
}

td, th {
    border: 1px solid #ddd;
    padding: 3px;
}

.item-col { width: 110px; }
.price-col { width: 60px; }
.people-col { width: 170px; }
.tap-col { width: 330px; }

/* Price */

.price-cell {
    position: relative;
}

.price-cell span {
    position: absolute;
    left: 5px;
    top: 3px;
    color: gray;
}

.price-cell input {
    padding-left: 12px;
}

/* Tap buttons */

.name-btn {

    margin: 1px;
    padding: 2px 5px;
    font-size: 11px;
    cursor: pointer;

}

/* Clear */

.clear-btn {
    float: right;
    margin-bottom: 5px;
}

/* Totals */

.summary-box {
    border: 1px solid #ccc;
    padding: 8px;
    margin-top: 8px;
}

.result {
    font-weight: bold;
    margin: 4px 0;
}

</style>

</head>

<body>

<h2>Bill Splitter</h2>

<button class="clear-btn" onclick="clearAll()">
Clear All
</button>

<!-- PEOPLE LIST -->

<div class="person-bar" id="personBar"></div>

<button class="add-person" onclick="addPerson()">
+ add person
</button>

<table>

<thead>

<tr>

<th class="item-col">
Item (optional)
</th>

<th class="price-col">
Price ($)
</th>

<th class="people-col">
People involved
</th>

<th class="tap-col">
Tap Names
</th>

</tr>

</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

Tax

<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="taxValue"
type="number"
oninput="calc()">

Tip

<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>

<input id="tipValue"
type="number"
oninput="calc()">

<div class="summary-box" id="summary"></div>

<div id="totals"></div>

<script>

/* PEOPLE LIST */

let nameList=[
"jamin",
"willie",
"howard",
"cliff",
"lin",
"jack",
"freddy"
];

/* ROWS */

let rows=[];

/* INIT */

function init(){

rows=[];

for(let i=0;i<10;i++){

rows.push({

item:"",
price:"",
people:
i===0
? "jamin (type or click name)"
: "everyone"

});

}

renderPeopleBar();
render();

}

/* PEOPLE BAR */

function renderPeopleBar(){

let bar=
document.getElementById("personBar");

bar.innerHTML="";

nameList.forEach((n,i)=>{

bar.innerHTML+=`

<span class="person-tag">

${n}

<span
class="delete-person"
onclick="deletePerson(${i})">
✖
</span>

</span>

`;

});

}

/* ADD PERSON */

function addPerson(){

let name=
prompt("Enter name (lowercase)");

if(!name) return;

name=name.trim();

nameList.push(name);

renderPeopleBar();
render();
calc();

}

/* DELETE PERSON */

function deletePerson(i){

nameList.splice(i,1);

/* Remove from rows */

rows.forEach(r=>{

let list=
r.people
.split(",")
.map(p=>p.trim());

list=list.filter(
p=>p!==nameList[i]
);

r.people=list.join(", ");

});

renderPeopleBar();
render();
calc();

}

/* ADD ROW */

function addRow(){

rows.push({

item:"",
price:"",
people:"everyone"

});

}

/* AUTO EXPAND */

function maybeExpand(){

if(rows.filter(r=>r.price).length>rows.length-2){

for(let i=0;i<5;i++)
addRow();

render();

}

}

/* RENDER TABLE */

function render(){

let body=
document.getElementById("tableBody");

body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML="";

/* Everyone */

tapHTML+=
`<button
class="name-btn"
onclick="setEveryone(${i})">
everyone
</button>`;

/* Names */

nameList.forEach(n=>{

tapHTML+=
`<button
class="name-btn"
onclick="toggleName(${i},'${n}')">
${n}
</button>`;

});

let tr=
document.createElement("tr");

tr.innerHTML=`

<td>

<input
value="${r.item}"
oninput="update(${i},'item',this.value)">

</td>

<td class="price-cell">

<span>$</span>

<input
type="number"
step="0.01"
value="${r.price}"
oninput="update(${i},'price',this.value)">

</td>

<td>

<input
value="${r.people}"
oninput="update(${i},'people',this.value)">

</td>

<td>

${tapHTML}

</td>

`;

body.appendChild(tr);

});

}

/* TOGGLE NAME */

function toggleName(row,name){

let current=
rows[row].people;

if(current==="everyone"){

rows[row].people=
nameList.join(", ");

}

let list=
rows[row].people
.split(",")
.map(p=>p.trim());

if(list.includes(name)){

list=list.filter(p=>p!==name);

}

else{

list.push(name);

}

rows[row].people=
list.join(", ");

render();
calc();

}

/* EVERYONE */

function setEveryone(row){

rows[row].people="everyone";

render();
calc();

}

/* UPDATE */

function update(i,key,val){

rows[i][key]=val;

maybeExpand();

calc();

}

/* CLEAR */

function clearAll(){

init();
calc();

}

/* CALCULATE */

function calc(){

let items=
rows.filter(r=>r.price && r.people);

let people={};
let subtotal=0;

items.forEach(i=>{

let price=
parseFloat(i.price);

subtotal+=price;

let list=
i.people==="everyone"
? nameList
: i.people
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share=
price/list.length;

list.forEach(p=>{

if(!people[p])
people[p]={total:0};

people[p].total+=share;

});

});

/* TAX */

let tax=
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

/* TIP */

let tip=
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

/* DISTRIBUTE */

Object.keys(people).forEach(p=>{

let ratio=
people[p].total/subtotal||0;

people[p].total+=
tax*ratio+
tip*ratio;

});

/* SUMMARY */

summary.innerHTML=

`Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
<strong>Total: $${total.toFixed(2)}</strong>`;

/* TOTALS */

let div=
document.getElementById("totals");

div.innerHTML="";

Object.keys(people).forEach(p=>{

div.innerHTML+=
`<div class="result">
${p} owes $${people[p].total.toFixed(2)}
</div>`;

});

}

/* START */

init();
calc();

</script>

</body>
</html>
