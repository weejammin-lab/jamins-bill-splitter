<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
}

td,th{
border:1px solid #ddd;
padding:3px;
}

.item-col{width:80px;}
.price-col{width:60px;}
.people-col{width:520px;}
.tap-col{width:360px;}

input{
width:100%;
box-sizing:border-box;
border:1px solid #ccc;
background:white;
}

/* PRICE */

.price-cell{
position:relative;
width:60px;
}

.price-cell span{
position:absolute;
left:4px;
top:3px;
color:gray;
}

.price-cell input{
padding-left:10px;
text-align:right;
}

/* BUTTONS */

.name-btn{
margin:2px;
padding:2px 6px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.tax-tip-select{
width:50px;
padding:4px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div class="summary-box" id="summary"></div>

<script>

/* ===== DATA ===== */

let nameList=["jamin","jack","cliff","willie","howard","lin","freddy"];

let rows=[];

/* ===== SAFE INIT (FORCE 5 ROWS ALWAYS) ===== */

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

render();
calc();
}

/* ===== SAFE AUTO ROW ===== */

function ensureRow(){

let last=rows[rows.length-1];

let filled =
(last.item && last.item.trim()) ||
(last.price && last.price.trim()) ||
(last.people && last.people.trim());

if(filled){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});

render();
}
}

/* ===== ENTER NAVIGATION ===== */

function moveDown(e,row,col){

if(e.key!=="Enter") return;

e.preventDefault();

ensureRow();

setTimeout(()=>{

let next=document.querySelector(
`[data-row='${row+1}'][data-col='${col}']`
);

if(next){
next.focus();
next.select?.();
}

},0);
}

/* ===== INPUT ===== */

function update(i,key,val){

rows[i][key]=val;

ensureRow();
calc();
}

/* PRICE CLEAN */

function handlePriceInput(row,el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;

ensureRow();
calc();
}

/* ===== TAP ===== */

function toggleName(row,name){

let r=rows[row];

if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.join(", ");

render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();
}

/* ===== RENDER ===== */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`<div>
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input data-row="${i}" data-col="0"
value="${r.item}"
oninput="update(${i},'item',this.value)"
onkeydown="moveDown(event,${i},0)">
</td>

<td>
<input data-row="${i}" data-col="1"
value="${r.price}"
oninput="handlePriceInput(${i},this)"
onkeydown="moveDown(event,${i},1)">
</td>

<td>
<input data-row="${i}" data-col="2"
value="${r.people}"
oninput="update(${i},'people',this.value)"
onkeydown="moveDown(event,${i},2)">
</td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

/* ===== CALC ===== */

function calc(){

let subtotal=0;

rows.forEach(r=>{
if(r.price){
let p=parseFloat(r.price);
if(!isNaN(p)) subtotal+=p;
}
});

summary.innerHTML=`Subtotal: $${subtotal.toFixed(2)}`;
}

/* ===== START ===== */

init();

</script>

</body>
</html>
