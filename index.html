<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

<title>Bill Splitter</title>

<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --accent: #7c6af7;
  --accent-light: #ede9ff;
  --accent2: #f06a6a;
  --accent2-light: #fff0f0;
  --green: #3ecf76;
  --green-light: #e8faf0;
  --border: #e2dfd8;
  --text: #2d2a26;
  --muted: #9c9690;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: 'DM Sans', Arial, sans-serif;
  max-width: 390px;
  margin: auto;
  padding: 10px 10px 40px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

html, body {
  overscroll-behavior-y: contain;
}

.receipt-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.receipt-overlay img {
  max-width: 90%;
  max-height: 90%;
  border-radius: var(--radius);
  object-fit: contain;
}

.header-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.load-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 4px;
}

.header-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
  flex: 1;
  justify-content: flex-start;
  padding-left: 6px;
}

.receipt-thumb {
  width: 34px;
  height: 34px;
  object-fit: cover;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: block;
}
.receipt-thumb-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 4px;
}
.remove-receipt {
  font-size: 15px;
  color: var(--accent2);
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
  padding: 0;
  font-weight: bold;
}

.action-row {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-bottom: 3px;
  flex-wrap: nowrap;
}
.right-actions {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

.name-input-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.people-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0; padding: 0; line-height: 1;
}

.add-person-input {
  padding: 5px 8px;
  font-size: 14px;
  width: 136px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.add-person-input:focus { border-color: var(--accent); }
.add-person-input::placeholder { color: var(--muted); font-size: 12px; }

.upload-btn {
  font-size: 12px;
  padding: 5px 6px;
  white-space: normal;
  word-break: break-word;
  width: 68px;
  line-height: 1.2;
  text-align: center;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, background 0.15s;
}
.upload-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }

#billDropdown {
  font-size: 14px;
  padding: 5px 8px;
  width: 230px;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.save-bill-btn {
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 54px;
  text-align: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, background 0.15s;
  box-shadow: 0 2px 6px rgba(124,106,247,0.25);
}
.save-bill-btn:hover { background: #6a58e5; }
.save-bill-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

#newBillBtn {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}
#newBillBtn:hover { background: #444; }

.archived-label {
  color: var(--accent2);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent2-light);
  padding: 2px 8px;
  border-radius: 20px;
}
.archived-row {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 4px;
  min-height: 16px;
}

.top-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
  margin-top: 0px;
  margin-bottom: 8px;
}

#personBar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  flex: 1;
  max-width: 50%;
  margin-bottom: 2px;
}
.person-tag {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 3px 4px;
  font-size: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.delete-person {
  color: var(--accent2) !important;
  cursor: pointer;
  margin-left: 0;
  -webkit-text-fill-color: var(--accent2);
  font-size: 11px;
}

.notes-box {
  flex: 0 0 50%;
  max-width: 50%;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  resize: none;
  height: 75px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  outline: none;
  transition: border-color 0.15s;
}
.notes-box:focus { border-color: var(--accent); }
.notes-box::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
}

td, th {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 2px;
  vertical-align: top;
}
td:last-child, th:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }

thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--accent-light);
}
thead th {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--accent);
  padding: 5px 4px;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 20%; }
th:nth-child(3), td:nth-child(3) { width: 14%; }
th:nth-child(4), td:nth-child(4) { width: 58%; }

.lock-cell { text-align: center; font-size: 12px; }

/* FIX 1: removed td textarea:focus background so purple hue doesn't linger after clicking */
td textarea {
  width: 100%;
  box-sizing: border-box;
  font-size: 14px;
  resize: none;
  overflow: hidden;
  border: none;
  padding: 3px 4px;
  font-family: 'DM Sans', sans-serif;
  display: block;
  min-height: 50px;
  height: auto;
  background: transparent;
  color: var(--text);
  outline: none;
}
td:nth-child(3) textarea {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size:16px;      /* prevents mobile zoom */
  /* FIX 2: keep price textarea at fixed height but allow full td to be clickable */
  min-height: 23px;
  height: 23px;
  padding: 1px;
}
td textarea::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

/* FIX 2: make item and price td cells fully clickable */
td.clickable-cell {
  cursor: text;
}

.tap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 2px;
}
.name-btn {
  margin: 1px;
  padding: 4px 2px;
  font-size: 13px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.name-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.name-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}
.everyone-btn {
   width: calc(100% - 4px);
  margin: 0 2px 4px 2px;
  font-size: 13px;
  padding: 4px 1px;
  border-radius: 20px;
  background: #f7f6f3;
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.everyone-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}

.lock-btn {
  margin-top: 3px;
  padding: 2px 4px;
  font-size: 11px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  transition: 0.15s;
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
}
.lock-btn.locked { background: var(--accent2-light); border-color: var(--accent2); }
.lock-btn.unlocked { opacity: 0.6; }

tr.locked-row td { background: #fafaf9; opacity: 0.85; }
tr.locked-row textarea { background: transparent; }

#addRowBtn, #add5RowsBtn, #deleteLastRowBtn {
  font-size: 12px;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
}
#addRowBtn:hover, #add5RowsBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#deleteLastRowBtn:hover { border-color: var(--accent2); background: var(--accent2-light); }

.tax-tip-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.tax-tip-wrap label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: 26px;
}
.tax-tip-wrap select {
  font-size: 13px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.tax-tip-input {
  width: 70px;
  padding: 4px 8px;
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.tax-tip-input:focus { border-color: var(--accent); }

.summary-save-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
}
.summary-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  width: 30%;
  max-width: 260px;
  min-width: 148px;
  box-shadow: var(--shadow);
}
.sum-table {
  font-family: 'DM Mono', monospace;
  width: 100%;
  font-size: 12px;
}
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 6px;
  align-items: center;
  white-space: nowrap;
  padding: 1px 0;
}
.label { text-align: left; white-space: nowrap; color: var(--muted); }
.value { text-align: right; white-space: nowrap; }
.total .label, .total .value {
  font-weight: bold;
  color: var(--text);
  font-size: 13px;
  padding-top: 3px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}

.result {
  font-weight: 600;
  margin: 5px 0;
  font-size: 14px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 4px;
}

.venmo-btn {
  margin-left: auto;
  font-size: 12px;
  background: #3d95ce;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
}
.venmo-btn:hover { background: #2f7eb8; }

.bill-actions-row {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 12px;
}
.archive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: #fff8e1;
  border: 1.5px solid #f0c040;
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.unarchive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--green-light);
  border: 1.5px solid var(--green);
  border-radius: 20px;
  color: #1a8a45;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.delete-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--accent2-light);
  border: 1.5px solid var(--accent2);
  border-radius: 20px;
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.row-btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
.archived-section { opacity: 0.75; }
.th-people { line-height: 1.3; }
</style>

</head>
<body>

<!-- ROW 1: New Bill | Upload Receipt + thumbnail | Save -->
<div class="header-row">
  <button id="newBillBtn" onclick="clearAll()">+ New Bill</button>

  <div class="header-center">
    <input type="file"
      id="receiptUpload"
      accept="image/*"
      style="display:none"
      onchange="handleReceiptUpload(event)">
    <button class="upload-btn" id="uploadReceiptBtn" onclick="document.getElementById('receiptUpload').click()">
      Upload Receipt
    </button>
    <div id="receiptPreviewContainer"></div>
  </div>

  <button class="save-bill-btn" id="saveBillBtn" onclick="saveNewBill()">Save</button>
</div>

<!-- ROW 2: Load dropdown -->
<div class="load-row">
  <select id="billDropdown" onchange="loadSavedBill(this.value)">
    <option value="" disabled selected style="color:#aaa;">— load a saved bill —</option>
  </select>

  <div class="name-input-wrap">
    <span class="people-label">Add Person</span>
    <input class="add-person-input"
      id="addPersonBox"
      placeholder="type name + Enter"
      onkeydown="handleAddPerson(event)">
  </div>
</div>

<!-- Archived label row -->
<div class="archived-row">
  <span id="archivedLabel" class="archived-label" style="display:none;">⛔ ARCHIVED — edits cannot be made</span>
</div>

<div class="top-row">
  <textarea class="notes-box"
    id="notesBox"
    placeholder="type notes here"
    oninput="saveNotes(); markDirty()"></textarea>

  <div id="personBar"></div>
</div>

<div id="mainContentSection">
<table>
<thead>
<tr>
<th> </th>
<th>Item</th>
<th>Price ($)</th>
<th class="th-people">People Involved<br><span style="font-weight:normal;font-size:10px;text-transform:none;letter-spacing:0;">(Tap Names)</span></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin:7px 0; display:flex; gap:5px; align-items:center;">
  <button id="addRowBtn" onclick="addRow()">+ 1 Row</button>
  <button id="add5RowsBtn" onclick="add5Rows()">+ 5 Rows</button>
  <button id="deleteLastRowBtn" onclick="deleteLastRow()">Delete Last</button>
  <span id="deleteMsg" style="color:var(--accent2); font-size:11px;"></span>
    <button
    class="save-bill-btn"
    id="saveBillBtnBottom"
    onclick="saveNewBill()"
    style="margin-left:auto;">
    Save
  </button>
</div>

<div class="tax-tip-wrap" id="taxWrap">
  <label>Tax</label>
  <select id="taxMode" onchange="calc(); markDirty()">
    <option value="amount" selected>$</option>
    <option value="percent">%</option>
  </select>
  <input id="taxValue" class="tax-tip-input"
    inputmode="decimal"
    onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('tipValue').focus();}"
    oninput="calc(); markDirty()">
</div>

<div class="tax-tip-wrap" id="tipWrap">
  <label>Tip</label>
  <select id="tipMode" onchange="calc(); markDirty()">
    <option value="amount" selected>$</option>
    <option value="percent">%</option>
  </select>
  <input id="tipValue" class="tax-tip-input"
    inputmode="decimal"
    oninput="calc(); markDirty()">
</div>
</div>

<!-- Summary + bottom Save button on same row -->
<div class="summary-save-row">
  <div class="summary-box" id="summary"></div>

</div>

<div id="totals" style="margin-top:8px;"></div>

<div class="bill-actions-row" id="billActionsRow" style="display:none;">
  <button id="archiveToggleBtn" class="archive-btn" onclick="toggleArchive()">Archive Bill</button>
  <button class="delete-btn" onclick="deleteBill()">Delete Bill</button>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");
const storage = firebase.storage();

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221",
freddy:"freddy-dai",
viv:"vivian-bang",
vivian:"vivian-bang",
maria:"mariapdiaz",
paarus:"paarus-ali",
anna:"anna-claire-choi",
michelle:"michelletran9",
mich:"michelletran9",
victoria:"victoriabao",
vic:"victoriabao",
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];
let billLoaded = false;
let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};
let isRendering = false;
let receiptUrl="";
let isLocalUpdate=false;
let lastSavedReceiptUrl = null;
let currentLoadedBillId = null;
let currentLoadedBillTitle = null;
let isArchived = false;
let isDirty = false;
let loadedSnapshot = null;
let newBillFirstInputDate = null;
let isUploadingReceipt = false;

function formatDate(ts){
  const d = new Date(ts);
  const mm = d.getMonth()+1;
  const dd = d.getDate();
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function snapshotState(){
  return JSON.stringify({
    rows,
    nameList,
    receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId
  });
}

function defaultSnapshot(){
  return JSON.stringify({
    rows: Array(8).fill(null).map(()=>({item:"",price:"",people:"",selected:[],locked:false})),
    nameList: [...defaultNames],
    receiptUrl: "",
    taxValue: "",
    tipValue: "",
    taxMode: "amount",
    tipMode: "amount",
    notes: "",
    currentLoadedBillId: null
  });
}

function markDirty(){
  if(currentLoadedBillId){
    const a = JSON.parse(snapshotState()); delete a.currentLoadedBillId;
    const b = JSON.parse(loadedSnapshot || "{}"); delete b.currentLoadedBillId;
    isDirty = JSON.stringify(a) !== JSON.stringify(b);
  } else {
    isDirty = snapshotState() !== defaultSnapshot();
    if(isDirty && !newBillFirstInputDate) newBillFirstInputDate = Date.now();
  }
  updateSaveButtonState();
}

function updateSaveButtonState(){
  const btn = document.getElementById("saveBillBtn");
  const btnBottom = document.getElementById("saveBillBtnBottom");
  [btn, btnBottom].forEach(b => {
    if(!b) return;
    if(b.dataset.feedback === "1") return;
    b.textContent = "Save";
    b.style.color = "";
    b.style.fontSize = "";
    b.style.background = "";
    if(currentLoadedBillId){
      b.disabled = !isDirty || isArchived;
    } else {
      b.disabled = !isDirty;
    }
  });
}

function updateArchivedUI(){
  const label = document.getElementById("archivedLabel");
  label.style.display = isArchived ? "inline" : "none";

  const archiveBtn = document.getElementById("archiveToggleBtn");
  if(archiveBtn){
    archiveBtn.textContent = isArchived ? "Unarchive Bill" : "Archive Bill";
    archiveBtn.className = isArchived ? "unarchive-btn" : "archive-btn";
  }

  const actionsRow = document.getElementById("billActionsRow");
  if(actionsRow) actionsRow.style.display = currentLoadedBillId ? "flex" : "none";

  const mainSection = document.getElementById("mainContentSection");
  const notesBox = document.getElementById("notesBox");
  const personBar = document.getElementById("personBar");
  const summaryBox = document.getElementById("summary");
  const totalsBox = document.getElementById("totals");
  const uploadBtn = document.getElementById("uploadReceiptBtn");
  const addRowBtn = document.getElementById("addRowBtn");
  const add5RowsBtn = document.getElementById("add5RowsBtn");
  const deleteLastRowBtn = document.getElementById("deleteLastRowBtn");
  const taxValue = document.getElementById("taxValue");
  const tipValue = document.getElementById("tipValue");
  const taxMode = document.getElementById("taxMode");
  const tipMode = document.getElementById("tipMode");

  if(isArchived){
    mainSection.classList.add("archived-section");
    notesBox.classList.add("archived-section");
    personBar.classList.add("archived-section");
    summaryBox.classList.add("archived-section");
    totalsBox.classList.add("archived-section");
    notesBox.setAttribute("disabled","");
    taxValue.setAttribute("disabled","");
    tipValue.setAttribute("disabled","");
    taxMode.setAttribute("disabled","");
    tipMode.setAttribute("disabled","");
    [uploadBtn, addRowBtn, add5RowsBtn, deleteLastRowBtn].forEach(btn => {
      if(btn){ btn.disabled = true; btn.classList.add("row-btn-disabled"); }
    });
  } else {
    mainSection.classList.remove("archived-section");
    notesBox.classList.remove("archived-section");
    personBar.classList.remove("archived-section");
    summaryBox.classList.remove("archived-section");
    totalsBox.classList.remove("archived-section");
    notesBox.removeAttribute("disabled");
    taxValue.removeAttribute("disabled");
    tipValue.removeAttribute("disabled");
    taxMode.removeAttribute("disabled");
    tipMode.removeAttribute("disabled");
    [uploadBtn, addRowBtn, add5RowsBtn, deleteLastRowBtn].forEach(btn => {
      if(btn){ btn.disabled = false; btn.classList.remove("row-btn-disabled"); }
    });
  }

  updateSaveButtonState();
}

function hasContent(){
  const hasRows = rows.some(r => r.price || r.item);
  const hasTax = !!document.getElementById("taxValue").value;
  const hasTip = !!document.getElementById("tipValue").value;
  const hasNotes = !!document.getElementById("notesBox").value;
  const hasReceipt = !!receiptUrl;
  const hasCustomNames = JSON.stringify(nameList) !== JSON.stringify(defaultNames);
  return hasRows || hasTax || hasTip || hasNotes || hasReceipt || hasCustomNames;
}

  return new Promise(resolve => {
    const overlay = document.createElement("div");
    overlay.style.cssText = `
      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.5);z-index:9999;
      display:flex;align-items:center;justify-content:center;
    `;
    const box = document.createElement("div");
    box.style.cssText = `
      background:#fff;padding:20px;border-radius:14px;
      max-width:300px;width:90%;font-family:'DM Sans',sans-serif;font-size:15px;
      box-shadow:0 8px 32px rgba(0,0,0,0.18);
    `;
    box.innerHTML = `<p style="margin:0 0 16px;">${message}</p>`;

    const btnStyle = `
      display:block;width:100%;padding:10px;margin-bottom:8px;
      font-size:15px;border-radius:20px;cursor:pointer;border:1.5px solid #e2dfd8;
      font-family:'DM Sans',sans-serif;font-weight:500;
    `;

    const saveBtn = document.createElement("button");
    saveBtn.textContent = "Save";
    saveBtn.style.cssText = btnStyle + "background:#7c6af7;color:white;border-color:#7c6af7;font-weight:600;";
    saveBtn.onclick = () => { document.body.removeChild(overlay); resolve("save"); };

    const noBtn = document.createElement("button");
    noBtn.textContent = "Don't Save";
    noBtn.style.cssText = btnStyle + "background:#fff;";
    noBtn.onclick = () => { document.body.removeChild(overlay); resolve("nosave"); };

    const cancelBtn = document.createElement("button");
    cancelBtn.textContent = "Cancel";
    cancelBtn.style.cssText = btnStyle + "background:#f5f3ef;margin-bottom:0;";
    cancelBtn.onclick = () => { document.body.removeChild(overlay); resolve("cancel"); };

    box.appendChild(saveBtn);
    box.appendChild(noBtn);
    box.appendChild(cancelBtn);
    overlay.appendChild(box);
    document.body.appendChild(overlay);
  });
}

      position:fixed;top:0;left:0;width:100%;height:100%;
      background:rgba(0,0,0,0.5);z-index:9999;

    `;

async function checkUnsavedBill(){
  if(currentLoadedBillId && isDirty){
    const choice = await confirmUnsaved("There are unsaved changes to this bill.");
    if(choice === "save"){ await saveNewBill(); return true; }
    if(choice === "nosave"){ return true; }
    return false;
  }
  if(!currentLoadedBillId && hasContent()){
    const choice = await confirmUnsaved("There are unsaved changes. Save this bill before continuing?");
    if(choice === "save"){
      let title = prompt("Enter a title for this bill (max 15 characters):");
      if(!title || !title.trim()) return false;
      title = title.trim().slice(0, 15);
      const billData = {
        title,
        savedAt: newBillFirstInputDate || Date.now(),
        ...getCurrentBillData()
      };
      const docRef = await db.collection("savedBills").add(billData);
      currentLoadedBillId = docRef.id;
      currentLoadedBillTitle = title;
      await loadSavedBillsList();
      return true;
    }
    if(choice === "nosave"){ return true; }
    return false;
  }
  return true;
}

wrap.className = "receipt-thumb-wrap";

img.className = "receipt-thumb";
img.onclick = function(){
  const overlay = document.createElement("div");
  overlay.className = "receipt-overlay";
  const full = document.createElement("img");
  full.src = url;
  overlay.appendChild(full);

function applyLiveData(data){
  rows = data.rows || [];
  nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || "";
  lastSavedReceiptUrl = receiptUrl;
  currentLoadedBillId = data.currentLoadedBillId || null;
  currentLoadedBillTitle = data.currentLoadedBillTitle || null;
  isArchived = data.isArchived || false;

  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";

  if(receiptUrl){
    showReceiptThumbnail(receiptUrl);
  } else {
    document.getElementById("receiptPreviewContainer").innerHTML = "";
  }

  if(currentLoadedBillId){
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: data.taxValue || "",
      tipValue: data.tipValue || "",
      taxMode: data.taxMode || "amount",
      tipMode: data.tipMode || "amount",
      notes: data.notes || ""
    });
  }
}

function loadBill(){
billRef.onSnapshot(doc=>{
  if(isUploadingReceipt) return;
  if(isLocalUpdate) return;

  const data = doc.data();
  if(!data) return;

  applyLiveData(data);

  billLoaded = true;
  isDirty = false;

  if(!rows || rows.length === 0){
    rows = [];
    for(let i=0;i<8;i++){
      rows.push({item:"",price:"",people:"",selected:[],locked:false});
    }
  }

  renderPeopleBar();
  render();
  calc();
  updateSaveButtonState();
  updateArchivedUI();

  loadSavedBillsList().then(()=>{
    if(currentLoadedBillId){
      document.getElementById("billDropdown").value = currentLoadedBillId;
    }
  });
});
}

async function handleReceiptUpload(event){
if(isArchived) return;
const file = event.target.files[0];
if(!file) return;

if(receiptUrl){
  const confirmed = await confirmAction("Replace the current receipt with this new one?");
  if(!confirmed){
    event.target.value = "";
    return;
  }
}

if(file.size > 15 * 1024 * 1024){
  alert("Image too large. Please upload a photo under 15MB.");
  event.target.value = "";
  return;
}

isUploadingReceipt = true;
isLocalUpdate = true;

try {
  const storageRef = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
  await storageRef.put(file);
  const url = await storageRef.getDownloadURL();

  receiptUrl = url;
  lastSavedReceiptUrl = url;
  showReceiptThumbnail(url);

  await billRef.set({
    rows,
    nameList,
    venmoNames,
    receiptUrl: url,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId,
    currentLoadedBillTitle,
    isArchived
  });

  markDirty();
} finally {
  event.target.value = "";
  setTimeout(()=>{
    isUploadingReceipt = false;
    isLocalUpdate = false;
  }, 500);
}
}

function saveBill(){
if(!billLoaded) return;
isLocalUpdate = true;

if(!receiptUrl || receiptUrl.length < 5){
  receiptUrl = lastSavedReceiptUrl || "";
}

billRef.set({
  rows,
  nameList,
  venmoNames,
  receiptUrl,
  taxValue: document.getElementById("taxValue").value,
  tipValue: document.getElementById("tipValue").value,
  taxMode: document.getElementById("taxMode").value,
  tipMode: document.getElementById("tipMode").value,
  notes: document.getElementById("notesBox").value,
  currentLoadedBillId,
  currentLoadedBillTitle,
  isArchived
}).then(()=>{
  if(receiptUrl && receiptUrl.length > 5) lastSavedReceiptUrl = receiptUrl;
}).finally(()=>{
  setTimeout(()=>isLocalUpdate=false, 300);
});
}

function getCurrentBillData(){
return {
  rows,
  nameList,
  venmoNames,
  receiptUrl: receiptUrl || "",
  taxValue: document.getElementById("taxValue").value,
  tipValue: document.getElementById("tipValue").value,
  taxMode: document.getElementById("taxMode").value,
  tipMode: document.getElementById("tipMode").value,
  notes: document.getElementById("notesBox").value
};
}

function showSavedFeedback(){
  ["saveBillBtn","saveBillBtnBottom"].forEach(id => {
    const btn = document.getElementById(id);
    if(!btn) return;
    btn.dataset.feedback = "1";
    btn.textContent = "saved!";

    btn.style.background = "#3ecf76";
    btn.disabled = true;
    setTimeout(()=>{

      btn.style.color = "";

async function saveNewBill(){
  if(isArchived) return;

  if(currentLoadedBillId){
    await db.collection("savedBills").doc(currentLoadedBillId).update({
      ...getCurrentBillData()
    });
    isDirty = false;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    showSavedFeedback();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
  } else {
    let title = prompt("Enter a title for this bill (max 15 characters):");
    if(!title || !title.trim()) return;
    title = title.trim().slice(0, 15);

    const billData = {
      title,
      savedAt: newBillFirstInputDate || Date.now(),
      ...getCurrentBillData()
    };

    const docRef = await db.collection("savedBills").add(billData);
    currentLoadedBillId = docRef.id;
    currentLoadedBillTitle = title;
    isDirty = false;
    newBillFirstInputDate = null;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });

    saveBill();

    alert(`"${title}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = docRef.id;
    updateSaveButtonState();
    updateArchivedUI();
  }
}

async function toggleArchive(){
  if(!currentLoadedBillId){
    alert("Save this bill first before archiving.");
    return;
  }

  if(isArchived){
    const pw = prompt("Enter password to unarchive:");
    if(!pw) return;
    if(pw.trim().toLowerCase() !== "unarchive"){
      alert("Incorrect password.");
      return;
    }
    rows.forEach(r => r.locked = false);
    await db.collection("savedBills").doc(currentLoadedBillId).update({ archived: false, rows });
    isArchived = false;
    isDirty = false;
    saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI();
    render();
    alert(`"${currentLoadedBillTitle}" has been unarchived.`);
  } else {
    const confirmed = confirm(`Archive "${currentLoadedBillTitle}"?\n\nArchived Bills can't be edited but can still be viewed.`);
    if(!confirmed) return;
    rows.forEach(r => r.locked = true);
    rows = rows.filter(r => r.price || r.item || (r.selected && r.selected.length));
    await db.collection("savedBills").doc(currentLoadedBillId).update({
      ...getCurrentBillData(), rows, archived: true
    });
    isArchived = true;
    isDirty = false;
    saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI();
    render();
    alert(`"${currentLoadedBillTitle}" has been archived.`);
  }
}

async function deleteBill(){
  if(isArchived){ alert("Archived bills cannot be deleted."); return; }
  if(!currentLoadedBillId){ alert("This bill hasn't been saved yet — nothing to delete."); return; }
  const confirmed = confirm(`Delete "${currentLoadedBillTitle}"? This cannot be undone.`);
  if(!confirmed) return;
  await db.collection("savedBills").doc(currentLoadedBillId).delete();
  doNewBill();
}

async function loadSavedBillsList(){
const snapshot = await db.collection("savedBills")
  .orderBy("savedAt", "desc")
  .limit(10)
  .get();

const dropdown = document.getElementById("billDropdown");
const currentVal = currentLoadedBillId || "";

dropdown.innerHTML = "";

if(!currentLoadedBillId){
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "— load a saved bill —";
  placeholder.disabled = true;
  placeholder.selected = true;
  placeholder.style.color = "#aaa";
  dropdown.appendChild(placeholder);
}

snapshot.forEach(doc => {
  const d = doc.data();
  const opt = document.createElement("option");
  opt.value = doc.id;
  const archivedTag = d.archived ? "🔒" : "";
  opt.textContent = `${d.title} (${formatDate(d.savedAt)})${archivedTag}`;
  dropdown.appendChild(opt);
});

if(currentVal) dropdown.value = currentVal;
}

async function loadSavedBill(id){
if(!id) return;

const proceed = await checkUnsavedBill();
if(!proceed){
  document.getElementById("billDropdown").value = currentLoadedBillId || "";
  return;
}

const doc = await db.collection("savedBills").doc(id).get();
const data = doc.data();
if(!data) return;

currentLoadedBillId = id;
currentLoadedBillTitle = data.title;
isArchived = data.archived || false;
isDirty = false;
newBillFirstInputDate = null;

rows = data.rows || [];
nameList = data.nameList || [];
venmoNames = data.venmoNames || {};
receiptUrl = data.receiptUrl || "";
lastSavedReceiptUrl = receiptUrl;

document.getElementById("taxValue").value = data.taxValue || "";
document.getElementById("tipValue").value = data.tipValue || "";
document.getElementById("taxMode").value = data.taxMode || "amount";
document.getElementById("tipMode").value = data.tipMode || "amount";
document.getElementById("notesBox").value = data.notes || "";

if(receiptUrl) showReceiptThumbnail(receiptUrl);
else document.getElementById("receiptPreviewContainer").innerHTML = "";

loadedSnapshot = JSON.stringify({
  rows, nameList, receiptUrl,
  taxValue: data.taxValue || "",
  tipValue: data.tipValue || "",
  taxMode: data.taxMode || "amount",
  tipMode: data.tipMode || "amount",
  notes: data.notes || ""
});

saveBill();

await loadSavedBillsList();
document.getElementById("billDropdown").value = id;

updateSaveButtonState();
updateArchivedUI();
renderPeopleBar();
render();
calc();
}

billRef.update({

}).finally(()=>{
  setTimeout(()=>isLocalUpdate=false, 300);
});

async function clearAll(){

if(!proceed) return;
doNewBill();
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(isArchived) return;
if(e.key!=="Enter") return;
let box=document.getElementById("addPersonBox");
let name=box.value.trim();
let key = name.toLowerCase();
if(!name) return;
nameList.push(name);
venmoNames[key] = venmoNames[key] || "";
box.value="";
renderPeopleBar();
render();
calc();
saveBill();
markDirty();
}

function deletePerson(i){
if(isArchived) return;
let removed=nameList[i];
nameList.splice(i,1);
rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});
renderPeopleBar();
render();
calc();
saveBill();
markDirty();
}

function toggleLock(row){
if(isArchived) return;
rows[row].locked = !rows[row].locked;
render();
saveBill();
markDirty();
}

function update(i,key,val){
if(isArchived || rows[i].locked) return;
rows[i][key]=val;
calc();
markDirty();
}

function handlePriceInput(row, el){
if(isArchived || rows[row].locked){
el.value = rows[row].price;
return;
}
el.value = el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");
rows[row].price = el.value;
calc();
markDirty();
}

function toggleName(row,name){
if(isArchived || rows[row].locked) return;
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);
if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);
if(r.selected.length===nameList.length) r.people="EVERYONE";
else r.people=r.selected.join(", ");
render();
calc();
saveBill();
markDirty();
}

function toggleEveryone(row){
if(isArchived || rows[row].locked) return;
let r=rows[row];
if(r.selected?.length===nameList.length){ r.selected=[]; r.people=""; }
else { r.selected=[...nameList]; r.people="EVERYONE"; }
render();
calc();
saveBill();
markDirty();
}

function addRow(){
if(isArchived) return;
rows.push({item:"",price:"",people:"",selected:[],locked:false});
render();
calc();
saveBill();
}

function add5Rows(){
if(isArchived) return;
for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
render();
calc();
saveBill();
}

function deleteLastRow(){
if(isArchived) return;
const msg = document.getElementById("deleteMsg");
if(msg) msg.textContent = "";
if(!rows || rows.length === 0) return;
let lastIndex = rows.length - 1;
if(rows[lastIndex].locked){ if(msg) msg.textContent = "Unlock last row to delete"; return; }
rows.pop();
render();
calc();
saveBill();
markDirty();
}

function nav(e,row,col){
e.preventDefault();
let nextRow=row+1;
if(nextRow>=rows.length){
addRow();
setTimeout(()=>{ document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus(); },0);
return;
}
setTimeout(()=>{
let next=document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
if(next){ next.focus(); next.select?.(); }
},0);
}

function render(){
  isRendering = true;
let body=document.getElementById("tableBody");
body.innerHTML="";
rows.forEach((r,i)=>{
let tapHTML=`
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>
<div class="tap-grid">
`;
nameList.forEach(n=>{
tapHTML+=`<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});
tapHTML+=`</div>`;

let isLocked = r.locked || isArchived;
let lockIcon = isLocked ? "🔒" : "🔓";
let lockClass = isLocked ? "locked" : "unlocked";
let tr=document.createElement("tr");
if(isLocked) tr.classList.add("locked-row");

// FIX 2: td onclick focuses the textarea inside, but only if click wasn't on the textarea itself
const itemTdOnclick = !isLocked
  ? `onclick="if(event.target===this){this.querySelector('textarea').focus();}"` 
  : "";
const priceTdOnclick = !isLocked
  ? `onclick="if(event.target===this){this.querySelector('textarea').focus();}"` 
  : "";

tr.innerHTML=`
<td class="lock-cell">
<div style="font-size:11px;color:var(--muted);">${i+1}</div>
<button class="lock-btn ${lockClass}" onclick="toggleLock(${i})">${lockIcon}</button>
</td>
<td class="clickable-cell" ${itemTdOnclick}>
<textarea data-r="${i}" data-c="0"
placeholder="optional"
${isLocked?"disabled":""}
onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea>
</td>
<td class="clickable-cell" ${priceTdOnclick}>
<textarea data-r="${i}" data-c="1"
inputmode="decimal"
pattern="[0-9]*"
${isLocked?"disabled":""}
onkeydown="if(event.key==='Enter'){saveBill();nav(event,${i},1)}"
onblur="saveBill()"
oninput="handlePriceInput(${i},this)">${r.price}</textarea>
</td>
<td>${tapHTML}</td>
`;
body.appendChild(tr);
});
  isRendering = false;
}

function calc(){
let subtotal=0;
let people={};
let taxVal=parseFloat(document.getElementById("taxValue").value)||0;
let tipVal=parseFloat(document.getElementById("tipValue").value)||0;
let taxMode=document.getElementById("taxMode").value;
let tipMode=document.getElementById("tipMode").value;

rows.forEach(r=>{
if(r.price){
let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;
let list=r.people==="EVERYONE"
?nameList
:(r.people||"").split(",").map(p=>p.trim()).filter(Boolean);
let share=price/list.length||0;
list.forEach(p=>{
if(!people[p]) people[p]={subtotalShare:0};
people[p].subtotalShare+=share;
});
}
});

let taxAmount=taxMode==="percent"?subtotal*(taxVal/100):taxVal;
let tipAmount=tipMode==="percent"?subtotal*(tipVal/100):tipVal;
let total=subtotal+taxAmount+tipAmount;

Object.keys(people).forEach(p=>{
let share=people[p].subtotalShare||0;
let ratio=subtotal?share/subtotal:0;
people[p].total=share+(taxAmount*ratio)+(tipAmount*ratio);
});

let taxPct=subtotal?(taxAmount/subtotal*100):0;
let tipPct=subtotal?(tipAmount/subtotal*100):0;

summary.innerHTML=`
<div class="sum-table">
<div class="row"><div class="label">Subtotal</div><div class="value">${subtotal.toFixed(2)}</div></div>
<div class="row"><div class="label">Tax (${taxPct.toFixed(2)}%)</div><div class="value">${taxAmount.toFixed(2)}</div></div>
<div class="row"><div class="label">Tip (${tipPct.toFixed(2)}%)</div><div class="value">${tipAmount.toFixed(2)}</div></div>
<div class="row total"><div class="label">Total</div><div class="value">${total.toFixed(2)}</div></div>
</div>
`;

let div=document.getElementById("totals");
div.innerHTML="";
Object.keys(people).forEach(p=>{
let venmoId=venmoNames[p.toLowerCase()]||"";
div.innerHTML+=`
<div class="result">
<span>${p} owes $${people[p].total.toFixed(2)}</span>
${venmoId?`<button class="venmo-btn" onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">Request</button>`:""}
</div>`;
});
}

billLoaded = false;
loadBill();
loadSavedBillsList();

</script>
<br><br><br><br>
</body>
</html>
