<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

/* NEW — lock column */

.lock-cell{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
gap:2px;
font-size:11px;
}

.lock-btn{
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
cursor:pointer;
padding:2px;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
font-size:14px;
}

.lock-btn.locked{
background:#ffd6d6;
}

/* original styles below */

.top-actions{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
display:block;
}

.top-row{
display:flex;
gap:8px;
align-items:stretch;
margin-top:4px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:0;
}

.notes-box{
flex:1;
font-size:12px;
font-family:Arial;
padding:4px;
border:1px solid #ccc;
resize:none;
height:80px;
box-sizing:border-box;
}

.notes-box::placeholder{
color:#aaa;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

/* UPDATED widths */

th:nth-child(1), td:nth-child(1){ width:6%; }
th:nth-child(2), td:nth-child(2){ width:17%; }
th:nth-child(3), td:nth-child(3){ width:13%; }
th:nth-child(4), td:nth-child(4){ width:47%; }
th:nth-child(5), td:nth-child(5){ width:23%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:64px;
height:auto;
}

td:nth-child(3) textarea{
text-align:center;
font-variant-numeric: tabular-nums;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.name-btn:disabled{
opacity:0.5;
cursor:not-allowed;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
width:30%;
max-width:260px;
min-width:140px;
}

.sum-table{
font-family:monospace;
width:100%;
}

.row{
display:grid;
grid-template-columns:1fr auto;
column-gap:8px;
align-items:center;
white-space:nowrap;
}

.label{
text-align:left;
white-space:nowrap;
}

.value{
text-align:right;
white-space:nowrap;
}

.total .label,
.total .value{
font-weight:bold;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}
</style>
