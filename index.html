<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:6px;
display:block;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* COLUMN WIDTHS */
th:nth-child(1), td:nth-child(1){ width:20%; }
th:nth-child(2), td:nth-child(2){ width:12%; }
th:nth-child(3), td:nth-child(3){ width:20%; }
th:nth-child(4), td:nth-child(4){ width:48%; }

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

/* TAP GRID */
.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

/* =========================
   FINANCE SECTION (FIXED)
   ========================= */

.finance{
border-top:1px solid #ccc;
margin-top:10px;
padding-top:10px;
font-size:13px;
}

.finance-row{
display:flex;
justify-content:space-between;
align-items:center;
margin:4px 0;
}

.finance-row label{
font-weight:bold;
}

.tax-tip-input{
width:80px;
padding:3px;
font-size:12px;
}

.total-row{
font-weight:bold;
font-size:14px;
margin-top:8px;
}

.summary-row{
margin-bottom:6px;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<!-- =========================
     FINANCE BLOCK (FIXED)
     ========================= -->
<div class="finance">

<!-- SUBTOTAL (NOW ABOVE TAX/TIP) -->
<div class="summary-row">
Subtotal: $<span id="subtotal">0.00</span>
</div>

<!-- TAX -->
<div class="finance-row">
<label>Tax</label>
<div>
<select id="taxMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>
</div>

<!-- TIP -->
<div class="finance-row">
<label>Tip</label>
<div>
<select id="tipMode" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>
</div>

<!-- TOTAL -->
<div class="total-row">
Total: $<span id="total">0.00</span>
</div>

</div>

<div id="totals"></div>

<script>

let rows=[];
let nameList=["jamin","jack","cliff","willie","howard","lin","freddy"];
let venmoNames={};

function init(){

rows=[];
for(let i=0;i<5;i++){
rows.push({item:"",price:"",people:"",selected:[]});
}

venmoNames={
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
freddy:"freddy-dai",
lin:"linlin221"
};

render();
calc();
}

function handleAddPerson(e){
if(e.key!=="Enter") return;

let v=e.target.value.trim();
if(!v) return;

nameList.push(v);
e.target.value="";

render();
calc();
}

function update(i,k,v){
rows[i][k]=v;
calc();
}

function handlePriceInput(i,el){
el.value=el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
rows[i].price=el.value;
calc();
}

function toggleName(i,n){
let r=rows[i];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(n);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(n);

r.people=r.selected.join(", ");
render(); calc();
}

function toggleEveryone(i){
let r=rows[i];

if(r.selected.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}

render(); calc();
}

/* =========================
   FIXED CALCULATION
   ========================= */

function getSubtotal(){
let sum=0;
rows.forEach(r=>{
let p=parseFloat(r.price);
if(!isNaN(p)) sum+=p;
});
return sum;
}

function getTax(subtotal){
let v=parseFloat(taxValue.value)||0;
return taxMode.value==="percent"
? subtotal*(v/100)
: v;
}

function getTip(subtotal){
let v=parseFloat(tipValue.value)||0;
return tipMode.value==="percent"
? subtotal*(v/100)
: v;
}

function calc(){

let subtotal=getSubtotal();
let tax=getTax(subtotal);
let tip=getTip(subtotal);
let total=subtotal+tax+tip;

/* UI */
document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("total").innerText=total.toFixed(2);

/* per person */
let people={};

rows.forEach(r=>{
if(r.price){
let price=parseFloat(r.price);

let list=r.people==="EVERYONE"
? nameList
: (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{
if(!people[p]) people[p]={total:0};
people[p].total+=share;
});
}
});

let div=document.getElementById("totals");
div.innerHTML="";

Object.keys(people).forEach(p=>{
div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}
</div>`;
});

}

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`
<button class="everyone-btn ${r.selected.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>

<div class="tap-grid">
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

tapHTML+=`</div>`;

let tr=document.createElement("tr");

tr.innerHTML=`
<td><textarea oninput="update(${i},'item',this.value)">${r.item}</textarea></td>
<td><textarea oninput="handlePriceInput(${i},this)">${r.price}</textarea></td>
<td><textarea oninput="update(${i},'people',this.value)">${r.people}</textarea></td>
<td>${tapHTML}</td>
`;

body.appendChild(tr);

});

}

init();

</script>

</body>
</html>
