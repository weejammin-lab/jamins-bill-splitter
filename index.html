<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:750px;
margin:auto;
}

/* 🔥 NAME WRAP (3 PER LINE) */
#personBar{
display:flex;
flex-wrap:wrap;
gap:4px;
}

.person-tag{
width:30%; /* ~3 per row */
box-sizing:border-box;
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
display:flex;
justify-content:space-between;
}

.delete-person{
color:red;
cursor:pointer;
}

/* add person always full line */
.add-person-input{
width:100%;
padding:4px;
font-size:12px;
margin-top:6px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
}

/* column widths (includes summary column) */
th:nth-child(1), td:nth-child(1){ width:30%; }
th:nth-child(2), td:nth-child(2){ width:10%; }
th:nth-child(3), td:nth-child(3){ width:25%; }
th:nth-child(4), td:nth-child(4){ width:20%; }
th:nth-child(5), td:nth-child(5){ width:15%; }

/* textareas */
td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
}

/* TAP BUTTONS */
.name-btn{
margin:2px;
padding:2px 6px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

/* SUMMARY BOX (now inside table too) */
.summary-box{
font-size:12px;
line-height:1.4;
}

.venmo-input{
width:100px;
margin-left:6px;
}

.result{
margin:4px 0;
font-weight:bold;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<!-- NAME BAR -->
<div id="personBar"></div>

<!-- ADD PERSON (separate line) -->
<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>People</th>
<th>Tap Names</th>
<th>Summary</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<script>

let defaultNames=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let nameList=[...defaultNames];

let rows=[];
let venmoNames={};

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

renderPeopleBar();
render();
calc();
}

/* CLEAR */
function clearAll(){

if(!confirm("Clear everything?")) return;

rows=[];
nameList=[...defaultNames];
venmoNames={};

init();
}

/* NAME BAR */
function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>
`;
});
}

function handleAddPerson(e){

if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
}

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected = (r.selected||[]).filter(p=>p!==removed);
r.people = (r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
}

/* ROWS */
function addRow(){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

function move(e,row,col){

if(e.key!=="Enter") return;

e.preventDefault();

if(row === rows.length - 1){
addRow();
render();
calc();
}

requestAnimationFrame(()=>{

let next=document.querySelector(
`[data-row='${row+1}'][data-col='${col}']`
);

if(next){
next.focus();
next.select?.();
}

});

}

/* TEXTAREA AUTO GROW */
function autoGrow(el){
el.style.height="auto";
el.style.height=el.scrollHeight+"px";
}

/* PRICE */
function handlePriceInput(row, el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;
calc();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

/* TOGGLES */
function toggleName(row,name){

let r=rows[row];
if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.length ? r.selected.join(", ") : "";

render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();
}

/* RENDER */
function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`<div>
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>
`;
});

/* SUMMARY COLUMN PER ROW */
let summaryHTML = calcRowSummary(i);

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<textarea data-row="${i}" data-col="0"
oninput="update(${i},'item',this.value); autoGrow(this)"
onkeydown="move(event,${i},0)">${r.item}</textarea>
</td>

<td>
<textarea data-row="${i}" data-col="1"
oninput="handlePriceInput(${i},this); autoGrow(this)"
onkeydown="move(event,${i},1)">${r.price}</textarea>
</td>

<td>
<textarea data-row="${i}" data-col="2"
oninput="update(${i},'people',this.value); autoGrow(this)"
onkeydown="move(event,${i},2)">${r.people}</textarea>
</td>

<td>${tapHTML}</td>

<td>
<div class="summary-box">${summaryHTML}</div>
</td>

`;

body.appendChild(tr);

});

}

/* ROW SUMMARY (simple per-row view) */
function calcRowSummary(i){

let r = rows[i];
if(!r.price) return "";

return `Item total: $${parseFloat(r.price||0).toFixed(2)}`;
}

/* FULL CALC */
function calc(){

let subtotal=0;
let people={};

rows.forEach(r=>{

if(r.price){

let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;

let list =
r.people==="everyone"
? nameList
: (r.people||"")
.split(",")
.map(p=>p.trim())
.filter(Boolean);

let share=price/list.length||0;

list.forEach(p=>{

if(!people[p]) people[p]={total:0};

people[p].total+=share;

});

}

});

let tax =
taxMode.value==="percent"
? subtotal*(taxValue.value||0)/100
: parseFloat(taxValue.value||0);

let tip =
tipMode.value==="percent"
? subtotal*(tipValue.value||0)/100
: parseFloat(tipValue.value||0);

let total=subtotal+tax+tip;

Object.keys(people).forEach(p=>{

let ratio=people[p].total/subtotal||0;

people[p].total+=tax*ratio+tip*ratio;

});

/* STORE GLOBAL SUMMARY */
window._summaryHTML = `
Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${tax.toFixed(2)}<br>
Tip: $${tip.toFixed(2)}<br>
<strong>Total: $${total.toFixed(2)}</strong>
`;

updateSummaryColumn(people);

}

/* PUSH SUMMARY INTO LAST COLUMN */
function updateSummaryColumn(people){

let rowsDOM = document.querySelectorAll("#tableBody tr");

rowsDOM.forEach((tr,i)=>{

if(tr.children[4]){

let html = window._summaryHTML || "";
let personLines = "";

Object.keys(people).forEach(p=>{
if(!venmoNames[p]) venmoNames[p]="";

personLines += `
<div class="result">
${p}: $${people[p].total.toFixed(2)}
</div>
`;
});

tr.children[4].innerHTML = html + "<br><br>" + personLines;
}

});

}

init();
calc();

</script>

</body>
</html>
