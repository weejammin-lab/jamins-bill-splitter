<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Bill Splitter</title>

<style>
body{
font-family:Arial;
max-width:550px;
margin:auto;
padding:10px;
}

.receipt-overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.85);
display:flex;
align-items:center;
justify-content:center;
z-index:1000;
cursor:pointer;
}

.receipt-overlay img{
max-width:90%;
max-height:90%;
border-radius:6px;
object-fit:contain;
}

.header-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:6px;
gap:10px;
}

.header-right{
display:flex;
gap:6px;
align-items:center;
flex-shrink:0;
}

.receipt-thumb{
width:36px;
height:36px;
object-fit:cover;
border:1px solid #ccc;
border-radius:4px;
cursor:pointer;
display:block;
}

.receipt-thumb-wrap{
display:flex;
flex-direction:column;
align-items:center;
gap:1px;
}

.remove-receipt{
font-size:10px;
color:red;
cursor:pointer;
line-height:1;
background:none;
border:none;
padding:0;
}

.action-row{
display:flex;
gap:6px;
align-items:center;
margin-bottom:4px;
flex-wrap:nowrap;
}

.save-row{
display:flex;
gap:6px;
align-items:center;
margin-bottom:4px;
flex-wrap:nowrap;
}

.right-actions{
display:flex;
gap:6px;
align-items:center;
margin-left:auto;
flex-shrink:0;
}

.add-person-input{
padding:4px;
font-size:12px;
width:112px;
flex-shrink:0;
}

.upload-btn{
font-size:12px;
padding:4px 6px;
white-space:normal;
word-break:break-word;
width:60px;
line-height:1.2;
text-align:center;
cursor:pointer;
flex-shrink:0;
}

#billDropdown{
font-size:12px;
padding:4px;
width:192px;
flex-shrink:0;
}

.save-bill-btn{
font-size:12px;
padding:4px 6px;
white-space:nowrap;
flex-shrink:0;
}

.save-bill-btn:disabled{
opacity:0.75;
cursor:not-allowed;
}

.archived-label{
color:red;
font-size:11px;
font-weight:bold;
flex-shrink:0;
}

.top-row{
display:flex;
gap:8px;
align-items:stretch;
margin-top:4px;
}

#personBar{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:4px;
max-width:50%;
margin-bottom:4px;
}

.person-tag{
border:1px solid #ccc;
padding:3px 6px;
font-size:12px;
text-align:center;
display:flex;
flex-direction:column;
align-items:center;
gap:2px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:0;
}

.notes-box{
flex:1;
font-size:12px;
font-family:Arial;
padding:4px;
border:1px solid #ccc;
resize:none;
height:80px;
box-sizing:border-box;
}

.notes-box::placeholder{
color:#bbb;
font-size:10px;
opacity:0.96;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:stretch;
}

th:nth-child(1), td:nth-child(1){ width:8%; }
th:nth-child(2), td:nth-child(2){ width:15%; }
th:nth-child(3), td:nth-child(3){ width:12%; }
th:nth-child(4), td:nth-child(4){ width:42%; }
th:nth-child(5), td:nth-child(5){ width:23%; }

.lock-cell{
text-align:center;
font-size:12px;
}

td textarea{
width:100%;
box-sizing:border-box;
font-size:12px;
resize:none;
overflow:hidden;
border:1px solid #ddd;
padding:3px;
font-family:Arial;
display:block;
min-height:64px;
height:auto;
}

td:nth-child(3) textarea{
text-align:center;
font-variant-numeric: tabular-nums;
}

td textarea::placeholder{
color:#bbb;
font-size:10px;
opacity:0.96;
}

.tap-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:2px;
margin-top:3px;
}

.name-btn{
margin:1px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.lock-btn{
margin-top:2px;
padding:1px 3px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:6px;
transition:0.15s;
line-height:1;
}

.lock-btn.locked{
background:#ffb3b3;
border-color:#ff5c5c;
}

.lock-btn.unlocked{
filter: grayscale(100%);
opacity:0.75;
}

tr.locked-row td{
background:#f3f3f3;
opacity:0.9;
}

tr.locked-row textarea{
background:#f7f7f7;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

.everyone-btn{
width:100%;
margin-bottom:4px;
}

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
width:30%;
max-width:260px;
min-width:140px;
}

.sum-table{
font-family:monospace;
width:100%;
}

.row{
display:grid;
grid-template-columns:1fr auto;
column-gap:8px;
align-items:center;
white-space:nowrap;
}

.label{
text-align:left;
white-space:nowrap;
}

.value{
text-align:right;
white-space:nowrap;
}

.total .label,
.total .value{
font-weight:bold;
}

.result{
font-weight:bold;
margin:4px 0;
}

.venmo-btn{
margin-left:6px;
font-size:11px;
}

.bill-actions-row{
display:flex;
justify-content:flex-end;
gap:6px;
margin-top:12px;
}

.archive-btn{
font-size:11px;
padding:3px 8px;
cursor:pointer;
background:#fff3cd;
border:1px solid #ffc107;
border-radius:4px;
}

.unarchive-btn{
font-size:11px;
padding:3px 8px;
cursor:pointer;
background:#d4edda;
border:1px solid #28a745;
border-radius:4px;
color:#155724;
}

.delete-btn{
font-size:11px;
padding:3px 8px;
cursor:pointer;
background:#ffe0e0;
border:1px solid #ff5c5c;
border-radius:4px;
color:#cc0000;
}
</style>

</head>

<body>

<!-- ROW 1: title | upload receipt | thumbnail | New Bill -->
<div class="header-row">
  <h2 style="margin:0;flex-shrink:0;">Bill Splitter</h2>

  <div class="header-right">
    <input type="file"
      id="receiptUpload"
      accept="image/*"
      style="display:none"
      onchange="handleReceiptUpload(event)">
    <button class="upload-btn" onclick="document.getElementById('receiptUpload').click()">
      Upload Receipt
    </button>
    <div id="receiptPreviewContainer"></div>
    <button id="newBillBtn" onclick="clearAll()">New Bill</button>
  </div>
</div>

<!-- ROW 2: name input | load dropdown -->
<div class="action-row">
  <input class="add-person-input"
    id="addPersonBox"
    placeholder="type name + Enter"
    onkeydown="handleAddPerson(event)">

  <div class="right-actions">
    <select id="billDropdown" onchange="loadSavedBill(this.value)">
      <option value="" disabled selected style="color:#aaa;">-- load a saved bill --</option>
    </select>
  </div>
</div>

<!-- ROW 3: archived label | Save | Save As -->
<div class="save-row">
  <span id="archivedLabel" class="archived-label" style="display:none;">⛔ ARCHIVED</span>
  <div class="right-actions">
    <button class="save-bill-btn" id="saveBillBtn" onclick="saveNewBill()">Save</button>
    <button class="save-bill-btn" data-saveas onclick="saveAsBill()">Save As</button>
  </div>
</div>

<div class="top-row">

<div id="personBar"></div>

<textarea class="notes-box"
id="notesBox"
placeholder="type any notes here&#10;-click New Bill to get started&#10;-entering item names is optional&#10;-you can archive or delete any saved bill at the bottom (must be saved first)"
oninput="saveNotes(); markDirty()"></textarea>

</div>

<br>

<table>
<thead>
<tr>
<th> </th>
<th>Item</th>
<th>Price ($)</th>
<th>People Involved (Tap Names)</th>
<th>Type Names</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin:6px 0; display:flex; gap:6px; align-items:center;">
  <button onclick="addRow()">Add 1 Row</button>
  <button onclick="add5Rows()">Add 5 Rows</button>
  <button onclick="deleteLastRow()">Delete Last Row</button>
  <span id="deleteMsg" style="color:red; font-size:11px;"></span>
</div>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" onchange="calc(); markDirty()">
<option value="amount" selected>$</option>
<option value="percent">%</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc(); markDirty()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" onchange="calc(); markDirty()">
<option value="amount" selected>$</option>
<option value="percent">%</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc(); markDirty()">
</div>

<div class="summary-box" id="summary"></div>
<div id="totals"></div>

<!-- Archive / Delete row -->
<div class="bill-actions-row" id="billActionsRow" style="display:none;">
  <button id="archiveToggleBtn" class="archive-btn" onclick="toggleArchive()">Archive Bill</button>
  <button class="delete-btn" onclick="deleteBill()">Delete Bill</button>
</div>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB6rIAq2loPyngSITMCwKVZZwGrwzs6Kmk",
authDomain: "jamins-bill-splitter.firebaseapp.com",
projectId: "jamins-bill-splitter",
storageBucket: "jamins-bill-splitter.firebasestorage.app",
messagingSenderId: "139094691642",
appId: "1:139094691642:web:fa1f61dcfae8d085094a03"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const billRef = db.collection("bills").doc("main");
const storage = firebase.storage();

const defaultVenmoMap = {
jamin:"jamin-chen",
jack:"jack-bao",
cliff:"clifford-chao",
howard:"braveclaw",
willie:"willie-zeng",
lin:"linlin221",
freddy:"freddy-dai",
viv:"vivian-bang",
vivian:"vivian-bang",
maria:"mariapdiaz",
paarus:"paarus-ali",
anna:"anna-claire-choi",
michelle:"michelletran9",
victoria:"victoriabao",
vic:"victoriabao",
};

let defaultNames=["jamin","jack","cliff","willie","howard","lin"];
let billLoaded = false;
let nameList=[...defaultNames];
let rows=[];
let venmoNames={...defaultVenmoMap};

let receiptUrl="";
let isLocalUpdate=false;
let lastSavedReceiptUrl = null;
let currentLoadedBillId = null;
let currentLoadedBillTitle = null;
let isArchived = false;
let isDirty = false;
let loadedSnapshot = null;
let newBillFirstInputDate = null;

function formatDate(ts){
  const d = new Date(ts);
  const mm = d.getMonth()+1;
  const dd = d.getDate();
  const yy = String(d.getFullYear()).slice(-2);
  return `${mm}/${dd}/${yy}`;
}

function snapshotState(){
  return JSON.stringify({
    rows,
    nameList,
    receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value
  });
}

function markDirty(){
  if(currentLoadedBillId){
    const changed = snapshotState() !== loadedSnapshot;
    isDirty = changed;
  } else {
    if(!newBillFirstInputDate && hasContent()){
      newBillFirstInputDate = Date.now();
    }
    isDirty = hasContent();
  }
  updateSaveButtonState();
}

function updateSaveButtonState(){
  const btn = document.getElementById("saveBillBtn");
  if(!btn) return;
  btn.textContent = "Save";
  if(currentLoadedBillId){
    btn.disabled = !isDirty || isArchived;
  } else {
    btn.disabled = false;
  }
}

function updateArchivedUI(){
  const label = document.getElementById("archivedLabel");
  label.style.display = isArchived ? "inline" : "none";

  const archiveBtn = document.getElementById("archiveToggleBtn");
  if(archiveBtn){
    if(isArchived){
      archiveBtn.textContent = "Unarchive Bill";
      archiveBtn.className = "unarchive-btn";
    } else {
      archiveBtn.textContent = "Archive Bill";
      archiveBtn.className = "archive-btn";
    }
  }

  // show/hide bill actions row only when a bill is loaded
  const actionsRow = document.getElementById("billActionsRow");
  if(actionsRow){
    actionsRow.style.display = currentLoadedBillId ? "flex" : "none";
  }

  updateSaveButtonState();
}

function hasContent(){
  const hasRows = rows.some(r => r.price || r.item);
  const hasTax = !!document.getElementById("taxValue").value;
  const hasTip = !!document.getElementById("tipValue").value;
  const hasNotes = !!document.getElementById("notesBox").value;
  return hasRows || hasTax || hasTip || hasNotes || !!receiptUrl;
}

async function checkUnsavedBill(){
  if(currentLoadedBillId && isDirty){
    const save = confirm("There are unsaved changes to this bill. Save before continuing?");
    if(save) await saveNewBill();
    return true;
  }
  if(!currentLoadedBillId && hasContent()){
    const save = confirm("There are unsaved changes. Save this bill before continuing?");
    if(save){
      const title = prompt("Enter a title for this bill:");
      if(!title || !title.trim()) return false;
      const billData = {
        title: title.trim(),
        savedAt: newBillFirstInputDate || Date.now(),
        ...getCurrentBillData()
      };
      const docRef = await db.collection("savedBills").add(billData);
      currentLoadedBillId = docRef.id;
      currentLoadedBillTitle = title.trim();
      await loadSavedBillsList();
    }
    return true;
  }
  return true;
}

function showReceiptThumbnail(url){
if(!url) return;
const container = document.getElementById("receiptPreviewContainer");
container.innerHTML = "";

const wrap = document.createElement("div");
wrap.className = "receipt-thumb-wrap";

const img = document.createElement("img");
img.src = url;
img.className = "receipt-thumb";
img.onclick = function(){
  const overlay = document.createElement("div");
  overlay.className = "receipt-overlay";
  const full = document.createElement("img");
  full.src = url;
  overlay.appendChild(full);
  overlay.onclick = () => overlay.remove();
  document.body.appendChild(overlay);
};

const removeBtn = document.createElement("button");
removeBtn.className = "remove-receipt";
removeBtn.textContent = "✕";
removeBtn.title = "Remove receipt";
removeBtn.onclick = function(){
  if(isArchived) return;
  receiptUrl = "";
  lastSavedReceiptUrl = "";
  container.innerHTML = "";
  billRef.set({
    receiptUrl: "",
    notes: document.getElementById("notesBox").value
  }, { merge: true });
  markDirty();
};

wrap.appendChild(img);
wrap.appendChild(removeBtn);
container.appendChild(wrap);
}

function loadBill(){
billRef.onSnapshot(doc=>{
const data=doc.data();
if(!data) return;

if(data.receiptUrl && data.receiptUrl.length > 5){
  receiptUrl = data.receiptUrl;
  lastSavedReceiptUrl = data.receiptUrl;
  showReceiptThumbnail(data.receiptUrl);
}

if(isLocalUpdate) return;

rows=data.rows||[];
nameList=data.nameList||[];
venmoNames=data.venmoNames||{};

document.getElementById("taxValue").value=data.taxValue||"";
document.getElementById("tipValue").value=data.tipValue||"";
document.getElementById("taxMode").value=data.taxMode||"amount";
document.getElementById("tipMode").value=data.tipMode||"amount";
document.getElementById("notesBox").value=data.notes||"";

billLoaded = true;
renderPeopleBar();
render();
calc();
});
}

async function handleReceiptUpload(event){
if(isArchived) return;
const file = event.target.files[0];
if(!file) return;

if(file.size > 15 * 1024 * 1024){
  alert("Image too large. Please upload a photo under 15MB.");
  event.target.value = "";
  return;
}

const storageRef = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
await storageRef.put(file);
const url = await storageRef.getDownloadURL();

receiptUrl = url;
lastSavedReceiptUrl = url;
showReceiptThumbnail(url);
billRef.set({
  receiptUrl: url,
  notes: document.getElementById("notesBox").value
}, { merge: true });
event.target.value = "";
markDirty();
}

function saveBill(){
if(!billLoaded) return;
isLocalUpdate=true;

if(!receiptUrl || receiptUrl.length < 5){
  receiptUrl = lastSavedReceiptUrl || "";
}

billRef.set({
rows,
nameList,
venmoNames,
receiptUrl: receiptUrl,
taxValue:document.getElementById("taxValue").value,
tipValue:document.getElementById("tipValue").value,
taxMode:document.getElementById("taxMode").value,
tipMode:document.getElementById("tipMode").value,
notes:document.getElementById("notesBox").value
}).then(()=>{
  if(receiptUrl && receiptUrl.length > 5){
    lastSavedReceiptUrl = receiptUrl;
  }
}).finally(()=>{
  setTimeout(()=>isLocalUpdate=false,300);
});
}

function getCurrentBillData(){
return {
  rows,
  nameList,
  venmoNames,
  receiptUrl: receiptUrl || "",
  taxValue: document.getElementById("taxValue").value,
  tipValue: document.getElementById("tipValue").value,
  taxMode: document.getElementById("taxMode").value,
  tipMode: document.getElementById("tipMode").value,
  notes: document.getElementById("notesBox").value
};
}

async function saveNewBill(){
  if(isArchived) return;

  if(currentLoadedBillId){
    await db.collection("savedBills").doc(currentLoadedBillId).update({
      ...getCurrentBillData()
    });
    isDirty = false;
    loadedSnapshot = snapshotState();
    updateSaveButtonState();
    alert(`"${currentLoadedBillTitle}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
  } else {
    const title = prompt("Enter a title for this bill:");
    if(!title || !title.trim()) return;

    saveBill();

    const billData = {
      title: title.trim(),
      savedAt: newBillFirstInputDate || Date.now(),
      ...getCurrentBillData()
    };

    const docRef = await db.collection("savedBills").add(billData);
    currentLoadedBillId = docRef.id;
    currentLoadedBillTitle = title.trim();
    isDirty = false;
    loadedSnapshot = snapshotState();
    newBillFirstInputDate = null;

    alert(`"${title.trim()}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = docRef.id;
    updateSaveButtonState();
    updateArchivedUI();
  }
}

async function saveAsBill(){
  const title = prompt("Enter a title for this bill:");
  if(!title || !title.trim()) return;

  saveBill();

  const billData = {
    title: title.trim(),
    savedAt: Date.now(),
    ...getCurrentBillData(),
    archived: false
  };

  const docRef = await db.collection("savedBills").add(billData);
  currentLoadedBillId = docRef.id;
  currentLoadedBillTitle = title.trim();
  isDirty = false;
  isArchived = false;
  loadedSnapshot = snapshotState();
  newBillFirstInputDate = null;

  alert(`"${title.trim()}" saved!`);
  await loadSavedBillsList();
  document.getElementById("billDropdown").value = docRef.id;
  updateSaveButtonState();
  updateArchivedUI();
}

async function toggleArchive(){
  if(!currentLoadedBillId){
    alert("Save this bill first before archiving.");
    return;
  }

  if(isArchived){
    // UNARCHIVE — prompt for password
    const pw = prompt("Enter password to unarchive:");
    if(!pw) return;
    if(pw.trim().toLowerCase() !== "unarchive"){
      alert("Incorrect password.");
      return;
    }

    // unlock all rows
    rows.forEach(r => r.locked = false);

    await db.collection("savedBills").doc(currentLoadedBillId).update({
      archived: false,
      rows
    });

    isArchived = false;
    isDirty = false;
    loadedSnapshot = snapshotState();

    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;

    updateArchivedUI();
    render();
    alert(`"${currentLoadedBillTitle}" has been unarchived.`);

  } else {
    // ARCHIVE
    const confirmed = confirm(`Archive "${currentLoadedBillTitle}"?\n\nArchived Bills can't be edited but can still be viewed.`);
    if(!confirmed) return;

    rows.forEach(r => r.locked = true);
    rows = rows.filter(r => r.price || r.item || (r.selected && r.selected.length));

    await db.collection("savedBills").doc(currentLoadedBillId).update({
      ...getCurrentBillData(),
      rows,
      archived: true
    });

    isArchived = true;
    isDirty = false;
    loadedSnapshot = snapshotState();

    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;

    updateArchivedUI();
    render();
    alert(`"${currentLoadedBillTitle}" has been archived.`);
  }
}

async function deleteBill(){
  if(isArchived){
    alert("Archived bills cannot be deleted.");
    return;
  }

  if(!currentLoadedBillId){
    alert("This bill hasn't been saved yet — nothing to delete.");
    return;
  }

  const confirmed = confirm(`Delete "${currentLoadedBillTitle}"? This cannot be undone.`);
  if(!confirmed) return;

  await db.collection("savedBills").doc(currentLoadedBillId).delete();
  doNewBill();
}

async function loadSavedBillsList(){
const snapshot = await db.collection("savedBills")
  .orderBy("savedAt", "desc")
  .limit(10)
  .get();

const dropdown = document.getElementById("billDropdown");
const currentVal = currentLoadedBillId || "";

dropdown.innerHTML = "";

if(!currentLoadedBillId){
  const placeholder = document.createElement("option");
  placeholder.value = "";
  placeholder.textContent = "-- load a saved bill --";
  placeholder.disabled = true;
  placeholder.selected = true;
  placeholder.style.color = "#aaa";
  dropdown.appendChild(placeholder);
}

snapshot.forEach(doc => {
  const d = doc.data();
  const opt = document.createElement("option");
  opt.value = doc.id;
  const archivedTag = d.archived ? " 🔒" : "";
  opt.textContent = `${d.title} (${formatDate(d.savedAt)})${archivedTag}`;
  if(d.archived) opt.style.color = "#aaa";
  dropdown.appendChild(opt);
});

if(currentVal){
  dropdown.value = currentVal;
}
}

async function loadSavedBill(id){
if(!id) return;

const proceed = await checkUnsavedBill();
if(!proceed){
  document.getElementById("billDropdown").value = currentLoadedBillId || "";
  return;
}

saveBill();

const doc = await db.collection("savedBills").doc(id).get();
const data = doc.data();
if(!data) return;

currentLoadedBillId = id;
currentLoadedBillTitle = data.title;
isArchived = data.archived || false;
isDirty = false;
newBillFirstInputDate = null;

rows = data.rows || [];
nameList = data.nameList || [];
venmoNames = data.venmoNames || {};
receiptUrl = data.receiptUrl || "";
lastSavedReceiptUrl = receiptUrl;

document.getElementById("taxValue").value = data.taxValue || "";
document.getElementById("tipValue").value = data.tipValue || "";
document.getElementById("taxMode").value = data.taxMode || "amount";
document.getElementById("tipMode").value = data.tipMode || "amount";
document.getElementById("notesBox").value = data.notes || "";

if(receiptUrl){
  showReceiptThumbnail(receiptUrl);
} else {
  document.getElementById("receiptPreviewContainer").innerHTML = "";
}

loadedSnapshot = snapshotState();

await loadSavedBillsList();
document.getElementById("billDropdown").value = id;

updateSaveButtonState();
updateArchivedUI();
renderPeopleBar();
render();
calc();
}

function saveNotes(){
billRef.update({
notes: document.getElementById("notesBox").value
});
}

function init(){
rows=[];
for(let i=0;i<8;i++){
rows.push({item:"",price:"",people:"",selected:[],locked:false});
}
renderPeopleBar();
render();
calc();
}

function doNewBill(){
document.getElementById("taxValue").value="";
document.getElementById("tipValue").value="";
document.getElementById("taxMode").value="amount";
document.getElementById("tipMode").value="amount";
document.getElementById("notesBox").value="";

receiptUrl = "";
lastSavedReceiptUrl = "";
document.getElementById("receiptPreviewContainer").innerHTML = "";

currentLoadedBillId = null;
currentLoadedBillTitle = null;
isArchived = false;
isDirty = false;
loadedSnapshot = null;
newBillFirstInputDate = null;

rows=[];
nameList=[...defaultNames];
venmoNames={...defaultVenmoMap};

// fully rebuild dropdown with placeholder showing
loadSavedBillsList();

updateSaveButtonState();
updateArchivedUI();
init();
saveBill();
}

async function clearAll(){
const proceed = await checkUnsavedBill();
if(!proceed) return;
doNewBill();
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function handleAddPerson(e){
if(isArchived) return;
if(e.key!=="Enter") return;
let box=document.getElementById("addPersonBox");
let name=box.value.trim();
let key = name.toLowerCase();
if(!name) return;
nameList.push(name);
venmoNames[key] = venmoNames[key] || "";
box.value="";
renderPeopleBar();
render();
calc();
saveBill();
markDirty();
}

function deletePerson(i){
if(isArchived) return;
let removed=nameList[i];
nameList.splice(i,1);
rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});
renderPeopleBar();
render();
calc();
saveBill();
markDirty();
}

function toggleLock(row){
if(isArchived) return;
rows[row].locked = !rows[row].locked;
render();
saveBill();
markDirty();
}

function update(i,key,val){
if(isArchived || rows[i].locked) return;
rows[i][key]=val;
calc();
markDirty();
}

function handlePriceInput(row, el){
if(isArchived || rows[row].locked){
el.value = rows[row].price;
return;
}
el.value = el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");
rows[row].price = el.value;
calc();
markDirty();
}

function toggleName(row,name){
if(isArchived || rows[row].locked) return;
let r=rows[row];
if(!r.selected) r.selected=[];
let idx=r.selected.indexOf(name);
if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);
if(r.selected.length===nameList.length){
r.people="EVERYONE";
}else{
r.people=r.selected.join(", ");
}
render();
calc();
saveBill();
markDirty();
}

function toggleEveryone(row){
if(isArchived || rows[row].locked) return;
let r=rows[row];
if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="EVERYONE";
}
render();
calc();
saveBill();
markDirty();
}

function addRow(){
if(isArchived) return;
rows.push({item:"",price:"",people:"",selected:[],locked:false});
render();
calc();
saveBill();
}

function add5Rows(){
if(isArchived) return;
for(let i=0;i<5;i++){
rows.push({item:"",price:"",people:"",selected:[],locked:false});
}
render();
calc();
saveBill();
}

function deleteLastRow(){
if(isArchived) return;
const msg = document.getElementById("deleteMsg");
if(msg) msg.textContent = "";
if(!rows || rows.length === 0) return;
let lastIndex = rows.length - 1;
if(rows[lastIndex].locked){
if(msg) msg.textContent = "Unlock last row to delete";
return;
}
rows.pop();
render();
calc();
saveBill();
markDirty();
}

function nav(e,row,col){
e.preventDefault();
let nextRow=row+1;
if(nextRow>=rows.length){
addRow();
setTimeout(()=>{
document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus();
},0);
return;
}
setTimeout(()=>{
let next=document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
if(next){
next.focus();
next.select?.();
}
},0);
}

function render(){
let body=document.getElementById("tableBody");
body.innerHTML="";
rows.forEach((r,i)=>{
let tapHTML=`
<button class="name-btn everyone-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">EVERYONE</button>
<div class="tap-grid">
`;
nameList.forEach(n=>{
tapHTML+=`<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});
tapHTML+=`</div>`;

let isLocked = r.locked || isArchived;
let lockIcon = isLocked ? "🔒" : "🔓";
let lockClass = isLocked ? "locked" : "unlocked";
let tr=document.createElement("tr");
if(isLocked) tr.classList.add("locked-row");

tr.innerHTML=`
<td class="lock-cell">
<div>${i+1}</div>
<button class="lock-btn ${lockClass}" onclick="toggleLock(${i})">${lockIcon}</button>
</td>
<td>
<textarea data-r="${i}" data-c="0"
placeholder="optional"
${isLocked?"disabled":""}
onkeydown="if(event.key==='Enter'){nav(event,${i},0)}"
oninput="update(${i},'item',this.value)">${r.item}</textarea>
</td>
<td>
<textarea data-r="${i}" data-c="1"
inputmode="decimal"
pattern="[0-9]*"
${isLocked?"disabled":""}
onkeydown="if(event.key==='Enter'){saveBill();nav(event,${i},1)}"
onblur="saveBill()"
oninput="handlePriceInput(${i},this)">${r.price}</textarea>
</td>
<td>${tapHTML}</td>
<td>
<textarea data-r="${i}" data-c="3"
${isLocked?"disabled":""}
onkeydown="if(event.key==='Enter'){nav(event,${i},3)}"
oninput="update(${i},'people',this.value)">${r.people}</textarea>
</td>
`;
body.appendChild(tr);
});
}

function calc(){
let subtotal=0;
let people={};
let taxVal=parseFloat(document.getElementById("taxValue").value)||0;
let tipVal=parseFloat(document.getElementById("tipValue").value)||0;
let taxMode=document.getElementById("taxMode").value;
let tipMode=document.getElementById("tipMode").value;

rows.forEach(r=>{
if(r.price){
let price=parseFloat(r.price);
if(!isNaN(price)) subtotal+=price;
let list=r.people==="EVERYONE"
?nameList
:(r.people||"").split(",").map(p=>p.trim()).filter(Boolean);
let share=price/list.length||0;
list.forEach(p=>{
if(!people[p]) people[p]={subtotalShare:0};
people[p].subtotalShare+=share;
});
}
});

let taxAmount=taxMode==="percent"?subtotal*(taxVal/100):taxVal;
let tipAmount=tipMode==="percent"?subtotal*(tipVal/100):tipVal;
let total=subtotal+taxAmount+tipAmount;

Object.keys(people).forEach(p=>{
let share=people[p].subtotalShare||0;
let ratio=subtotal?share/subtotal:0;
people[p].total=share+(taxAmount*ratio)+(tipAmount*ratio);
});

let taxPct=subtotal?(taxAmount/subtotal*100):0;
let tipPct=subtotal?(tipAmount/subtotal*100):0;

summary.innerHTML=`
<div class="sum-table">
<div class="row"><div class="label">Subtotal</div><div class="value">${subtotal.toFixed(2)}</div></div>
<div class="row"><div class="label">Tax (${taxPct.toFixed(2)}%)</div><div class="value">${taxAmount.toFixed(2)}</div></div>
<div class="row"><div class="label">Tip (${tipPct.toFixed(2)}%)</div><div class="value">${tipAmount.toFixed(2)}</div></div>
<div class="row total"><div class="label">Total</div><div class="value">${total.toFixed(2)}</div></div>
</div>
`;

let div=document.getElementById("totals");
div.innerHTML="";
Object.keys(people).forEach(p=>{
let venmoId=venmoNames[p.toLowerCase()]||"";
div.innerHTML+=`
<div class="result">
${p} owes $${people[p].total.toFixed(2)}
${venmoId?`<button class="venmo-btn" onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">Request</button>`:""}
</div>`;
});
}

init();
loadBill();
loadSavedBillsList();

</script>
<br><br><br><br>
</body>
</html>
