<!DOCTYPE html>
<html>
<head>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">

<title>Bill Splitter</title>

<style>
:root {
  --bg: #f5f3ef;
  --card: #ffffff;
  --accent: #7c6af7;
  --accent-light: #ede9ff;
  --accent2: #f06a6a;
  --accent2-light: #fff0f0;
  --green: #3ecf76;
  --green-light: #e8faf0;
  --border: #e2dfd8;
  --text: #2d2a26;
  --muted: #9c9690;
  --shadow: 0 2px 8px rgba(0,0,0,0.07);
  --radius: 10px;
  --radius-sm: 6px;
}

* { box-sizing: border-box; touch-action: pan-x pan-y; }

body {
  font-family: 'DM Sans', Arial, sans-serif;
  max-width: 390px;
  margin: auto;
  padding: 10px 10px 40px;
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
}

html, body {
  overscroll-behavior-y: contain;
}

.receipt-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.85);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  cursor: pointer;
}
.receipt-overlay img {
  max-width: 90%;
  max-height: 90%;
  border-radius: var(--radius);
  object-fit: contain;
}

.header-row {
  display: flex;
  justify-content: flex-start;
  align-items: center;
  margin-bottom: 8px;
  gap: 8px;
}

.load-row {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 4px;
}

.header-center {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 6px;
  flex: 1;
  justify-content: flex-start;
  padding-left: 6px;
}

.receipt-thumb {
  width: 42px;
  height: 42px;
  object-fit: cover;
  border: 2px solid var(--border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: block;
  flex-shrink: 0;
}
.receipt-thumb-wrap {
  display: flex;
  flex-direction: row;
  align-items: center;
  gap: 7px;
  flex: 1;
}
.remove-receipt {
  font-size: 19px;
  color: var(--accent2);
  cursor: pointer;
  line-height: 1;
  background: none;
  border: none;
  padding: 2px 4px;
  font-weight: bold;
  flex-shrink: 0;
}

.ocr-btn {
  font-size: 11px;
  padding: 3px 7px;
  background: var(--accent-light);
  border: 1.5px solid var(--accent);
  border-radius: 20px;
  color: var(--accent);
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
  margin-left: auto;
}
.ocr-btn:hover { background: #d8d0ff; }
.ocr-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.action-row {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-bottom: 3px;
  flex-wrap: nowrap;
}
.right-actions {
  display: flex;
  gap: 5px;
  align-items: center;
  margin-left: auto;
  flex-shrink: 0;
}

.name-input-wrap {
  display: flex;
  flex-direction: column;
  gap: 2px;
  flex-shrink: 0;
}
.people-label {
  font-size: 10px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.04em;
  margin: 0; padding: 0; line-height: 1;
}

.add-person-input {
  padding: 5px 8px;
  font-size: 14px;
  width: 136px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
  transition: border-color 0.15s;
}
.add-person-input:focus { border-color: var(--accent); }
.add-person-input::placeholder { color: var(--muted); font-size: 12px; }

.upload-btn {
  font-size: 12px;
  padding: 5px 6px;
  white-space: normal;
  word-break: break-word;
  width: 68px;
  height: 42px;
  line-height: 1.2;
  text-align: center;
  cursor: pointer;
  flex-shrink: 0;
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  transition: border-color 0.15s, background 0.15s;
}
.upload-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.upload-btn:disabled { opacity: 0.6; cursor: not-allowed; }

#mainContentSection th {
  font-size: 16px;
}

#billDropdown {
  font-size: 14px;
  padding: 5px 8px;
  width: 230px;
  flex-shrink: 0;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}

.save-bill-btn {
  font-size: 14px;
  font-weight: 600;
  padding: 6px 14px;
  white-space: nowrap;
  flex-shrink: 0;
  min-width: 54px;
  text-align: center;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.15s, background 0.15s;
  box-shadow: 0 2px 6px rgba(124,106,247,0.25);
}
.save-bill-btn:hover { background: #6a58e5; }
.save-bill-btn:disabled { opacity: 0.45; cursor: not-allowed; box-shadow: none; }

#newBillBtn {
  font-size: 13px;
  font-weight: 700;
  padding: 6px 12px;
  background: var(--text);
  color: #fff;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  flex-shrink: 0;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 0.02em;
  transition: background 0.15s;
}
#newBillBtn:hover { background: #444; }

/* ── Archive/Save inline row (below notes) ── */
.archive-save-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
  min-height: 26px;
}
.archived-label {
  color: var(--accent2);
  font-size: 11px;
  font-weight: 700;
  flex-shrink: 0;
  background: var(--accent2-light);
  padding: 2px 8px;
  border-radius: 20px;
}
.archived-row {
  display: flex;
  justify-content: flex-start;
  margin-bottom: 4px;
  min-height: 16px;
}

.top-row {
  display: flex;
  gap: 6px;
  align-items: stretch;
  margin-top: 0px;
  margin-bottom: 8px;
}

#personBar {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 4px;
  flex: 1;
  max-width: 50%;
  margin-bottom: 2px;
}
.person-tag {
  border: 1.5px solid var(--border);
  background: var(--card);
  padding: 3px 4px;
  font-size: 12px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  border-radius: 8px;
  box-shadow: var(--shadow);
}
.delete-person {
  color: var(--accent2) !important;
  cursor: pointer;
  margin-left: 0;
  -webkit-text-fill-color: var(--accent2);
  font-size: 11px;
}

.notes-box {
  flex: 0 0 50%;
  max-width: 50%;
  font-size: 13px;
  font-family: 'DM Sans', sans-serif;
  padding: 6px 8px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  resize: none;
  height: 86px;
  background: var(--card);
  color: var(--text);
  box-shadow: var(--shadow);
  outline: none;
  transition: border-color 0.15s;
}

  .notes-box {
  text-align: left;
}

.notes-box::placeholder {
  text-align: center;
}
.notes-box:focus { border-color: var(--accent); }
.notes-box::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

/* ── Table ── */
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 13px;
  table-layout: fixed;
  background: var(--card);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: var(--shadow);
  border: 1.5px solid var(--border);
}

td, th {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 2px;
  vertical-align: top;
}
td:last-child, th:last-child { border-right: none; }
tr:last-child td { border-bottom: none; }

thead tr {
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--accent-light);
}
thead th {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.04em;
  color: var(--accent);
  padding: 5px 4px;
}

th:nth-child(1), td:nth-child(1) { width: 8%; }
th:nth-child(2), td:nth-child(2) { width: 20%; }
th:nth-child(3), td:nth-child(3) { width: 15%; }
th:nth-child(4), td:nth-child(4) { width: 57%; }

.lock-cell {
  text-align: center;
  font-size: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 3px 2px;
}

/* Make the item column td act as a flex container so textarea fills full height */
td.item-cell {
  padding: 0;
  position: relative;
}
td.item-cell textarea {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  min-height: unset;
}

td textarea {
  width: 100%;
  height: 100%;
  box-sizing: border-box;
  font-size: 14px;
  resize: none;
  overflow: hidden;
  border: none;
  padding: 3px 4px;
  font-family: 'DM Sans', sans-serif;
  display: block;
  min-height: 50px;
  background: transparent;
  color: var(--text);
  outline: none;
}
td:nth-child(3) textarea {
  text-align: center;
  font-family: 'DM Mono', monospace;
  font-size:14px;
  min-height: 23px;
  height: 23px;
  padding: 1px;
}
td textarea::placeholder { color: var(--muted); font-size: 11px; opacity: 1; }

td.clickable-cell {
  cursor: text;
}

/* ── Swipe-to-delete ── */
/* People td is the clipping context for the delete button */
.people-td {
  position: relative;
  overflow: hidden;
}

/* Delete button inside .people-td, hidden to the right, slides in as tr slides left */
.swipe-delete-btn {
  position: absolute;
  top: 0; right: 0;
  height: 100%;
  width: 70px;
  background: var(--accent2);
  color: #fff;
  border: none;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  /* Hidden off the right edge initially; revealed as tr translates left */
  pointer-events: none;
}

/* The tr slides left; overflow:hidden on people-td clips things correctly */
.swipe-tr {
  transform: translateX(0);
  transition: transform 0.2s ease;
  will-change: transform;
  background: var(--card);
}
.swipe-tr.locked-row td { background: #fafaf9; opacity: 0.85; }
.swipe-tr.locked-row textarea { background: transparent; }

/* lock-cell needs to be a normal td but with flex content inside */
.lock-cell-td {
  text-align: center;
  vertical-align: top;
}
.lock-cell-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 3px 2px;
}

.tap-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 2px;
  margin-top: 2px;
}
.name-btn {
  margin: 1px;
  padding: 4px 2px;
  font-size: 13px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  transition: background 0.12s, border-color 0.12s;
}
.name-btn:hover { border-color: var(--accent); background: var(--accent-light); }
.name-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}
.everyone-btn {
   width: calc(100% - 4px);
  margin: 0 2px 4px 2px;
  font-size: 14px;
  padding: 4px 1px;
  border-radius: 20px;
  background: #f7f6f3;
  border: 1.5px solid var(--border);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.12s, border-color 0.12s;
}
.everyone-btn.selected {
  background: var(--green-light);
  border-color: var(--green);
  color: #1a8a45;
  font-weight: 600;
}

.lock-btn {
  padding: 2px 4px;
  font-size: 11px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: #f7f6f3;
  border-radius: 20px;
  transition: 0.15s;
  line-height: 1;
  font-family: 'DM Sans', sans-serif;
}
.lock-btn.locked { background: var(--accent2-light); border-color: var(--accent2); }
.lock-btn.unlocked { opacity: 0.6; }

.erase-btn {
  width: 28px;
  height: 20px;
  cursor: pointer;
  border: none;
  background: transparent;
  padding: 0;
  margin-top: 5px;
  opacity: 0.75;
  transition: opacity 0.15s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.erase-btn:hover:not(:disabled) {
  opacity: 1;
  transform: scale(1.15);
}
.erase-btn:disabled {
  opacity: 0.25;
  cursor: not-allowed;
}
.erase-btn svg {
  width: 26px;
  height: 18px;
  display: block;
}

#addRowBtn, #add5RowsBtn, #deleteEmptyRowsBtn {
  font-size: 12px;
  padding: 4px 10px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  background: var(--card);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
  color: var(--text);
  transition: border-color 0.15s, background 0.15s;
}
#addRowBtn:hover, #add5RowsBtn:hover { border-color: var(--accent); background: var(--accent-light); }
#deleteEmptyRowsBtn:hover { border-color: var(--accent2); background: var(--accent2-light); }

/* Delete message that replaces the Delete Empty button */
#deleteMsg {
  font-size: 12px;
  color: var(--accent2);
  padding: 4px 10px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.tax-tip-wrap {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-top: 8px;
}
.tax-tip-wrap label {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
  width: 26px;
}
.tax-tip-wrap select {
  font-size: 13px;
  padding: 4px 6px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Sans', sans-serif;
  outline: none;
}
.tax-tip-input {
  width: 70px;
  padding: 4px 8px;
  font-size: 13px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--card);
  font-family: 'DM Mono', monospace;
  outline: none;
  transition: border-color 0.15s;
}
.tax-tip-input:focus { border-color: var(--accent); }

.summary-save-row {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-top: 10px;
  gap: 8px;
}
.summary-box {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  width: 30%;
  max-width: 260px;
  min-width: 148px;
  box-shadow: var(--shadow);
}
.sum-table {
  font-family: 'DM Mono', monospace;
  width: 100%;
  font-size: 12px;
}
.row {
  display: grid;
  grid-template-columns: 1fr auto;
  column-gap: 6px;
  align-items: center;
  white-space: nowrap;
  padding: 1px 0;
}
.label { text-align: left; white-space: nowrap; color: var(--muted); }
.value { text-align: right; white-space: nowrap; }
.total .label, .total .value {
  font-weight: bold;
  color: var(--text);
  font-size: 13px;
  padding-top: 3px;
  border-top: 1px solid var(--border);
  margin-top: 2px;
}

.result {
  font-weight: 600;
  margin: 5px 0;
  font-size: 14px;
  padding: 6px 10px;
  background: var(--card);
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  box-shadow: var(--shadow);
  display: flex;
  align-items: center;
  gap: 4px;
}

.venmo-btn {
  margin-left: auto;
  font-size: 12px;
  background: #3d95ce;
  color: white;
  border: none;
  border-radius: 20px;
  padding: 3px 10px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-weight: 600;
  flex-shrink: 0;
}
.venmo-btn:hover { background: #2f7eb8; }

.bill-actions-row {
  display: flex;
  justify-content: flex-end;
  gap: 6px;
  margin-top: 40px;
}
.archive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: #fff8e1;
  border: 1.5px solid #f0c040;
  border-radius: 20px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.unarchive-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--green-light);
  border: 1.5px solid var(--green);
  border-radius: 20px;
  color: #1a8a45;
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}
.delete-btn {
  font-size: 12px;
  padding: 4px 10px;
  cursor: pointer;
  background: var(--accent2-light);
  border: 1.5px solid var(--accent2);
  border-radius: 20px;
  color: var(--accent2);
  font-family: 'DM Sans', sans-serif;
  font-weight: 500;
}

.row-btn-disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
.archived-section { opacity: 0.75; }
.th-people { line-height: 1.3; }

/* tbody needs relative positioning so swipe wrappers work */
#tableBody { position: relative; }
</style>

</head>
<body>

<!-- ROW 1: New Bill | Upload Receipt + thumbnail | Save -->
<div class="header-row">
  <button id="newBillBtn" onclick="clearAll()">+ New Bill</button>

  <div class="header-center">
    <input type="file"
      id="receiptUpload"
      accept="image/*"
      style="display:none"
      onchange="handleReceiptUpload(event)">
    <button class="upload-btn" id="uploadReceiptBtn" onclick="document.getElementById('receiptUpload').click()">
      Upload Receipt
    </button>
    <div id="receiptPreviewContainer"></div>
  </div>

</div>

<!-- ROW 2: Load dropdown -->
<div class="load-row">
  <select id="billDropdown" onchange="loadSavedBill(this.value)">
    <option value="" disabled selected style="color:#aaa;">— load a saved bill —</option>
  </select>

  <div class="name-input-wrap">
    <span class="people-label">Add Person</span>
    <input class="add-person-input"
      id="addPersonBox"
      placeholder="type name + Enter"
      onkeydown="handleAddPerson(event)">
  </div>
</div>

<div class="top-row">
  <textarea class="notes-box"
    id="notesBox"
    placeholder="type notes here&#10;-upload receipt to use AI&#10;(it kinda sucks tho)"
    oninput="saveNotes(); markDirty()"></textarea>

  <div id="personBar"></div>
</div>

<!-- Archive label + Save button row (below notes, above table) -->
<div class="archive-save-row" id="archiveSaveRow">
  <span id="archivedLabel" class="archived-label" style="display:none;">⛔ ARCHIVED — edits cannot be made</span>
  <span style="flex:1;"></span>
  <button class="save-bill-btn" id="saveBillBtn" onclick="saveNewBill()">Save</button>
</div>

<div id="mainContentSection">
<table>
<thead>
<tr>
<th> </th>
<th>Item</th>
<th>Price<br><span style="font-weight:normal;font-size:12px;text-transform:none;letter-spacing:0;color:var(--accent);">($)</span></th>
<th class="th-people">People Involved<br><span style="font-weight:normal;font-size:12px;text-transform:none;letter-spacing:0;color:var(--accent);">(Tap Names)</span></th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div style="margin:7px 0; display:flex; gap:5px; align-items:center;">
  <button id="addRowBtn" onclick="addRow()">+ 1 Row</button>
  <button id="add5RowsBtn" onclick="add5Rows()">+ 5 Rows</button>
  <button id="deleteEmptyRowsBtn" onclick="deleteEmptyRows()">Delete Empty</button>
  <span id="deleteMsg" style="display:none;"></span>
  <button
    class="save-bill-btn"
    id="saveBillBtnBottom"
    onclick="saveNewBill()"
    style="margin-left:auto;">
    Save
  </button>
</div>

<div class="tax-tip-wrap" id="taxWrap">
  <label>Tax</label>

function formatDate(ts){
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()}/${String(d.getFullYear()).slice(-2)}`;
}

function snapshotState(){
  return JSON.stringify({
    rows, nameList, receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId
  });
}

function defaultSnapshot(){
  return JSON.stringify({
    rows: Array(5).fill(null).map(()=>({item:"",price:"",people:"",selected:[],locked:false})),
    nameList: [...defaultNames],
    receiptUrl: "",
    taxValue: "", tipValue: "",
    taxMode: "amount", tipMode: "amount",
    notes: "", currentLoadedBillId: null

function markDirty(){
  if(currentLoadedBillId){
    const a = JSON.parse(snapshotState()); delete a.currentLoadedBillId;
    const b = JSON.parse(loadedSnapshot || "{}"); delete b.currentLoadedBillId;
    isDirty = JSON.stringify(a) !== JSON.stringify(b);
  } else {
    isDirty = snapshotState() !== defaultSnapshot();
    if(isDirty && !newBillFirstInputDate) newBillFirstInputDate = Date.now();
  }
  updateSaveButtonState();
}

}

async function checkUnsavedBill(){
  if(currentLoadedBillId && isDirty){
    const choice = await confirmUnsaved("There are unsaved changes to this bill.");
    if(choice === "save"){ await saveNewBill(); return true; }
    if(choice === "nosave") return true;
    return false;
  }
  if(!currentLoadedBillId && hasContent()){
    const choice = await confirmUnsaved("There are unsaved changes. Save this bill before continuing?");
    if(choice === "save"){
      let title = prompt("Enter a title for this bill (max 15 characters):");
      if(!title || !title.trim()) return false;
      title = title.trim().slice(0,15);
      const docRef = await db.collection("savedBills").add({ title, savedAt: newBillFirstInputDate || Date.now(), ...getCurrentBillData() });

      await loadSavedBillsList(); return true;
    }
    if(choice === "nosave") return true;

  }

// ── OCR ──
function parseReceiptText(text){
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const rightPriceRegex = /\$?\s*(\d+\.\d{2})\s*$/;
  const skipKeywords = /\b(subtotal|sub[-\s]?total|total|tax|tip|gratuity|service\s*fee|surcharge|discount|change|cash|credit|debit|visa|mastercard|amex|discover|balance|amount\s*due|amount\s*paid|thank|receipt|order\s*#|table\s*#|server|guest|check\s*#|qty|quantity|void|comp)\b/i;

  const parsed = [];
  lines.forEach(line => {
    const priceMatch = line.match(rightPriceRegex);
    if(!priceMatch) return;
    const price = priceMatch[1];
    const priceFloat = parseFloat(price);
    if(priceFloat <= 0 || priceFloat > 300) return;
    if(skipKeywords.test(line)) return;
    let item = line.slice(0, line.length - priceMatch[0].length).trim();
    item = item.replace(/^[^a-zA-Z0-9]+/, '').trim();
    item = item.replace(/[\.\-\*\_\s]+$/, '').trim();
    if(!item || !/[a-zA-Z]/.test(item)) return;
    if(item.length < 2) return;
    parsed.push({ item, price });
  });

  if(parsed.length === 0){
    alert("No items found. Try a flat, well-lit photo with prices clearly on the right side.");
    return;
  }

  const lockedRows = rows.filter(r => r.locked);
  rows = [...lockedRows];
  parsed.forEach(p => {
    rows.push({ item: p.item, price: p.price, people: '', selected: [], locked: false });
  });
  while(rows.length < 5){
    rows.push({ item:'', price:'', people:'', selected:[], locked:false });
  }
  render(); calc(); saveBill(); markDirty();
}

async function runOCR(){
  if(isArchived) return;
  if(!receiptFileRef && !receiptUrl){ alert("No receipt uploaded."); return; }
  const btn = document.getElementById("ocrBtn");
  if(btn){ btn.textContent = "Scanning…"; btn.disabled = true; }
  try {
    const source = receiptFileRef || receiptUrl;
    const { data: { text } } = await Tesseract.recognize(source, 'eng');
    parseReceiptText(text);
  } catch(err){
    alert("Scan failed — please try again.");
    console.error(err);
  } finally {
    if(btn){ btn.textContent = "Use AI"; btn.disabled = false; }
  }
}

function applyLiveData(data){
  rows = data.rows || [];
  nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || "";
  lastSavedReceiptUrl = receiptUrl;
  currentLoadedBillId = data.currentLoadedBillId || null;
  currentLoadedBillTitle = data.currentLoadedBillTitle || null;
  isArchived = data.isArchived || false;

  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";

  if(receiptUrl) showReceiptThumbnail(receiptUrl);
  else document.getElementById("receiptPreviewContainer").innerHTML = "";

  if(currentLoadedBillId){
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: data.taxValue || "", tipValue: data.tipValue || "",
      taxMode: data.taxMode || "amount", tipMode: data.tipMode || "amount",
      notes: data.notes || ""
    });
  }
}

function loadBill(){
  billRef.onSnapshot(doc => {
    if(isUploadingReceipt || isLocalUpdate) return;
    const data = doc.data();
    if(!data) return;
    applyLiveData(data);
    billLoaded = true; isDirty = false;
    if(!rows || rows.length === 0){
      rows = [];
      for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
    }
    renderPeopleBar(); render(); calc();
    updateSaveButtonState(); updateArchivedUI();
    loadSavedBillsList().then(()=>{
      if(currentLoadedBillId) document.getElementById("billDropdown").value = currentLoadedBillId;
    });
  });
}

async function handleReceiptUpload(event){
  if(isArchived) return;
  const file = event.target.files[0];
  if(!file) return;
  if(receiptUrl){
    const confirmed = await confirmAction("Replace the current receipt with this new one?");
    if(!confirmed){ event.target.value = ""; return; }
  }
  if(file.size > 15 * 1024 * 1024){
    alert("Image too large. Please upload a photo under 15MB.");
    event.target.value = ""; return;
  }
  isUploadingReceipt = true; isLocalUpdate = true;
  try {
    const storageRef = storage.ref().child(`receipts/${Date.now()}_receipt.jpg`);
    await storageRef.put(file);
    const url = await storageRef.getDownloadURL();
    receiptUrl = url; lastSavedReceiptUrl = url; receiptFileRef = file;
    showReceiptThumbnail(url);
    await billRef.set({
      rows, nameList, venmoNames, receiptUrl: url,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value,
      currentLoadedBillId, currentLoadedBillTitle, isArchived
    });
    markDirty();
  } finally {
    event.target.value = "";
    setTimeout(()=>{ isUploadingReceipt = false; isLocalUpdate = false; }, 500);
  }
}

function saveBill(){
  if(!billLoaded) return;
  isLocalUpdate = true;
  if(!receiptUrl || receiptUrl.length < 5) receiptUrl = lastSavedReceiptUrl || "";
  billRef.set({
    rows, nameList, venmoNames, receiptUrl,
    taxValue: document.getElementById("taxValue").value,
    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value,
    currentLoadedBillId, currentLoadedBillTitle, isArchived
  }).then(()=>{
    if(receiptUrl && receiptUrl.length > 5) lastSavedReceiptUrl = receiptUrl;
  }).finally(()=>{ setTimeout(()=>isLocalUpdate=false, 300); });
}

  return {
    rows, nameList, venmoNames,

    tipValue: document.getElementById("tipValue").value,
    taxMode: document.getElementById("taxMode").value,
    tipMode: document.getElementById("tipMode").value,
    notes: document.getElementById("notesBox").value

}

async function saveNewBill(){
  if(isArchived) return;
  if(currentLoadedBillId){
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData() });
    isDirty = false;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    showSavedFeedback();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
  } else {
    let title = prompt("Enter a title for this bill (max 15 characters):");
    if(!title || !title.trim()) return;
    title = title.trim().slice(0,15);
    const billData = { title, savedAt: newBillFirstInputDate || Date.now(), ...getCurrentBillData() };
    const docRef = await db.collection("savedBills").add(billData);
    currentLoadedBillId = docRef.id; currentLoadedBillTitle = title;
    isDirty = false; newBillFirstInputDate = null;
    loadedSnapshot = JSON.stringify({
      rows, nameList, receiptUrl,
      taxValue: document.getElementById("taxValue").value,
      tipValue: document.getElementById("tipValue").value,
      taxMode: document.getElementById("taxMode").value,
      tipMode: document.getElementById("tipMode").value,
      notes: document.getElementById("notesBox").value
    });
    saveBill();
    alert(`"${title}" saved!`);
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = docRef.id;
    updateSaveButtonState(); updateArchivedUI();
  }
}

async function toggleArchive(){
  if(!currentLoadedBillId){ alert("Save this bill first before archiving."); return; }
  if(isArchived){
    const pw = prompt("Enter password to unarchive:");
    if(!pw) return;
    if(pw.trim().toLowerCase() !== "unarchive"){ alert("Incorrect password."); return; }
    rows.forEach(r => r.locked = false);
    await db.collection("savedBills").doc(currentLoadedBillId).update({ archived: false, rows });
    isArchived = false; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been unarchived.`);
  } else {
    const confirmed = confirm(`Archive "${currentLoadedBillTitle}"?\n\nArchived Bills can't be edited but can still be viewed.`);
    if(!confirmed) return;
    rows.forEach(r => r.locked = true);
    rows = rows.filter(r => r.price || r.item || (r.selected && r.selected.length));
    await db.collection("savedBills").doc(currentLoadedBillId).update({ ...getCurrentBillData(), rows, archived: true });
    isArchived = true; isDirty = false; saveBill();
    await loadSavedBillsList();
    document.getElementById("billDropdown").value = currentLoadedBillId;
    updateArchivedUI(); render();
    alert(`"${currentLoadedBillTitle}" has been archived.`);
  }
}

async function deleteBill(){
  if(isArchived){ alert("Archived bills cannot be deleted."); return; }
  if(!currentLoadedBillId){ alert("This bill hasn't been saved yet — nothing to delete."); return; }
  const confirmed = confirm(`Delete "${currentLoadedBillTitle}"? This cannot be undone.`);
  if(!confirmed) return;
  await db.collection("savedBills").doc(currentLoadedBillId).delete();
  doNewBill();
}

async function loadSavedBillsList(){
  const snapshot = await db.collection("savedBills").orderBy("savedAt","desc").limit(10).get();
  const dropdown = document.getElementById("billDropdown");
  const currentVal = currentLoadedBillId || "";
  dropdown.innerHTML = "";
  if(!currentLoadedBillId){
    const ph = document.createElement("option");
    ph.value = ""; ph.textContent = "— load a saved bill —";
    ph.disabled = true; ph.selected = true; ph.style.color = "#aaa";
    dropdown.appendChild(ph);
  }
  snapshot.forEach(doc => {
    const d = doc.data();
    const opt = document.createElement("option");
    opt.value = doc.id;
    opt.textContent = `${d.title} (${formatDate(d.savedAt)})${d.archived ? "🔒" : ""}`;
    dropdown.appendChild(opt);
  });
  if(currentVal) dropdown.value = currentVal;
}

async function loadSavedBill(id){
  if(!id) return;
  const proceed = await checkUnsavedBill();
  if(!proceed){ document.getElementById("billDropdown").value = currentLoadedBillId || ""; return; }
  const doc = await db.collection("savedBills").doc(id).get();
  const data = doc.data();
  if(!data) return;
  currentLoadedBillId = id; currentLoadedBillTitle = data.title;
  isArchived = data.archived || false; isDirty = false; newBillFirstInputDate = null;
  rows = data.rows || []; nameList = data.nameList || [];
  venmoNames = data.venmoNames || {};
  receiptUrl = data.receiptUrl || ""; lastSavedReceiptUrl = receiptUrl; receiptFileRef = null;
  document.getElementById("taxValue").value = data.taxValue || "";
  document.getElementById("tipValue").value = data.tipValue || "";
  document.getElementById("taxMode").value = data.taxMode || "amount";
  document.getElementById("tipMode").value = data.tipMode || "amount";
  document.getElementById("notesBox").value = data.notes || "";
  if(receiptUrl) showReceiptThumbnail(receiptUrl);
  else document.getElementById("receiptPreviewContainer").innerHTML = "";
  loadedSnapshot = JSON.stringify({
    rows, nameList, receiptUrl,
    taxValue: data.taxValue || "", tipValue: data.tipValue || "",
    taxMode: data.taxMode || "amount", tipMode: data.tipMode || "amount",
    notes: data.notes || ""
  });
  saveBill();
  await loadSavedBillsList();
  document.getElementById("billDropdown").value = id;
  updateSaveButtonState(); updateArchivedUI();
  renderPeopleBar(); render(); calc();
}

function saveNotes(){
  if(isArchived) return;
  isLocalUpdate = true;
  billRef.update({ notes: document.getElementById("notesBox").value })
    .finally(()=>{ setTimeout(()=>isLocalUpdate=false, 300); });
}

function init(){
  rows = [];
  for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  renderPeopleBar(); render(); calc();
}

function doNewBill(){
  document.getElementById("taxValue").value = "";
  document.getElementById("tipValue").value = "";
  document.getElementById("taxMode").value = "amount";
  document.getElementById("tipMode").value = "amount";
  document.getElementById("notesBox").value = "";
  receiptUrl = ""; lastSavedReceiptUrl = ""; receiptFileRef = null;
  document.getElementById("receiptPreviewContainer").innerHTML = "";
  currentLoadedBillId = null; currentLoadedBillTitle = null;
  isArchived = false; isDirty = false; loadedSnapshot = null; newBillFirstInputDate = null;
  rows = []; nameList = [...defaultNames]; venmoNames = {...defaultVenmoMap};
  swipeCurrent = null;
  saveBill(); loadSavedBillsList(); updateSaveButtonState(); updateArchivedUI(); init();
}

async function clearAll(){
  const proceed = await checkUnsavedBill();
  if(!proceed) return;
  doNewBill();
}

function renderPeopleBar(){
  const bar = document.getElementById("personBar");
  bar.innerHTML = "";
  nameList.forEach((n,i) => {
    bar.innerHTML += `<span class="person-tag">${n}<span class="delete-person" onclick="deletePerson(${i})">✖</span></span>`;
  });
}

function handleAddPerson(e){
  if(isArchived || e.key !== "Enter") return;
  const box = document.getElementById("addPersonBox");
  const name = box.value.trim();
  if(!name) return;
  nameList.push(name);
  venmoNames[name.toLowerCase()] = venmoNames[name.toLowerCase()] || "";
  box.value = "";
  renderPeopleBar(); render(); calc(); saveBill(); markDirty();
}

function deletePerson(i){
  if(isArchived) return;
  const removed = nameList.splice(i,1)[0];
  rows.forEach(r => {
    r.selected = (r.selected||[]).filter(p => p !== removed);
    r.people = r.selected.join(", ");
  });
  renderPeopleBar(); render(); calc(); saveBill(); markDirty();
}

function toggleLock(row){
  if(isArchived) return;
  rows[row].locked = !rows[row].locked;
  render(); saveBill(); markDirty();
}

function eraseRow(i){
  if(isArchived || rows[i].locked) return;
  rows[i] = { item:"", price:"", people:"", selected:[], locked:false };
  render(); calc(); saveBill(); markDirty();
}

function update(i, key, val){
  if(isArchived || rows[i].locked) return;
  rows[i][key] = val;
  calc(); markDirty();
}

function handlePriceInput(row, el){
  if(isArchived || rows[row].locked){ el.value = rows[row].price; return; }
  el.value = el.value.replace(/[^0-9.]/g,"").replace(/(\..*?)\..*/g,"$1");
  rows[row].price = el.value;
  calc(); markDirty();
}

function toggleName(row, name){
  if(isArchived || rows[row].locked) return;
  const r = rows[row];
  if(!r.selected) r.selected = [];
  const idx = r.selected.indexOf(name);
  if(idx > -1) r.selected.splice(idx,1); else r.selected.push(name);
  r.people = r.selected.length === nameList.length ? "EVERYONE" : r.selected.join(", ");
  render(); calc(); saveBill(); markDirty();
}

function toggleEveryone(row){
  if(isArchived || rows[row].locked) return;
  const r = rows[row];
  if(r.selected?.length === nameList.length){ r.selected = []; r.people = ""; }
  else { r.selected = [...nameList]; r.people = "EVERYONE"; }
  render(); calc(); saveBill(); markDirty();
}

function addRow(){
  if(isArchived) return;
  rows.push({item:"",price:"",people:"",selected:[],locked:false});
  render(); calc(); saveBill();
}

function add5Rows(){
  if(isArchived) return;
  for(let i=0;i<5;i++) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  render(); calc(); saveBill();
}

// Delete ALL truly empty rows (item, price, AND selected/people all empty)
function deleteEmptyRows(){
  if(isArchived) return;
  const before = rows.length;
  // A row is empty only if item, price, AND no people selected
  rows = rows.filter(r => r.locked || r.item || r.price || (r.selected && r.selected.length > 0));
  if(rows.length === 0) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  const removed = before - rows.length;

  // Hide the Delete Empty button and show message in its place
  const deleteBtn = document.getElementById("deleteEmptyRowsBtn");
  const msg = document.getElementById("deleteMsg");
  if(deleteBtn) deleteBtn.style.display = "none";
  if(msg){
    msg.style.display = "inline";
    msg.textContent = removed > 0 ? `Removed ${removed} empty row${removed>1?"s":""}` : "No empty rows";
  }
  setTimeout(()=>{
    if(deleteBtn) deleteBtn.style.display = "";
    if(msg) msg.style.display = "none";
  }, 2000);

  render(); calc(); saveBill(); markDirty();
}

// Delete a specific row by index
function deleteRow(i){
  if(isArchived) return;
  if(rows[i] && rows[i].locked) return;
  rows.splice(i,1);
  if(rows.length === 0) rows.push({item:"",price:"",people:"",selected:[],locked:false});
  swipeCurrent = null;
  render(); calc(); saveBill(); markDirty();
}

function nav(e, row, col){
  e.preventDefault();
  const nextRow = row + 1;
  if(nextRow >= rows.length){
    addRow();
    setTimeout(()=>{ document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`)?.focus(); }, 0);
    return;
  }
  setTimeout(()=>{
    const next = document.querySelector(`[data-r="${nextRow}"][data-c="${col}"]`);
    if(next){ next.focus(); next.select?.(); }
  }, 0);
}

// ── Swipe-to-delete logic (progressive/live tracking) ──
function closeAllSwipes(exceptIndex){
  document.querySelectorAll('.swipe-tr').forEach(tr => {
    const idx = parseInt(tr.dataset.swipeIdx);
    if(idx !== exceptIndex){
      tr.style.transition = 'transform 0.2s ease';
      tr.style.transform = 'translateX(0)';
    }
  });
  if(swipeCurrent !== null && swipeCurrent !== exceptIndex) swipeCurrent = null;
}

function attachSwipe(tr, rowIndex){
  let startX = 0, startY = 0;
  let isSwiping = false;
  let isDetermining = true;
  let currentOffset = 0; // track current open amount

  const MAX_SWIPE = 70;

  tr.addEventListener('touchstart', e => {
    if(isArchived || rows[rowIndex]?.locked) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isSwiping = false;
    isDetermining = true;
    // Get current translateX
    const style = window.getComputedStyle(tr);
    const matrix = new WebKitCSSMatrix(style.transform);
    currentOffset = matrix.m41; // negative value = swiped left
    tr.style.transition = 'none'; // disable transition during drag
  }, {passive: true});

  tr.addEventListener('touchmove', e => {
    if(isArchived || rows[rowIndex]?.locked) return;
    const cx = e.touches[0].clientX;
    const cy = e.touches[0].clientY;
    const adx = Math.abs(cx - startX);
    const ady = Math.abs(cy - startY);

    if(isDetermining){
      if(ady > adx) return; // vertical scroll, ignore
      if(adx > 5) { isSwiping = true; isDetermining = false; closeAllSwipes(rowIndex); }
      else return;
    }

    if(!isSwiping) return;

    const rawDelta = cx - startX;
    // new position = currentOffset + rawDelta, clamped between -MAX_SWIPE and 0
    let newX = currentOffset + rawDelta;
    newX = Math.max(-MAX_SWIPE, Math.min(0, newX));
    tr.style.transform = `translateX(${newX}px)`;
  }, {passive: true});

  tr.addEventListener('touchend', e => {
    if(!isSwiping || isArchived || rows[rowIndex]?.locked) return;
    tr.style.transition = 'transform 0.2s ease';
    const style = window.getComputedStyle(tr);
    const matrix = new WebKitCSSMatrix(style.transform);
    const finalX = matrix.m41;

    if(finalX < -35){
      // snap open
      tr.style.transform = `translateX(-${MAX_SWIPE}px)`;
      swipeCurrent = rowIndex;
    } else {
      // snap closed
      tr.style.transform = 'translateX(0)';
      if(swipeCurrent === rowIndex) swipeCurrent = null;
    }
  });
}

// Close swipe if user taps elsewhere
document.addEventListener('touchstart', e => {
  if(swipeCurrent === null) return;
  const swipedTr = document.querySelector('.swipe-tr[style*="translateX(-70px)"], .swipe-tr[style*="translateX(-"]');
  // Check if tap is outside swiped row
  const allSwipedTrs = document.querySelectorAll('.swipe-tr');
  allSwipedTrs.forEach(tr => {
    const style = window.getComputedStyle(tr);
    const matrix = new WebKitCSSMatrix(style.transform);
    if(matrix.m41 < -5 && !tr.parentElement.contains(e.target)){
      tr.style.transition = 'transform 0.2s ease';
      tr.style.transform = 'translateX(0)';
      swipeCurrent = null;
    }
  });
}, {passive: true});

function calc(){
  let subtotal = 0;
  const people = {};
  const taxVal = parseFloat(document.getElementById("taxValue").value) || 0;
  const tipVal = parseFloat(document.getElementById("tipValue").value) || 0;
  const taxMode = document.getElementById("taxMode").value;
  const tipMode = document.getElementById("tipMode").value;

  rows.forEach(r => {
    if(!r.price) return;
    const price = parseFloat(r.price);
    if(isNaN(price)) return;
    subtotal += price;
    const list = r.people === "EVERYONE" ? nameList
      : (r.people||"").split(",").map(p=>p.trim()).filter(Boolean);
    const share = price / (list.length || 1);
    list.forEach(p => {
      if(!people[p]) people[p] = {subtotalShare:0};
      people[p].subtotalShare += share;
    });
  });

  const taxAmount = taxMode === "percent" ? subtotal*(taxVal/100) : taxVal;
  const tipAmount = tipMode === "percent" ? subtotal*(tipVal/100) : tipVal;
  const total = subtotal + taxAmount + tipAmount;

  Object.keys(people).forEach(p => {
    const share = people[p].subtotalShare || 0;
    const ratio = subtotal ? share/subtotal : 0;
    people[p].total = share + (taxAmount*ratio) + (tipAmount*ratio);
  });

  const taxPct = subtotal ? (taxAmount/subtotal*100) : 0;
  const tipPct = subtotal ? (tipAmount/subtotal*100) : 0;

  document.getElementById("summary").innerHTML = `
    <div class="sum-table">
      <div class="row"><div class="label">Subtotal</div><div class="value">${subtotal.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tax (${taxPct.toFixed(2)}%)</div><div class="value">${taxAmount.toFixed(2)}</div></div>
      <div class="row"><div class="label">Tip (${tipPct.toFixed(2)}%)</div><div class="value">${tipAmount.toFixed(2)}</div></div>
      <div class="row total"><div class="label">Total</div><div class="value">${total.toFixed(2)}</div></div>
    </div>`;

  const div = document.getElementById("totals");
  div.innerHTML = "";
  Object.keys(people).forEach(p => {
    const venmoId = venmoNames[p.toLowerCase()] || "";
    div.innerHTML += `
      <div class="result">
        <span>${p} owes $${people[p].total.toFixed(2)}</span>
        ${venmoId ? `<button class="venmo-btn" onclick="window.open('https://venmo.com/?txn=request&recipients=${encodeURIComponent(venmoId)}&amount=${people[p].total.toFixed(2)}','_blank')">Request</button>` : ""}
      </div>`;
  });
}

billLoaded = false;
loadBill();
loadSavedBillsList();

</script>

</body>
