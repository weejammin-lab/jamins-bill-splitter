<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:1100px;
margin:auto;
}

.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

.delete-person{
color:red;
cursor:pointer;
margin-left:4px;
}

.add-person-input{
padding:4px;
font-size:12px;
width:140px;
margin-top:4px;
}

table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed;
}

td,th{
border:1px solid #ddd;
padding:3px;
overflow:hidden;
}

.item-col{width:120px;}
.price-col{width:55px;}
.people-col{width:520px;}
.tap-col{width:360px;}

td input{
width:100%;
box-sizing:border-box;
border:1px solid #ccc;
background:white;
font-size:12px;
}

input::placeholder{
color:#a8a8a8;
}

/* PRICE */

.price-cell{
position:relative;
width:55px;
}

.price-cell span{
position:absolute;
left:4px;
top:3px;
color:gray;
}

.price-cell input{
padding-left:10px;
}

/* TAP */

.name-btn{
margin:2px;
padding:2px 6px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

/* TAX / TIP */

.tax-tip-wrap{
display:flex;
gap:6px;
align-items:center;
margin-top:8px;
}

.tax-tip-input{
width:70px;
padding:4px;
}

.tax-tip-select{
width:50px;
padding:4px;
}

.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input
class="add-person-input"
id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="tax-tip-wrap">
<label>Tax</label>
<select id="taxMode" class="tax-tip-select" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="taxValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="tax-tip-wrap">
<label>Tip</label>
<select id="tipMode" class="tax-tip-select" onchange="calc()">
<option value="percent">%</option>
<option value="amount">$</option>
</select>
<input id="tipValue" class="tax-tip-input" oninput="calc()">
</div>

<div class="summary-box" id="summary"></div>

<script>

let nameList=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let rows=[];
let venmoNames={};

let placeholders=[
"jamin",
"jack",
"jamin, cliff, willie, howard",
"lin, lin, freddy (must type the repeated name for uneven splits)",
"everyone"
];

function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[],
placeholder:placeholders[i]
});
}

renderPeopleBar();
render();
calc();
}

function handleAddPerson(e){
if(e.key==="Enter"){
let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;
nameList.push(name);
box.value="";
renderPeopleBar();
render();
calc();
}
}

function renderPeopleBar(){
let bar=document.getElementById("personBar");
bar.innerHTML="";
nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span class="delete-person" onclick="deletePerson(${i})">✖</span>
</span>`;
});
}

function deletePerson(i){
let removed=nameList[i];
nameList.splice(i,1);
rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
});
renderPeopleBar();
render();
calc();
}

/* INPUT */

function handlePriceInput(row, el){
el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[row].price=el.value;
calc();
}

function update(i,key,val){
rows[i][key]=val;
calc();
}

/* TAP */

function toggleName(row,name){

let r=rows[row];
if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.length ? r.selected.join(", ") : "";

render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();
}

/* RENDER */

function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`<div>
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
</div>`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

let tr=document.createElement("tr");

tr.innerHTML=`

<td>
<input value="${r.item}">
</td>

<td>
<input value="${r.price}"
oninput="handlePriceInput(${i},this)">
</td>

<td>
<input value="${r.people}"
placeholder="${r.placeholder}"
oninput="update(${i},'people',this.value)">
</td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

function calc(){

let subtotal=0;

rows.forEach(r=>{
if(r.price){
let p=parseFloat(r.price);
if(!isNaN(p)) subtotal+=p;
}
});

summary.innerHTML=`Subtotal: $${subtotal.toFixed(2)}`;
}

function clearAll(){
rows=[];
venmoNames={};
init();
}

init();
calc();

</script>

</body>
</html>
