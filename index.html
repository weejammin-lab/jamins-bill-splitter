<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body{
font-family:Arial;
max-width:820px;   /* tighter overall */
margin:auto;
padding:10px;
}

/* PEOPLE TAG */
.person-tag{
display:inline-block;
border:1px solid #ccc;
padding:3px 6px;
margin:2px;
font-size:12px;
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:12px;
table-layout:fixed; /* IMPORTANT for wrapping */
}

td,th{
border:1px solid #ddd;
padding:3px;
vertical-align:top;
word-break:break-word;
overflow-wrap:anywhere; /* forces wrap everywhere */
white-space:normal;
}

/* 🔥 ULTRA COMPACT COLUMNS */
.item-col{width:80px;}
.price-col{width:50px;}   /* very narrow */
.people-col{width:230px;}
.tap-col{width:200px;}

/* INPUTS */
input{
width:100%;
box-sizing:border-box;
border:1px solid #ccc;
font-size:12px;
white-space:normal;
overflow-wrap:anywhere;
}

/* PRICE CELL */
.price-cell input{
padding-left:10px;
}

/* TAP BUTTONS WRAP NICELY */
.name-btn{
margin:2px;
padding:2px 5px;
font-size:11px;
cursor:pointer;
border:1px solid #ccc;
background:#e0e0e0;
border-radius:7px;

display:inline-block;
white-space:normal;
max-width:100%;
}

.name-btn.selected{
background:#7dff8a;
border-color:#2ecc71;
}

/* SUMMARY */
.summary-box{
border:1px solid #ccc;
padding:8px;
margin-top:8px;
}

</style>
</head>

<body>

<h2>Bill Splitter</h2>

<button onclick="clearAll()">Clear All</button>

<br><br>

<div id="personBar"></div>

<input id="addPersonBox"
placeholder="type name + Enter"
onkeydown="handleAddPerson(event)">

<br><br>

<table>

<thead>
<tr>
<th>Item</th>
<th>Price ($)</th>
<th>People involved</th>
<th>Tap Names</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<br>

<div class="summary-box" id="summary"></div>

<div id="totals"></div>

<script>

/* DATA */
let nameList=[
"jamin","jack","cliff","willie","howard","lin","freddy"
];

let rows=[];

/* INIT */
function init(){

rows=[];

for(let i=0;i<5;i++){
rows.push({
item:"",
price:"",
people:"",
selected:[]
});
}

renderPeopleBar();
render();
calc();
}

/* PEOPLE */
function renderPeopleBar(){

let bar=document.getElementById("personBar");
bar.innerHTML="";

nameList.forEach((n,i)=>{
bar.innerHTML+=`
<span class="person-tag">
${n}
<span onclick="deletePerson(${i})" style="color:red;cursor:pointer">✖</span>
</span>`;
});
}

function handleAddPerson(e){

if(e.key!=="Enter") return;

let box=document.getElementById("addPersonBox");
let name=box.value.trim();
if(!name) return;

nameList.push(name);
box.value="";

renderPeopleBar();
render();
calc();
}

function deletePerson(i){

let removed=nameList[i];
nameList.splice(i,1);

rows.forEach(r=>{
r.selected=(r.selected||[]).filter(p=>p!==removed);
r.people=(r.selected||[]).join(", ");
});

renderPeopleBar();
render();
calc();
}

/* INPUT */
function update(i,key,val){
rows[i][key]=val;
calc();
}

/* PRICE CLEAN */
function handlePriceInput(i,el){

el.value=el.value
.replace(/[^0-9.]/g,"")
.replace(/(\..*?)\..*/g,"$1");

rows[i].price=el.value;
calc();
}

/* TAP */
function toggleName(row,name){

let r=rows[row];
if(!r.selected) r.selected=[];

let idx=r.selected.indexOf(name);

if(idx>-1) r.selected.splice(idx,1);
else r.selected.push(name);

r.people=r.selected.join(", ");
render();
calc();
}

function toggleEveryone(row){

let r=rows[row];

if(r.selected?.length===nameList.length){
r.selected=[];
r.people="";
}else{
r.selected=[...nameList];
r.people="everyone";
}

render();
calc();
}

/* RENDER */
function render(){

let body=document.getElementById("tableBody");
body.innerHTML="";

rows.forEach((r,i)=>{

let tapHTML=`
<button class="name-btn ${r.selected?.length===nameList.length?'selected':''}"
onclick="toggleEveryone(${i})">everyone</button>
`;

nameList.forEach(n=>{
tapHTML+=`
<button class="name-btn ${r.selected?.includes(n)?'selected':''}"
onclick="toggleName(${i},'${n}')">${n}</button>`;
});

let tr=document.createElement("tr");

tr.innerHTML=`

<td><input value="${r.item}" oninput="update(${i},'item',this.value)"></td>

<td><input value="${r.price}" oninput="handlePriceInput(${i},this)"></td>

<td><input value="${r.people}" oninput="update(${i},'people',this.value)"></td>

<td>${tapHTML}</td>

`;

body.appendChild(tr);

});

}

/* CALC (simple placeholder) */
function calc(){

let subtotal=0;

rows.forEach(r=>{
let p=parseFloat(r.price);
if(!isNaN(p)) subtotal+=p;
});

document.getElementById("summary").innerHTML=
`Subtotal: $${subtotal.toFixed(2)}`;

}

/* START */
init();
calc();

</script>

</body>
</html>
