<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter Pro</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 10px;
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

/* Compact layout */
.section {
    margin-bottom: 12px;
}

/* Table */
table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
}

td, th {
    border: 1px solid #ddd;
    padding: 4px;
}

input {
    width: 100%;
    padding: 4px;
    font-size: 13px;
}

/* Make rows compact */
td {
    height: 28px;
}

/* Summary pinned look */
.summary-box {
    border: 1px solid #ccc;
    padding: 10px;
    position: sticky;
    top: 0;
    background: white;
    z-index: 10;
}

/* Totals */
.result {
    font-weight: bold;
    margin: 4px 0;
}

/* Buttons compact */
button {
    padding: 5px 8px;
    font-size: 12px;
}

/* Venmo button */
.venmo-btn {
    margin-left: 6px;
    font-size: 11px;
    padding: 3px 6px;
}

</style>

<!-- OCR LIB -->
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

</head>

<body>

<h1>Bill Splitter</h1>

<!-- OCR UPLOAD -->
<div class="section">
<input type="file" id="receiptUpload" accept="image/*">
<button onclick="processReceipt()">Scan Receipt</button>
</div>

<!-- TABLE -->
<div class="section">

<table>
<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>People</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>
</table>

</div>

<!-- ADJUSTMENTS -->
<div class="section">

Tax % <input id="taxPercent" type="number" style="width:60px">
Tip % <input id="tipPercent" type="number" style="width:60px">
Cashback % <input id="cashbackPercent" type="number" style="width:60px">

</div>

<!-- SUMMARY (always visible) -->
<div class="summary-box" id="summary"></div>

<!-- TOTALS -->
<div class="section">
<div id="totals"></div>
</div>

<script>

let rows = [];

/* INIT SMALL ROWS */
function init(){
    for(let i=0;i<10;i++) addRow();
    render();
}

/* ADD ROW */
function addRow(data={}){
    rows.push({
        item:data.item||"",
        price:data.price||"",
        people:data.people||""
    });
}

/* AUTO EXPAND */
function maybeExpand(){
    if(rows.filter(r=>r.price).length > rows.length - 2){
        for(let i=0;i<5;i++) addRow();
        render();
    }
}

/* RENDER */
function render(){

let body = document.getElementById("tableBody");
body.innerHTML = "";

rows.forEach((r,i)=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td><input value="${r.item}" oninput="update(${i},'item',this.value)"></td>
<td><input type="number" value="${r.price}" oninput="update(${i},'price',this.value)"></td>
<td><input value="${r.people}" oninput="update(${i},'people',this.value)"></td>
`;

body.appendChild(tr);

});

}

/* UPDATE */
function update(i,key,val){
    rows[i][key]=val;
    maybeExpand();
    calc();
}

/* CALC */
function calc(){

let items = rows.filter(r=>r.price && r.people);

let people = {};
let subtotal = 0;

items.forEach(i=>{
subtotal += parseFloat(i.price);

let share = i.price / i.people.split(",").length;

i.people.split(",").forEach(p=>{
    p=p.trim();
    if(!p) return;
    people[p] = people[p] || {total:0};
    people[p].total += share;
});

});

let tax = subtotal*(taxPercent.value||0)/100;
let tip = subtotal*(tipPercent.value||0)/100;
let cashback = (cashbackPercent.value||0)/100;

let total = subtotal + tax + tip;

/* adjust */
Object.keys(people).forEach(p=>{
let ratio = people[p].total/subtotal || 0;
people[p].total += tax*ratio + tip*ratio;
people[p].total -= people[p].total*cashback;
});

/* SUMMARY */
document.getElementById("summary").innerHTML =
`Subtotal: $${subtotal.toFixed(2)} |
Tax: $${tax.toFixed(2)} |
Tip: $${tip.toFixed(2)} |
Total: $${total.toFixed(2)}`;

/* TOTALS + VENMO */
let div = document.getElementById("totals");
div.innerHTML = "";

Object.keys(people).forEach(p=>{

let amt = people[p].total.toFixed(2);

/* VENMO LINK */
let venmo = `https://venmo.com/?txn=pay&recipients=${encodeURIComponent(p)}&amount=${amt}&note=Split%20bill`;

div.innerHTML += `
<div class="result">
${p} owes $${amt}
<button class="venmo-btn" onclick="window.open('${venmo}','_blank')">Venmo</button>
</div>
`;

});

}

/* RECEIPT OCR */
async function processReceipt(){

let file = document.getElementById("receiptUpload").files[0];
if(!file) return;

const { data } = await Tesseract.recognize(file, 'eng');

let lines = data.text.split("\n");

lines.forEach(line=>{

let priceMatch = line.match(/\d+\.\d{2}/);

if(priceMatch){

addRow({
    item: line.replace(priceMatch[0],"").trim(),
    price: priceMatch[0],
    people:""
});

}

});

render();
calc();

}

init();
calc();

</script>

</body>
</html>
