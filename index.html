<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bill Splitter</title>

<style>

body {
    font-family: Arial;
    max-width: 900px;
    margin: auto;
    padding: 15px;
}

h1 {
    text-align: center;
}

.section {
    margin-bottom: 20px;
}

/* Table input */
table {
    width: 100%;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ddd;
    padding: 8px;
}

input {
    width: 100%;
    padding: 6px;
    box-sizing: border-box;
}

/* Summary */
.summary-box {
    border: 1px solid #ccc;
    padding: 15px;
}

.result {
    font-weight: bold;
}

button {
    padding: 8px;
    margin-top: 10px;
}

</style>
</head>

<body>

<h1>Bill Splitter</h1>

<!-- INPUT TABLE -->
<div class="section">

<h2>Items</h2>

<table id="itemsTable">
<thead>
<tr>
<th>Item (optional)</th>
<th>Price</th>
<th>People (comma separated)</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>

<!-- ADJUSTMENTS -->
<div class="section">

<h2>Adjustments</h2>

<label>Tax %:</label>
<input id="taxPercent" type="number">

<label>Tip %:</label>
<input id="tipPercent" type="number">

<label>Cashback %:</label>
<input id="cashbackPercent" type="number">

</div>

<!-- SUMMARY -->
<div class="section">

<h2>Summary</h2>
<div id="summary" class="summary-box"></div>

</div>

<!-- RESULTS -->
<div class="section">

<h2>Totals</h2>
<div id="totals"></div>

</div>

<script>

let rows = [];

/* INIT 10 ROWS */
function initRows(){
    for(let i=0;i<10;i++){
        addRow();
    }
    renderRows();
}

/* ADD ROW */
function addRow(){
    rows.push({
        name:"",
        price:"",
        people:""
    });
}

/* AUTO EXPAND */
function maybeExpand(){
    let filled = rows.filter(r => r.price || r.people).length;
    if(filled >= rows.length - 2){
        for(let i=0;i<5;i++) addRow();
        renderRows();
    }
}

/* RENDER TABLE */
function renderRows(){

let body = document.getElementById("tableBody");
body.innerHTML = "";

rows.forEach((row,i)=>{

let tr = document.createElement("tr");

tr.innerHTML = `
<td><input value="${row.name}" oninput="updateRow(${i},'name',this.value)"></td>
<td><input type="number" value="${row.price}" oninput="updateRow(${i},'price',this.value)"></td>
<td><input value="${row.people}" oninput="updateRow(${i},'people',this.value)"></td>
`;

body.appendChild(tr);

});

}

/* UPDATE ROW */
function updateRow(i,key,value){
    rows[i][key] = value;
    maybeExpand();
    updateTotals();
}

/* CALCULATE */
function updateTotals(){

let items = rows
.filter(r => r.price && r.people)
.map(r => ({
    price: parseFloat(r.price),
    people: r.people.split(",").map(p=>p.trim()).filter(Boolean)
}));

let peopleMap = {};
let subtotal = 0;

items.forEach(item=>{
subtotal += item.price;

let share = item.price / item.people.length;

item.people.forEach(p=>{
    let key = p.toLowerCase();
    peopleMap[key] = peopleMap[key] || {name:p,total:0};
    peopleMap[key].total += share;
});

});

let tax = subtotal * ((parseFloat(taxPercent.value)||0)/100);
let tip = subtotal * ((parseFloat(tipPercent.value)||0)/100);
let cashback = (parseFloat(cashbackPercent.value)||0)/100;

let total = subtotal + tax + tip;

Object.keys(peopleMap).forEach(k=>{
let p = peopleMap[k];

let ratio = p.total / subtotal || 0;

p.total += tax*ratio + tip*ratio;
p.total -= p.total*cashback;
});

/* SUMMARY */
document.getElementById("summary").innerHTML = `
Subtotal: $${subtotal.toFixed(2)}<br>
Tax: $${tax.toFixed(2)}<br>
Tip: $${tip.toFixed(2)}<br>
Cashback: ${(cashback*100).toFixed(2)}%<br><br>
<strong>Total: $${total.toFixed(2)}</strong>
`;

/* OUTPUT */
let div = document.getElementById("totals");
div.innerHTML = "";

Object.values(peopleMap).forEach(p=>{
let el = document.createElement("div");
el.className = "result";
el.textContent = `${p.name} owes $${p.total.toFixed(2)}`;
div.appendChild(el);
});

}

/* START */
initRows();
updateTotals();

</script>

</body>
</html>
